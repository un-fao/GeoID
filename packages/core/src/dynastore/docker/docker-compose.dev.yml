services:
  db:
    extends:
      file: ./compose.db.dev.yml
      service: db
    container_name: geoid_db
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      RESET_MODE: default
    networks:
      - dynastore_net

  catalog:
    extends:
      file: docker-compose.yml
      service: catalog
    build:
      context: ../../../../..
      dockerfile: packages/core/src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${CATALOG_SCOPE:-scope_catalog}
        BUILD_JUPYTERLITE: "true"
    volumes:
      # Hot reload mount: overlay the host packages tree onto the container's
      # editable-install root. uv installs every workspace member editable, so
      # the `dynastore` namespace resolves from /dynastore/packages/*/src (see
      # the __editable__*.pth files in site-packages) — NOT /dynastore/src,
      # which no finder references. Source path is relative to THIS compose
      # file's directory (not your CWD), matching `build.context` above.
      - ../../../..:/dynastore/packages
      # Service identity (instance.json) + shared config defaults.
      # Drives the task-placement gate so this service only claims task
      # types whose placement consumers list it.
      - ./config/catalog:/dynastore/config:ro
    env_file:
      - .env
      - path: .env.local
        required: false
      # Local GCP creds (gitignored). Sets GOOGLE_APPLICATION_CREDENTIALS /
      # GOOGLE_CLOUD_PROJECT / REGION / GCP_BUCKET so the container can auth to
      # GCS. The key json lives under the mounted module dir; resolve_gcp_
      # credentials() remaps the /dynastore/... path to the mounted location.
      # required:false → devs without local creds are unaffected.
      - path: ../modules/gcp/.env
        required: false
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      DB_POOL_MIN_SIZE: "5"
      DB_POOL_MAX_SIZE: "30"
      DB_CONNECT_TIMEOUT: "30"
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      DYNASTORE_CONFIG_ROOT: /dynastore/config
    ports:
      - "5678:5678" # Debug port
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 80 --reload --reload-dir packages

  geoid:
    extends:
      file: docker-compose.yml
      service: geoid
    build:
      context: ../../../../..
      dockerfile: packages/core/src/dynastore/docker/Dockerfile
      target: development
      args:
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../..:/dynastore/packages # Hot reload mount (editable-install root; see catalog service)
      - ./config/geoid:/dynastore/config:ro
    env_file:
      # geoid runs the full scope (incl. gcp). Declaring env_file here replaces
      # the base list, so .env / .env.local are re-listed alongside the local
      # GCP creds (gitignored, required:false — see catalog service).
      - .env
      - path: .env.local
        required: false
      - path: ../modules/gcp/.env
        required: false
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      DYNASTORE_CONFIG_ROOT: /dynastore/config
    ports:
      - "5682:5682" # Debug port
    command: python -m debugpy --listen 0.0.0.0:5682 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 80 --reload --reload-dir packages

  worker:
    extends:
      file: docker-compose.yml
      service: worker
    build:
      context: ../../../../..
      dockerfile: packages/core/src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${WORKER_SCOPE:-scope_worker}
        BUILD_JUPYTERLITE: "false"
    env_file:
      - .env
      - path: .env.local
        required: false
      # Local GCP creds (gitignored) — see catalog service. The worker handles
      # GCS finalize/activation, so it needs the same credentials.
      - path: ../modules/gcp/.env
        required: false
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ../../../..:/dynastore/packages # Hot reload mount (editable-install root; see catalog service)
      - ./config/worker:/dynastore/config:ro
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      DYNASTORE_CONFIG_ROOT: /dynastore/config
    ports:
      - "5679:5679" # Debug port for worker
    command: python -m debugpy --listen 0.0.0.0:5679 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 81 --reload --reload-dir packages

  tools:
    extends:
      file: docker-compose.yml
      service: tools
    build:
      context: ../../../../..
      dockerfile: packages/core/src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${TOOLS_SCOPE:-scope_tools}
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../..:/dynastore/packages # Hot reload mount (editable-install root; see catalog service)
      - ./config/tools:/dynastore/config:ro
    env_file:
      - .env
      - path: .env.local
        required: false
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      DYNASTORE_CONFIG_ROOT: /dynastore/config
    ports:
      - "5680:5680" # Debug port for tools
    command: python -m debugpy --listen 0.0.0.0:5680 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 8082 --reload --reload-dir packages

  maps:
    extends:
      file: docker-compose.yml
      service: maps
    build:
      context: ../../../../..
      dockerfile: packages/core/src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${MAPS_SCOPE:-scope_maps}
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../..:/dynastore/packages # Hot reload mount (editable-install root; see catalog service)
      - ./config/maps:/dynastore/config:ro
    env_file:
      - .env
      - path: .env.local
        required: false
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      DYNASTORE_CONFIG_ROOT: /dynastore/config
    ports:
      - "5681:5681" # Debug port for maps
    command: python -m debugpy --listen 0.0.0.0:5681 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 8083 --reload --reload-dir packages

  elasticsearch:
    extends:
      file: ./compose.es.yml
      service: elasticsearch
    container_name: geoid_elasticsearch
    ports:
      - "9200:9200"
    networks:
      - dynastore_net

  kibana:
    extends:
      file: ./compose.kibana.yml
      service: kibana
    container_name: geoid_kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dynastore_net

  keycloak:
    extends:
      file: ./compose.keycloak.yml
      service: keycloak
    container_name: geoid_keycloak
    ports:
      - "${HOST_PORT_KEYCLOAK:-8181}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  # Valkey is referenced via depends_on on every app service (catalog/geoid/
  # worker/tools/maps) so it must be declared in this file even though the
  # base compose owns the same definition. Compose `extends` pulls a single
  # service, not its transitive depends_on graph — VS Code's right-click
  # "Compose Up" runs `docker compose -f docker-compose.dev.yml up` against
  # this file alone, so dev.yml has to stand on its own.
  valkey:
    extends:
      file: ./compose.valkey.yml
      service: valkey
    container_name: geoid_valkey
    networks:
      - dynastore_net

volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
