services:
  valkey:
    image: valkey/valkey:9-alpine
    container_name: geoid_valkey
    # Lightweight Valkey for shared-cache parity between on-prem and
    # review/prod. Backs the capability liveness oracle that powers the
    # reactive task reaper (#502); without a distributed cache the oracle
    # only sees the local pod, so multi-pod or restart scenarios would
    # produce false-positive DEAD_LETTER transitions.
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${HOST_PORT_VALKEY:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
