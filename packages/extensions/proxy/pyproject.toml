[project]
name = "dynastore-ext-proxy"
version = "0.0.0"
description = "DynaStore Proxy extension — outbound HTTP proxy with tenant scoping."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
proxy = "dynastore.extensions.proxy.proxy_service:ProxyService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }
