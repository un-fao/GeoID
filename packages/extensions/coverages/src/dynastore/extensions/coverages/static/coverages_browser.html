<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | Coverages Browser {{VERSION}}</title>

    <!-- Favicon and Fonts -->
    <link rel="icon" type="image/png" href="../static/dynastore.png">
    <link rel="stylesheet" href="../static/vendor/vendor.css"/>
    <!-- Tailwind play CDN — no versioned SRI available for this build;
         consistent with stac_browser.html and features_browser.html in this repo. -->
    <script src="https://cdn.tailwindcss.com" crossorigin=""></script>
    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Shared base styles (read-only reuse) -->
    <link rel="stylesheet" href="../static/common/admin.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }
        .header-title { display: flex; align-items: center; gap: 0.75rem; font-weight: bold; font-size: 1.1rem; color: white; }
        .header-title img { width: 2rem; height: 2rem; border-radius: 0.4rem; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
        .back-link:hover { color: white; }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            min-width: 220px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(255,255,255,0.07);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        #nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        /* Detail pane */
        #detail-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            background: #020617;
        }
        #detail-body h3 {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #3b82f6;
            margin: 1.5rem 0 0.5rem;
        }
        #detail-body ul {
            list-style: disc;
            padding-left: 1.25rem;
            font-size: 0.85rem;
            color: #e2e8f0;
        }
        #detail-body li {
            margin-bottom: 0.2rem;
            font-family: monospace;
        }

        /* Map panel */
        #cov-map {
            height: 260px;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .loading-spinner { text-align: center; padding: 3rem 1rem; color: #64748b; }
        .error-box { padding: 1rem; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 0.5rem; color: #f87171; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <img src="../static/dynastore.png" alt="AIP Logo">
            <span>Agro-Informatics Platform: Coverages Browser</span>
        </div>
        <a href="../" class="back-link" id="back-home-link"
           onclick="(function(e){if(window.parent!==window&&typeof window.parent.switchTab==='function'){e.preventDefault();window.parent.switchTab('home');}})(event)">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </header>

    <div class="main-layout" data-ogc-root>
        <!-- Sidebar: catalog and collection navigator -->
        <div id="sidebar">
            <div id="sidebar-header">
                <div style="font-size:0.7rem;color:#64748b;padding-bottom:0.25rem;">Select a catalog to browse coverages.</div>
            </div>
            <div id="nav-list" data-ogc-nav>
                <div class="loading-spinner">
                    <i class="fa-solid fa-circle-notch fa-spin text-xl"></i>
                    <p class="mt-2 text-sm">Loading catalogs…</p>
                </div>
            </div>
        </div>

        <!-- Detail pane: axes + range fields + map -->
        <div id="detail-pane">
            <div id="detail-body" data-ogc-body>
                <div style="text-align:center; padding:4rem 1rem; color:#334155;">
                    <i class="fa-solid fa-layer-group text-5xl mb-4" style="color:#1e3a5f;"></i>
                    <p class="text-slate-400 mt-4">Select a collection from the sidebar to inspect its coverage.</p>
                </div>
            </div>
            <!-- Leaflet map for spatial extent preview -->
            <div id="cov-map" data-ogc-map></div>
        </div>
    </div>

    <script type="module" src="../coverages/coverages_browser.js"></script>

</body>
</html>
