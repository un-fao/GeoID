[project]
name = "dynastore-ext-coverages"
dynamic = ["version"]
description = "DynaStore OGC API - Coverages extension."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "rasterio>=1.4.3",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
coverages = "dynastore.extensions.coverages.coverages_service:CoveragesService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/coverages/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
