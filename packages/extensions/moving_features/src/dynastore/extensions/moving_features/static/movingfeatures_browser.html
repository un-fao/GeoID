<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | Moving Features Browser</title>

    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Favicon and Fonts -->
    <link rel="icon" type="image/png" href="../static/dynastore.png">
    <link rel="stylesheet" href="../static/common/tailwind.css">
    <link rel="stylesheet" href="../static/common/admin.css"/>
    <link rel="stylesheet" href="../static/common/page-shell.css"/>
    <link rel="stylesheet" href="../static/vendor/vendor.css"/>
    <script src="../static/common/page-shell.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar: navigation (catalog / collection picker) */
        #sidebar {
            width: 260px;
            min-width: 200px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(255,255,255,0.07);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 0.82rem; color: #94a3b8; }
        [data-ogc-nav] { flex: 1; overflow-y: auto; padding: 0.5rem; font-size: 0.82rem; }
        [data-ogc-nav] ul { list-style: none; margin: 0; padding: 0; }
        [data-ogc-nav] li { margin-bottom: 0.2rem; }
        [data-ogc-nav] button {
            width: 100%; text-align: left;
            padding: 0.4rem 0.7rem;
            border-radius: 0.35rem;
            border: 1px solid transparent;
            background: transparent;
            color: #e2e8f0;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.82rem;
        }
        [data-ogc-nav] button:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }

        /* Right panel: map + item body */
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #mf-map {
            height: 320px;
            flex-shrink: 0;
        }

        [data-ogc-body] {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            font-size: 0.82rem;
        }
        [data-ogc-body] h3 { margin: 0 0 0.6rem; font-size: 0.9rem; color: #93c5fd; }
        [data-ogc-body] table { width: 100%; border-collapse: collapse; }
        [data-ogc-body] tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        [data-ogc-body] td { padding: 0.3rem 0.5rem; vertical-align: middle; }
        [data-ogc-body] button {
            padding: 0.25rem 0.6rem;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 0.3rem;
            color: #93c5fd;
            cursor: pointer;
            font-size: 0.78rem;
            transition: background 0.15s;
        }
        [data-ogc-body] button:hover { background: rgba(59,130,246,0.3); }

        .loading-spinner { text-align: center; padding: 2rem 1rem; color: #64748b; font-size: 0.85rem; }
        .notice-box { padding: 0.5rem 0.75rem; border-radius: 0.35rem; font-size: 0.78rem; margin-top: 0.4rem; }
        .notice-err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
    </style>
</head>
<body data-ogc-root>

    <ds-page-shell
        data-title="Agro-Informatics Platform: Moving Features Browser"
        data-back-label="Back to Home">
    </ds-page-shell>

    <div class="main-layout">
        <!-- Sidebar: OGC catalog / collection navigator -->
        <div id="sidebar">
            <div id="sidebar-header">
                <i class="fa-solid fa-route" style="margin-right:0.4rem;"></i>Moving Features
            </div>
            <nav data-ogc-nav>
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
            </nav>
        </div>

        <!-- Map + item list -->
        <div id="right-panel">
            <div id="mf-map" data-ogc-map></div>
            <div data-ogc-body>
                <div class="loading-spinner">Select a catalog and collection to browse moving features.</div>
            </div>
        </div>
    </div>

    <!-- VERSION: {{VERSION}} -->
    <script type="module" src="../movingfeatures/movingfeatures_browser.js"></script>

</body>
</html>
