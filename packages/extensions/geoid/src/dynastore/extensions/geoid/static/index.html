<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GeoID</title>
  <script>
    (function () {
      const supported = ["en", "es", "fr"];
      const stored = localStorage.getItem("ds_lang");
      const navLang = (navigator.language || "en").slice(0, 2).toLowerCase();
      const lang = supported.includes(stored) ? stored
                  : supported.includes(navLang) ? navLang
                  : "en";
      window.location.replace("index_" + lang + ".html");
    })();
  </script>
</head>
<body></body>
</html>
