[project]
name = "dynastore-ext-geoid"
dynamic = ["version"]
description = "DynaStore Geoid extension — landing-page + browser-targeted helpers."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "user-agents>=2.2.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
geoid = "dynastore.extensions.geoid.geoid:Geoid"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.geoid" = ["*.md", "static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/geoid/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
