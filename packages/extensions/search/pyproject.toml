[project]
name = "dynastore-ext-search"
dynamic = ["version"]
description = "DynaStore Search extension — full-text + spatial search via OpenSearch."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
search = "dynastore.extensions.search.search_service:SearchService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.search" = ["*.md"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/search/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
