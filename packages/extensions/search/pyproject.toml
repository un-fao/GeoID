[project]
name = "dynastore-ext-search"
version = "0.0.0"
description = "DynaStore Search extension — full-text + spatial search via OpenSearch."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
search = "dynastore.extensions.search.search_service:SearchService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.search" = ["*.md"]
