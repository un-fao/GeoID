[project]
name = "dynastore-ext-tiles"
dynamic = ["version"]
description = "DynaStore OGC Tiles extension — vector tile + WMTS surface."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "pmtiles>=3.2.0",
    "morecantile>=7.0.3,<8",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
tiles = "dynastore.extensions.tiles.tiles_service:TilesService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.tiles" = ["*.md", "static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/tiles/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
