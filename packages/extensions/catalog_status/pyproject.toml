[project]
name = "dynastore-ext-catalog-status"
dynamic = ["version"]
description = "DynaStore always-on catalog-module status extension (provisioning, tasks, recovery operations)."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
catalog_status = "dynastore.extensions.catalog_status.catalog_status_service:CatalogStatusService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.catalog_status" = []

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/catalog_status/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
