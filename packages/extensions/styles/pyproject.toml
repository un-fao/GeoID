[project]
name = "dynastore-ext-styles"
dynamic = ["version"]
description = "DynaStore OGC API - Styles extension."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "lxml>=4.9",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
styles = "dynastore.extensions.styles.styles_service:StylesService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/styles/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
