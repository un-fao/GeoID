[project]
name = "dynastore-ext-events"
dynamic = ["version"]
description = "DynaStore Events extension — Postgres-LISTEN backed event surface."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
events = "dynastore.extensions.events.extension:EventsExtension"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/events/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
