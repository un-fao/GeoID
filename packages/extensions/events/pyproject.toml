[project]
name = "dynastore-ext-events"
version = "0.0.0"
description = "DynaStore Events extension — Postgres-LISTEN backed event surface."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
events = "dynastore.extensions.events.extension:EventsExtension"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
