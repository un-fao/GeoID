[project]
name = "dynastore-ext-notebooks"
version = "0.0.0"
description = "DynaStore Notebooks extension — JupyterLite + tenant initialization."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "httpx",
    "python-dotenv",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
notebooks = "dynastore.extensions.notebooks.notebooks_extension:NotebooksExtension"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.notebooks" = ["jupyterlite/**/*", "static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }
