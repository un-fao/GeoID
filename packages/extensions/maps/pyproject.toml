[project]
name = "dynastore-ext-maps"
version = "0.0.0"
description = "DynaStore Maps extension — vector + raster map rendering."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "GDAL==3.12.3",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
maps = "dynastore.extensions.maps.maps_service:MapsService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.maps" = ["static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }
