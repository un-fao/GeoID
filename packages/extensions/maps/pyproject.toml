[project]
name = "dynastore-ext-maps"
dynamic = ["version"]
description = "DynaStore Maps extension — vector + raster map rendering."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "GDAL==3.13.0",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
maps = "dynastore.extensions.maps.maps_service:MapsService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.maps" = ["static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/maps/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
