<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="../static/website/context-selector.js?v={{VERSION}}"></script>

<div data-fills-viewport class="flex flex-col" style="height:100%;">
    <div class="flex gap-4 overflow-hidden" style="flex:1;min-height:0;">
        <!-- Sidebar -->
        <div class="w-80 glass-panel rounded-xl flex flex-col p-4">
            <h3 class="text-lg font-bold text-white mb-4">Map layers</h3>
            <div class="space-y-4 flex-grow overflow-y-auto pr-2 custom-scrollbar">
                <!-- Context Selector -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Select Layers</label>
                    <div id="map-context-selector-container"></div>
                </div>
                <div class="border-t border-white/10 my-2"></div>
                <!-- Active Layers List -->
                <div id="active-layers-list" class="space-y-2">
                    <!-- Layers will be added here -->
                </div>
            </div>
        </div>

        <!-- Map Container -->
        <div class="flex-grow relative overflow-hidden rounded-xl">
            <div id="map" class="w-full h-full"></div>
        </div>
    </div>
</div>

<script>
    let map;
    let activeLayers = {};

    // Derive the reverse-proxy prefix from the current pathname.
    // Mirrors ContextSelector._apiUrl() — both use '/web/' as the boundary.
    const _apiPrefix = (function() {
        var p = window.location.pathname;
        var i = p.indexOf('/web/');
        return i >= 0 ? p.slice(0, i) : '';
    })();

    // Read deep-link query params written by stac_browser "View on map".
    var _qs = new URLSearchParams(window.location.search);
    var _preselCatalog = _qs.get('catalog') || null;
    var _preselCollection = _qs.get('collection') || null;

    function initMap() {
        if (map) return;

        map = L.map('map').setView([0, 0], 2);

        // Add Base Map (OpenStreetMap Dark)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Initialize Context Selector.
        // When deep-link params are present, seed defaultCatalog/preferredCollection
        // so the selector boots with the requested layer already selected.
        var csOptions = {
            containerId: 'map-context-selector-container',
            enableCollection: true,
            multipleCollections: true,
            autoSelectFirst: true,
            preferredCollection: _preselCollection || 'demo',
            onChange: function(detail) {
                var dataset = Array.isArray(detail.catalogId) ? detail.catalogId[0] : detail.catalogId;
                var collections = Array.isArray(detail.collectionIds) ? detail.collectionIds : (detail.collectionId ? [detail.collectionId] : []);
                updateMapLayers(dataset, collections);
            }
        };
        if (_preselCatalog) {
            csOptions.defaultCatalog = _preselCatalog;
        }
        new ContextSelector(csOptions);

        // Also accept postMessage deep-links sent by stac_browser "View on map"
        // when both pages run in iframes under the same shell origin.
        window.addEventListener('message', function(evt) {
            if (!evt.data || evt.data.type !== 'open-map') return;
            var catId = evt.data.catalogId;
            var colId = evt.data.collectionId;
            if (catId && colId) {
                updateMapLayers(catId, [colId]);
            }
        });
    }

    function updateMapLayers(dataset, collections) {
        if (!dataset || dataset === '_system_') {
            // Remove all if dataset is invalid
            Object.keys(activeLayers).forEach(function(layerId) {
                map.removeLayer(activeLayers[layerId]);
                delete activeLayers[layerId];
            });
            renderActiveLayersList();
            return;
        }

        // Remove layers no longer selected
        Object.keys(activeLayers).forEach(function(layerId) {
            var parts = layerId.split(':');
            var layerDataset = parts[0];
            var layerCollection = parts[1];
            if (layerDataset !== dataset || !collections.includes(layerCollection)) {
                map.removeLayer(activeLayers[layerId]);
                delete activeLayers[layerId];
            }
        });

        // Add new layers.  Build the tile URL with string concatenation so the
        // Leaflet placeholder tokens {z}/{x}/{y} remain literal and are never
        // evaluated as template-literal expressions.
        collections.forEach(function(collectionId) {
            if (!collectionId) return;
            var layerId = dataset + ':' + collectionId;
            if (!activeLayers[layerId]) {
                var tileUrl = _apiPrefix + '/maps/' + dataset + '/map/tiles/WebMercatorQuad/{z}/{x}/{y}?collections=' + collectionId;
                var layer = L.tileLayer(tileUrl, { maxZoom: 19, attribution: collectionId }).addTo(map);
                activeLayers[layerId] = layer;
            }
        });

        renderActiveLayersList();
    }

    function renderActiveLayersList() {
        var list = document.getElementById('active-layers-list');
        list.innerHTML = '';
        var layers = Object.keys(activeLayers);

        if (layers.length === 0) {
            list.innerHTML = '<div class="text-xs text-slate-500 italic">No active layers</div>';
            return;
        }

        layers.forEach(function(layerId) {
            var parts = layerId.split(':');
            var collectionId = parts[1];
            var item = document.createElement('div');
            item.className = 'flex items-center justify-between bg-slate-800/50 p-2 rounded text-sm border border-slate-700/50';
            item.innerHTML = `
                <span class="text-slate-300 truncate" title="${layerId}"><i class="fa-solid fa-layer-group text-slate-500 mr-2 text-xs"></i>${collectionId}</span>
                <button onclick="removeLayerFromMap('${layerId}')" class="text-red-400 hover:text-red-300 ml-2" title="Hide layer"><i class="fa-solid fa-eye-slash text-xs"></i></button>
            `;
            list.appendChild(item);
        });
    }

    window.removeLayerFromMap = function(layerId) {
        if (activeLayers[layerId]) {
            map.removeLayer(activeLayers[layerId]);
            delete activeLayers[layerId];
        }
        renderActiveLayersList();
    }

    // Init Logic — delay lets the flex layout settle before Leaflet measures the container
    setTimeout(function() {
        initMap();
        // Invalidate size after a second tick in case the container resized post-init
        setTimeout(function() { if (map) map.invalidateSize(); }, 200);
    }, 100);
</script>
