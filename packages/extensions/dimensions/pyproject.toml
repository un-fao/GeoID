[project]
name = "dynastore-ext-dimensions"
dynamic = ["version"]
description = "DynaStore Dimensions extension — OGC datacube dimensions API."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "ogc-dimensions @ git+https://github.com/ccancellieri/ogc-dimensions.git@main#subdirectory=reference-implementation",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
dimensions = "dynastore.extensions.dimensions.dimensions_extension:DimensionsExtension"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.dimensions" = ["examples/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/dimensions/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
