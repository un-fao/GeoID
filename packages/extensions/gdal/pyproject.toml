[project]
name = "dynastore-ext-gdal"
dynamic = ["version"]
description = "DynaStore GDAL extension — gdalinfo + raster utilities."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "GDAL==3.13.0",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "dynastore-ext-httpx",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
gdal = "dynastore.extensions.gdal.gdal_service:GdalService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }
dynastore-ext-httpx = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/gdal/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
