[project]
name = "dynastore-ext-gdal"
version = "0.0.0"
description = "DynaStore GDAL extension — gdalinfo + raster utilities."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "GDAL==3.12.3",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
gdal = "dynastore.extensions.gdal.gdal_service:GdalService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
