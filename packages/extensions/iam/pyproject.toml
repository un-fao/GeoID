[project]
name = "dynastore-ext-iam"
dynamic = ["version"]
description = "DynaStore IAM extension — identity, access management, API keys, middleware."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "httpx>=0.24.1",
    "PyJWT>=2.8.0",
    "dynastore-ext-web",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
iam = "dynastore.extensions.iam.service:IamExtension"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }
dynastore-ext-web = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/iam/_scm_version.py"
local_scheme = "no-local-version"

fallback_version = "0.0.0+unknown"
