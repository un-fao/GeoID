[project]
name = "dynastore-ext-configs"
dynamic = ["version"]
description = "DynaStore Configs extension — Configuration REST API, waterfall resolution, JSON Hyper-Schema links."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
configs = "dynastore.extensions.configs.service:ConfigsService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/configs/_scm_version.py"
local_scheme = "no-local-version"

fallback_version = "0.0.0+unknown"
