<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | Features Browser</title>

    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Favicon and Fonts -->
    <link rel="icon" type="image/png" href="../static/dynastore.png">
    <link rel="stylesheet" href="../static/vendor/vendor.css"/>
    <link rel="stylesheet" href="../static/common/tailwind.css">
    <link rel="stylesheet" href="../static/common/page-shell.css">
    <script src="../static/common/page-shell.js"></script>

    <style>
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar: uses .ds-sidebar utility from page-shell.css */
        #sidebar-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
        #items-list { flex: 1; overflow-y: auto; padding: 0.5rem; }

        .feature-card {
            padding: 0.5rem 0.75rem;
            border-radius: 0.4rem;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 0.2rem;
            font-size: 0.82rem;
            color: #e2e8f0;
            transition: background 0.15s;
        }
        .feature-card:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
        .feature-card.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); }
        .feature-card .fid { font-family: monospace; font-size: 0.75rem; color: #94a3b8; }

        /* Map area */
        #map-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #features-map { flex: 1; min-height: 0; }

        /* Create panel */
        #create-panel {
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        #create-panel summary {
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            user-select: none;
        }
        #create-panel summary:hover { color: #e2e8f0; }
        .form-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; flex-wrap: wrap; }
        .form-input {
            padding: 0.35rem 0.6rem;
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.35rem;
            color: #e2e8f0;
            font-size: 0.8rem;
            outline: none;
        }
        .form-input:focus { border-color: rgba(59,130,246,0.5); }
        .btn-primary {
            padding: 0.35rem 0.85rem;
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 0.35rem;
            color: #93c5fd;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: rgba(59,130,246,0.35); }

        .notice-box { padding: 0.5rem 0.75rem; border-radius: 0.35rem; font-size: 0.78rem; margin-top: 0.4rem; }
        .notice-ok { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
        .notice-err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
        .loading-spinner { text-align: center; padding: 2rem 1rem; color: #64748b; font-size: 0.85rem; }
    </style>
</head>
<body class="ds-page-body">

    <ds-page-shell
        id="page-shell"
        data-title="Agro-Informatics Platform: Features Browser"
        data-back-label="Back to Home">
    </ds-page-shell>

    <div class="main-layout">
        <!-- Sidebar: context picker + feature list -->
        <div id="sidebar" class="ds-sidebar">
            <div id="sidebar-header">
                <!-- Context bar (catalog + collection selector) -->
                <div id="cs-container" style="margin-bottom:0.5rem;"></div>
            </div>
            <div id="items-list">
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i><p id="lbl-select-collection" style="margin-top:0.4rem;">Select a catalog and collection.</p></div>
            </div>
        </div>

        <!-- Map + create panel -->
        <div id="map-area">
            <div id="features-map"></div>

            <!-- Create feature panel (collapsed by default) -->
            <div id="create-panel">
                <details id="create-details">
                    <summary id="lbl-create-summary"><i class="fa-solid fa-plus" style="margin-right:0.35rem;"></i>Create feature</summary>
                    <div style="margin-top:0.5rem;">
                        <div class="form-row">
                            <input class="form-input" id="input-lon" type="number" step="any" placeholder="Longitude" style="width:7rem;">
                            <input class="form-input" id="input-lat" type="number" step="any" placeholder="Latitude" style="width:7rem;">
                            <input class="form-input" id="input-props" type="text" placeholder='{"name":"value"}' style="flex:1;min-width:10rem;">
                            <button class="btn-primary" id="btn-create-feature"><i class="fa-solid fa-paper-plane" style="margin-right:0.3rem;"></i><span id="lbl-create-btn">Create</span></button>
                        </div>
                        <div id="create-notice" style="display:none;"></div>
                    </div>
                </details>
            </div>
        </div>
    </div>

    <!-- VERSION: {{VERSION}} -->
    <script type="module" src="../features/features_browser.js"></script>

</body>
</html>
