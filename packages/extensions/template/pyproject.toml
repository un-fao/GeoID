[project]
name = "dynastore-ext-template"
version = "0.0.0"
description = "DynaStore Template extension — Jinja2 + WMS XML for catalog content."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "attrs>=25.3.0",
    "aiohttp>=3.12.15",
    "jinja2>=3.1.6",
    "xmltodict>=0.13.0",
    "httpx>=0.24.1",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
template = "dynastore.extensions.template.templating:TemplatingExtension"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.template" = ["*.html", "*.jinja2", "*.xml"]
