<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | EDR Browser {{VERSION}}</title>

    <!-- Favicon and Fonts -->
    <link rel="icon" type="image/png" href="../static/dynastore.png">
    <link rel="stylesheet" href="../static/vendor/vendor.css"/>
    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Shared base styles -->
    <link rel="stylesheet" href="../static/common/tailwind.css">
    <link rel="stylesheet" href="../static/common/admin.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }
        .header-title { display: flex; align-items: center; gap: 0.75rem; font-weight: bold; font-size: 1.1rem; color: white; }
        .header-title img { width: 2rem; height: 2rem; border-radius: 0.4rem; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
        .back-link:hover { color: white; }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            min-width: 220px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(255,255,255,0.07);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        [data-ogc-nav] {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        [data-ogc-nav] ul { list-style: none; margin: 0; padding: 0; }
        [data-ogc-nav] li { margin-bottom: 0.2rem; }
        [data-ogc-nav] button {
            width: 100%;
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-radius: 0.4rem;
            border: 1px solid transparent;
            background: transparent;
            color: #e2e8f0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        [data-ogc-nav] button:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }

        /* Detail + map area */
        #detail-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        [data-ogc-body] {
            padding: 1rem 1.5rem;
            overflow-y: auto;
            max-height: 50%;
            min-height: 8rem;
            background: #020617;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        /* EDR query form elements — readable on dark theme */
        .edr-label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin: 0.5rem 0 0.2rem;
        }
        .edr-input {
            display: block;
            width: 100%;
            padding: 0.4rem 0.6rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.35rem;
            color: #e2e8f0;
            font-size: 0.82rem;
            outline: none;
            box-sizing: border-box;
        }
        .edr-input:focus { border-color: rgba(59,130,246,0.5); }
        .edr-btn {
            margin-top: 0.65rem;
            padding: 0.35rem 0.9rem;
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 0.35rem;
            color: #93c5fd;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .edr-btn:hover { background: rgba(59,130,246,0.35); }
        .edr-output {
            margin-top: 0.75rem;
            padding: 0.5rem 0.75rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 0.35rem;
            color: #94a3b8;
            font-size: 0.75rem;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 12rem;
            overflow-y: auto;
        }

        [data-ogc-map] {
            flex: 1;
            min-height: 0;
        }

        .loading-spinner { text-align: center; padding: 2rem 1rem; color: #64748b; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <img src="../static/dynastore.png" alt="AIP Logo">
            <span>Agro-Informatics Platform: EDR Browser</span>
        </div>
        <a href="../" class="back-link" id="back-home-link"
           onclick="(function(e){if(window.parent!==window&&typeof window.parent.switchTab==='function'){e.preventDefault();window.parent.switchTab('home');}})(event)">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </header>

    <div class="main-layout" data-ogc-root>
        <!-- Sidebar: catalog + collection navigation -->
        <div id="sidebar">
            <div id="sidebar-header">
                <span style="font-size:0.75rem;color:#64748b;">Select a catalog, then a collection.</span>
            </div>
            <div data-ogc-nav>
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
            </div>
        </div>

        <!-- Detail pane: query form above, map below -->
        <div id="detail-area">
            <div data-ogc-body></div>
            <div data-ogc-map id="edr-map"></div>
        </div>
    </div>

    <!-- VERSION: {{VERSION}} -->
    <script type="module" src="../edr/edr_browser.js"></script>

</body>
</html>
