[project]
name = "dynastore-ext-edr"
dynamic = ["version"]
description = "DynaStore OGC API - Environmental Data Retrieval (EDR) extension."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
edr = "dynastore.extensions.edr.edr_service:EDRService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/edr/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
