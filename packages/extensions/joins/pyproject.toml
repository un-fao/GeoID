[project]
name = "dynastore-ext-joins"
dynamic = ["version"]
description = "DynaStore Joins extension — OGC API joins surface."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "google-cloud-bigquery",
    "db-dtypes",
    "pandas",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
joins = "dynastore.extensions.joins.joins_service:JoinsService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/joins/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
