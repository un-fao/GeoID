[project]
name = "dynastore-ext-joins"
version = "0.0.0"
description = "DynaStore Joins extension — OGC API joins surface."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "google-cloud-bigquery",
    "db-dtypes",
    "pandas",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
joins = "dynastore.extensions.joins.joins_service:JoinsService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
