[project]
name = "dynastore-ext-web"
dynamic = ["version"]
description = "DynaStore Web extension — FastAPI app wiring, CORS, static file serving, web dashboard."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "uvicorn",
    "markdown>=3.3.7",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
web = "dynastore.extensions.web.web:Web"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.web" = ["static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/web/_scm_version.py"
local_scheme = "no-local-version"

fallback_version = "0.0.0+unknown"
