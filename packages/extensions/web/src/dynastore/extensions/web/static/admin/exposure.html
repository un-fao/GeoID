<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Exposure — DynaStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../static/common/admin.css">
</head>
<body>
  <main>
    <header class="masthead">
      <div class="folio">V.</div>
      <div>
        <div class="kicker">DynaStore — Atlas of exposure</div>
        <h1>Service Exposure</h1>
      </div>
      <div class="stamp" id="masthead-stamp"></div>
    </header>

    <p class="subtitle">
      Enable or disable extensions at platform or catalog scope. The catalog
      column overrides the platform default; changes apply immediately on
      Save.
    </p>

    <section class="plate">
      <div class="plate-header">
        <h3>Scope</h3>
        <div class="plate-meta">EXPOSURE TARGET</div>
      </div>
      <fieldset class="scope-kind">
        <label class="scope-radio">
          <input type="radio" name="scope" value="platform" checked>
          Platform
        </label>
        <label class="scope-radio">
          <input type="radio" name="scope" value="catalog">
          Catalog
        </label>
        <select id="catalog-select" class="threeway-select" disabled>
          <option value="">— select catalog —</option>
        </select>
      </fieldset>
    </section>

    <section class="plate">
      <div class="plate-header">
        <h3>Extensions</h3>
        <div class="plate-meta" id="exposure-meta">PLATFORM</div>
      </div>
      <table id="exposure-grid">
        <thead>
          <tr>
            <th>Extension</th>
            <th>Platform</th>
            <th>Catalog override</th>
            <th>Effective</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty-row"><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
      <div class="form-actions">
        <button id="revert" class="btn btn-secondary" type="button">Revert</button>
        <button id="apply" class="btn" type="button">Apply</button>
        <span id="status" class="status"></span>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("masthead-stamp").textContent =
      `FOLIO ${new Date().toISOString().slice(0, 10)}\nREV. ${Math.floor(Math.random()*900+100)}`;
  </script>
  <script type="module" src="exposure.js"></script>
</body>
</html>
