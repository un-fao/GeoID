<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Exposure — DynaStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../static/common/admin.css">
  <link rel="stylesheet" href="../static/common/page-shell.css">
  <script src="../static/common/page-shell.js"></script>
</head>
<body>
  <ds-page-shell
    data-title="Service Exposure"
    data-breadcrumb="DynaStore — Atlas of exposure"
    data-back-label="Back to Home">
  </ds-page-shell>
  <main>

    <p class="subtitle">
      Enable or disable extensions at platform or catalog scope. The catalog
      column overrides the platform default; changes apply immediately on
      Save.
    </p>

    <section class="plate">
      <div class="plate-header">
        <h3>Scope</h3>
        <div class="plate-meta">EXPOSURE TARGET</div>
      </div>
      <fieldset class="scope-kind">
        <label class="scope-radio">
          <input type="radio" name="scope" value="platform" checked>
          Platform
        </label>
        <label class="scope-radio">
          <input type="radio" name="scope" value="catalog">
          Catalog
        </label>
        <select id="catalog-select" class="threeway-select" disabled>
          <option value="">— select catalog —</option>
        </select>
      </fieldset>
    </section>

    <section class="plate">
      <div class="plate-header">
        <h3>Extensions</h3>
        <div class="plate-meta" id="exposure-meta">PLATFORM</div>
      </div>
      <table id="exposure-grid">
        <thead>
          <tr>
            <th>Extension</th>
            <th>Platform</th>
            <th>Catalog override</th>
            <th>Effective</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty-row"><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
      <div class="form-actions">
        <button id="revert" class="btn btn-secondary" type="button">Revert</button>
        <button id="apply" class="btn" type="button">Apply</button>
        <span id="status" class="status"></span>
      </div>
    </section>
  </main>

  <script type="module" src="../static/admin/exposure.js"></script>
</body>
</html>
