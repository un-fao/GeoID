[project]
name = "dynastore-ext-connected-systems"
dynamic = ["version"]
description = "DynaStore OGC API - Connected Systems extension."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "sqlalchemy[asyncio]>=2.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
connected_systems = "dynastore.extensions.connected_systems.consys_service:ConnectedSystemsService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/connected_systems/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
