[project]
name = "dynastore-ext-dggs"
dynamic = ["version"]
description = "DynaStore DGGS extension — discrete global grid system endpoints."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "h3>=4.1.0",
    "s2sphere>=0.2.5",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
dggs = "dynastore.extensions.dggs.dggs_service:DGGSService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/dggs/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
