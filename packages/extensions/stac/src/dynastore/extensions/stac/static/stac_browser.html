<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | STAC Browser {{VERSION}}</title>

    <!-- Favicon and Fonts -->
    <link rel="icon" type="image/png" href="../static/dynastore.png">
    <link rel="stylesheet" href="../static/vendor/vendor.css"/>
    <!-- Marked.js for rendering description markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin=""></script>
    <!-- Leaflet 1.9.4 (same version as map_viewer) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Shared base styles (read-only reuse) -->
    <link rel="stylesheet" href="../static/common/tailwind.css">
    <link rel="stylesheet" href="../static/common/admin.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }
        .header-title { display: flex; align-items: center; gap: 0.75rem; font-weight: bold; font-size: 1.1rem; color: white; }
        .header-title img { width: 2rem; height: 2rem; border-radius: 0.4rem; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
        .back-link:hover { color: white; }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            min-width: 220px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(255,255,255,0.07);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        #breadcrumb {
            font-size: 0.7rem;
            color: #64748b;
            padding: 0.5rem 1rem 0;
            min-height: 1.5rem;
        }
        .bc-link {
            cursor: pointer;
            color: #94a3b8;
        }
        .bc-link:hover { color: #60a5fa; }

        #items-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .item-card {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        .item-card:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
        .item-card.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); }
        .item-card .icon { color: #3b82f6; width: 1.25rem; text-align: center; flex-shrink: 0; }
        .item-card .label { font-size: 0.85rem; font-weight: 500; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-card .sublabel { font-size: 0.7rem; color: #64748b; }

        /* Create action buttons in sidebar footer */
        #sidebar-actions {
            padding: 0.75rem 1rem;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .btn-action {
            width: 100%;
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 0.4rem;
            border: 1px solid rgba(59,130,246,0.35);
            background: rgba(59,130,246,0.1);
            color: #93c5fd;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s;
        }
        .btn-action:hover { background: rgba(59,130,246,0.2); }

        /* Create forms (initially hidden) */
        .create-form {
            padding: 1rem;
            background: rgba(15,23,42,0.98);
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .create-form h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin: 0 0 0.75rem 0;
        }
        .form-group { margin-bottom: 0.6rem; }
        .form-label {
            display: block;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }
        .form-input {
            width: 100%;
            padding: 0.4rem 0.6rem;
            background: rgba(30,41,59,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.35rem;
            color: #e2e8f0;
            font-size: 0.82rem;
            outline: none;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: rgba(59,130,246,0.5); }
        .form-textarea {
            resize: vertical;
            min-height: 4rem;
        }
        .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .btn-submit {
            flex: 1;
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 0.35rem;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
        .btn-submit:hover { background: #2563eb; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-cancel {
            flex: 1;
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 0.35rem;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }

        /* Detail pane */
        #detail-pane {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            background: #020617;
        }
        #detail-title { font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 0.25rem; }
        #detail-desc { font-size: 0.875rem; color: #94a3b8; margin-bottom: 1rem; max-width: 700px; }
        .detail-meta { font-size: 0.75rem; color: #475569; margin-bottom: 1.5rem; }
        .detail-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #3b82f6; margin: 1.5rem 0 0.75rem; }
        .prop-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .prop-table td { padding: 0.4rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
        .prop-table td:first-child { color: #64748b; width: 35%; font-family: monospace; }
        .prop-table td:last-child { color: #e2e8f0; word-break: break-all; }

        .badge { display: inline-block; font-size: 0.65rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 9999px; margin: 0.1rem; }
        .badge-blue { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
        .badge-green { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }

        .loading-spinner { text-align: center; padding: 3rem 1rem; color: #64748b; }
        .error-box { padding: 1rem; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 0.5rem; color: #f87171; font-size: 0.85rem; }
        .success-box { padding: 0.6rem 0.75rem; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); border-radius: 0.4rem; color: #86efac; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .search-input {
            width: 100%; padding: 0.5rem 0.75rem; background: rgba(30,41,59,0.7);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 0.4rem;
            color: #e2e8f0; font-size: 0.85rem; outline: none;
            box-sizing: border-box;
        }
        .search-input:focus { border-color: rgba(59,130,246,0.5); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <img src="../static/dynastore.png" alt="AIP Logo">
            <span>Agro-Informatics Platform: STAC Browser</span>
        </div>
        <!--
            "Back to Home" works in both contexts:
            - Embedded in the shell iframe: calls parent.switchTab('home') if available.
            - Standalone: follows the href="../" fallback normally.
        -->
        <a href="../" class="back-link" id="back-home-link"
           onclick="(function(e){if(window.parent!==window&&typeof window.parent.switchTab==='function'){e.preventDefault();window.parent.switchTab('home');}})(event)">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </header>

    <div class="main-layout">
        <!-- Sidebar -->
        <div id="sidebar">
            <div id="sidebar-header">
                <input class="search-input" id="search-box" type="text" placeholder="Filter…">
            </div>
            <div id="breadcrumb"></div>
            <div id="items-list">
                <div class="loading-spinner">
                    <i class="fa-solid fa-circle-notch fa-spin text-xl"></i>
                    <p class="mt-2 text-sm">Loading catalogs…</p>
                </div>
            </div>

            <!-- Create-catalog action button (shown at catalog level) -->
            <div id="sidebar-actions">
                <button id="btn-create-catalog" class="btn-action" type="button">
                    + Create catalog
                </button>
                <!-- shown only when a catalog is selected -->
                <button id="btn-create-collection" class="btn-action" type="button" style="display:none;">
                    + Create collection
                </button>
            </div>

            <!-- Create catalog form (hidden until the button above is clicked) -->
            <form id="form-create-catalog" class="create-form" hidden>
                <h4 id="lbl-create-catalog">Create catalog</h4>
                <div class="form-group">
                    <label class="form-label" for="input-catalog-id" id="lbl-cat-id">ID</label>
                    <input class="form-input" id="input-catalog-id" type="text" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-catalog-title" id="lbl-cat-title">Title</label>
                    <input class="form-input" id="input-catalog-title" type="text" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-catalog-description" id="lbl-cat-desc">Description</label>
                    <textarea class="form-input form-textarea" id="input-catalog-description"></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn-cancel btn-cancel-form" type="button">Cancel</button>
                    <button class="btn-submit btn-submit-form" id="btn-submit-catalog" type="submit">Create</button>
                </div>
            </form>

            <!-- Create collection form (hidden until the button above is clicked) -->
            <form id="form-create-collection" class="create-form" hidden>
                <h4 id="lbl-create-collection">Create collection</h4>
                <div class="form-group">
                    <label class="form-label" for="input-coll-id" id="lbl-coll-id">ID</label>
                    <input class="form-input" id="input-coll-id" type="text" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-coll-title" id="lbl-coll-title">Title</label>
                    <input class="form-input" id="input-coll-title" type="text" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-coll-description" id="lbl-coll-desc">Description</label>
                    <textarea class="form-input form-textarea" id="input-coll-description"></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn-cancel btn-cancel-form" type="button">Cancel</button>
                    <button class="btn-submit btn-submit-form" id="btn-submit-coll" type="submit">Create</button>
                </div>
            </form>
        </div>

        <!-- Detail pane — item geometry, properties, collection/catalog metadata -->
        <div id="detail-pane">
            <div style="text-align:center; padding:4rem 1rem; color:#334155;">
                <i class="fa-solid fa-layer-group text-5xl mb-4" style="color:#1e3a5f;"></i>
                <p class="text-slate-400 mt-4">Select a catalog or collection from the sidebar to explore it.</p>
            </div>
        </div>
    </div>

    <script type="module" src="../stac/stac_browser.js"></script>

</body>
</html>
