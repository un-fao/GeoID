[project]
name = "dynastore-ext-stac"
dynamic = ["version"]
description = "DynaStore STAC API extension — items + collections + search."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "pystac[validation]>=1.13.0",
    "stac-pydantic[validation]>=3.1.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
stac = "dynastore.extensions.stac.stac_service:STACService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.stac" = ["*.md", "hierarchy/**/*", "notebooks/**/*", "static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/stac/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
