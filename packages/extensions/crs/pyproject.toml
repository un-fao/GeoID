[project]
name = "dynastore-ext-crs"
version = "0.0.0"
description = "DynaStore CRS extension — coordinate reference system registry."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "pyproj>=3.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
crs = "dynastore.extensions.crs.crs_extension:CRSExtension"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
