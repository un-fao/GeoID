# dynastore-ext-stats — second pilot wheel for the per-extension wheel migration.

[project]
name = "dynastore-ext-stats"
dynamic = ["version"]
description = "DynaStore Stats extension — per-catalog usage stats REST surface."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
stats = "dynastore.extensions.stats.extension:StatsExtension"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.stats" = ["*.md", "static/*"]

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/stats/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
