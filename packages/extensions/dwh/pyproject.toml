[project]
name = "dynastore-ext-dwh"
version = "0.0.0"
description = "DynaStore DWH extension — BigQuery-backed analytic joins."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "google-cloud-bigquery",
    "db-dtypes",
    "pandas",
    "pyproj>=3.0.0",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
dwh = "dynastore.extensions.dwh.dwh:DwhService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }
