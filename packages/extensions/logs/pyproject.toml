[project]
name = "dynastore-ext-logs"
dynamic = ["version"]
description = "DynaStore Logs extension — catalog event logging, log REST API, Kibana integration."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "httpx>=0.24.1",
    "dynastore-ext-web",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
logs = "dynastore.extensions.logs.log_extension:LogExtension"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"dynastore.extensions.logs" = ["static/*.html", "kibana/*.ndjson", "static/**/*"]

[tool.uv.sources]
dynastore = { workspace = true }
dynastore-ext-web = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/logs/_scm_version.py"
local_scheme = "no-local-version"

fallback_version = "0.0.0+unknown"
