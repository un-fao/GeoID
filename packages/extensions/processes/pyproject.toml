[project]
name = "dynastore-ext-processes"
dynamic = ["version"]
description = "DynaStore Processes extension — OGC API - Processes."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "jsonschema",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
processes = "dynastore.extensions.processes.processes_service:ProcessesService"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
dynastore = { workspace = true }

[tool.setuptools_scm]
version_file = "src/dynastore/extensions/processes/_scm_version.py"
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"
