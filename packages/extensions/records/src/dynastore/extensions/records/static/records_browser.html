<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | Records Browser {{VERSION}}</title>
    <link rel="icon" type="image/png" href="../static/dynastore.png">
    <link rel="stylesheet" href="../static/vendor/vendor.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="../static/common/admin.css">
    <style>
        body { font-family:'Inter',sans-serif; background:#020617; color:#e2e8f0; margin:0; height:100vh; display:flex; flex-direction:column; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.5rem; background:rgba(15,23,42,0.85); border-bottom:1px solid rgba(255,255,255,0.08); }
        .header-title { display:flex; align-items:center; gap:0.75rem; font-weight:bold; color:white; }
        .header-title img { width:2rem; height:2rem; border-radius:0.4rem; }
        .back-link { color:#94a3b8; text-decoration:none; font-size:0.875rem; }
        .back-link:hover { color:white; }
        .main-layout { display:flex; flex:1; overflow:hidden; }
        #sidebar { width:300px; min-width:240px; background:rgba(15,23,42,0.95); border-right:1px solid rgba(255,255,255,0.07); overflow-y:auto; padding:0.75rem; }
        #sidebar ul { list-style:none; padding:0; margin:0; }
        #sidebar li { margin:0.2rem 0; }
        #sidebar button { width:100%; text-align:left; padding:0.5rem 0.7rem; background:rgba(30,41,59,0.5); border:1px solid transparent; border-radius:0.4rem; color:#e2e8f0; cursor:pointer; font-size:0.85rem; }
        #sidebar button:hover { background:rgba(59,130,246,0.12); border-color:rgba(59,130,246,0.25); }
        #detail-pane { flex:1; overflow-y:auto; padding:1.5rem 2rem; background:#020617; }
        #detail-pane table { width:100%; border-collapse:collapse; font-size:0.82rem; }
        #detail-pane td { padding:0.4rem 0.6rem; border-bottom:1px solid rgba(255,255,255,0.06); }
        #detail-pane h3 { font-size:1.1rem; color:white; margin:0 0 0.75rem; }
        #records-map { height:320px; border-radius:0.5rem; margin-top:1rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">
            <img src="../static/dynastore.png" alt="AIP Logo">
            <span>Agro-Informatics Platform: Records Browser</span>
        </div>
        <a href="../" class="back-link"
           onclick="(function(e){if(window.parent!==window&&typeof window.parent.switchTab==='function'){e.preventDefault();window.parent.switchTab('home');}})(event)">
            ← Back to Home
        </a>
    </header>
    <div class="main-layout" data-ogc-root>
        <div id="sidebar"><div data-ogc-nav></div></div>
        <div id="detail-pane">
            <div data-ogc-body></div>
            <div data-ogc-map id="records-map"></div>
        </div>
    </div>
    <script type="module" src="../records/records_browser.js"></script>
</body>
</html>
