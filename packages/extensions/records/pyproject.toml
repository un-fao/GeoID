[project]
name = "dynastore-ext-records"
version = "0.0.0"
description = "DynaStore OGC API - Records extension."
requires-python = ">=3.12"
license-files = ["../../../LICENSE"]
dependencies = [
    "fastapi>=0.100",
    "pygeofilter[backend-sqlalchemy]",
    "DynaStore",
]

[project.entry-points."dynastore.extensions"]
records = "dynastore.extensions.records.records_service:RecordsService"

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
