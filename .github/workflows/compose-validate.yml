name: Compose Validate

# Validates the canonical compose files in two layers:
#   1. `validate` — `docker compose config --quiet` (structural; closes #575)
#   2. `build`    — `docker buildx bake catalog` against the compose file,
#                   exercising the actual `context:` / `dockerfile:` paths
#                   (closes #582; PR #581 caught the 5-day-latent context drift
#                   from the Phase-1 packages/core move that `config --quiet`
#                   could not see).
#
# Uses only safe expression contexts (no untrusted user input flows into
# any `run:` shell — github.ref is used in concurrency.group only, which
# GitHub escapes server-side).

on:
  pull_request:
    paths:
      - 'packages/core/src/dynastore/docker/docker-compose*.yml'
      - 'packages/core/src/dynastore/docker/compose.*.yml'
      - 'packages/core/src/dynastore/docker/Dockerfile'
      - 'packages/core/src/dynastore/docker/Dockerfile.db'
      - 'packages/core/pyproject.toml'
      - 'packages/extensions/**/pyproject.toml'
      - 'pyproject.toml'
      - 'LICENSE'
      - 'README.md'
      - '.github/workflows/compose-validate.yml'
  workflow_dispatch:


concurrency:
  group: compose-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # .env is gitignored. Copy the tracked .env.example so variable
      # interpolation has values; the values don't need to be valid since
      # `config --quiet` only checks structure.
      - name: Seed .env from .env.example
        working-directory: packages/core/src/dynastore/docker
        run: cp .env.example .env

      - name: Validate base compose (standalone)
        run: |
          docker compose \
            -f packages/core/src/dynastore/docker/docker-compose.yml \
            config --quiet

      # The load-bearing check from #575: dev.yml must parse on its own.
      # A base-only service added without a matching dev.yml `extends`
      # block will fail this step with "depends on undefined service".
      - name: Validate dev compose (standalone)
        run: |
          docker compose \
            -f packages/core/src/dynastore/docker/docker-compose.dev.yml \
            config --quiet

      - name: Validate merged base + dev compose
        run: |
          docker compose \
            -f packages/core/src/dynastore/docker/docker-compose.yml \
            -f packages/core/src/dynastore/docker/docker-compose.dev.yml \
            config --quiet

  # Closes #582 — exercise the actual compose build path so that any future
  # drift between `context:` / `dockerfile:` and the Dockerfile's COPY
  # expectations fails CI within the PR (not 5 days later in deploy).
  # The latent regression from `6d8aef8` (Phase 1 packages/core move) shipped
  # because test.yml builds via `docker/build-push-action` with `context: .`
  # — it never traverses the compose-side path resolution that prod uses.
  #
  # Uses `docker buildx bake` against the compose file because it reads the
  # `build:` block directly and resolves `context:` relative to the file,
  # exactly like `docker compose build`. Targets the `tester` stage (cheapest
  # that exercises all COPYs incl. `COPY tests`, `COPY packages`) and shares
  # GHA cache `scope=tester` with test.yml so warm runs land in seconds.
  build:
    runs-on: ubuntu-22.04
    needs: validate
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Bake reads `context:` relative to the compose file, which references
      # ../../../../.. — i.e. the repo root. Free disk so the resulting image
      # layers don't push past the 14 GB default (same recipe as test.yml).
      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Seed .env from .env.example
        working-directory: packages/core/src/dynastore/docker
        run: cp .env.example .env

      - uses: docker/setup-buildx-action@v3

      # `set:` injects buildx cache hooks without modifying the tracked
      # compose file. Cache scope matches test.yml's `tester` so we ride its
      # warm layers; `target=tester` overrides the default runtime stage
      # (full prod image is ~3 GB heavier and unnecessary for COPY validation).
      # SCOPE=all matches test.yml so the pip-install layer is shared too.
      - name: Bake catalog from compose (tester stage, gha cache)
        uses: docker/bake-action@v6
        with:
          workdir: packages/core/src/dynastore/docker
          files: docker-compose.yml
          targets: catalog
          load: false
          push: false
          set: |
            *.target=tester
            *.args.SCOPE=all
            *.args.BUILD_JUPYTERLITE=false
            *.cache-from=type=gha,scope=tester
            *.cache-to=type=gha,mode=max,scope=tester
