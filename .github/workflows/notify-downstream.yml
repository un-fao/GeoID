name: Notify Downstream

# Generic post-push hook — notifies dependent repos so they can react.
# Repo list is in the DOWNSTREAM_REPOS variable (Settings > Variables), not in code.
# Uses the org GitHub App (AUTOMATION_APP_ID / B64_AUTOMATION_APP_KEY) for auth.

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode GitHub App private key
        id: decode
        env:
          B64_KEY: ${{ secrets.B64_AUTOMATION_APP_KEY }}
        run: |
          DECODED=$(echo "$B64_KEY" | base64 -d)
          # Mask every line so the key never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$DECODED"
          {
            echo "private_key<<PRIVATE_KEY_EOF"
            echo "$DECODED"
            echo "PRIVATE_KEY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: auth
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ steps.decode.outputs.private_key }}
          repositories: ${{ vars.DOWNSTREAM_REPOS }}

      - name: Dispatch to downstream repos
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          DOWNSTREAM_REPOS: ${{ vars.DOWNSTREAM_REPOS }}
          PUSH_SHA: ${{ github.sha }}
          PUSH_REF: ${{ github.ref }}
        run: |
          IFS=',' read -ra REPOS <<< "$DOWNSTREAM_REPOS"
          for repo in "${REPOS[@]}"; do
            repo=$(echo "$repo" | xargs)
            [ -z "$repo" ] && continue
            echo "Notifying $repo..."
            gh api "repos/un-fao/${repo}/dispatches" \
              -f event_type=geoid-refs-updated \
              -f "client_payload[sha]=${PUSH_SHA}" \
              -f "client_payload[ref]=${PUSH_REF}" \
              || echo "::warning::Failed to notify $repo"
          done
