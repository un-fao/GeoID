name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      level:
        description: 'Bump level (leave empty for patch, or "major")'
        required: false
        default: ''

jobs:
  bump:
    # Only run when a PR was actually merged (not just closed), or via manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Bump version
        env:
          BUMP_LEVEL: ${{ github.event.inputs.level }}
        run: |
          chmod +x docker/scripts/bump-version.sh
          if [ -n "$BUMP_LEVEL" ]; then
            docker/scripts/bump-version.sh "$BUMP_LEVEL"
          else
            docker/scripts/bump-version.sh
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(cat VERSION)
          git add VERSION
          git diff --cached --quiet && echo "No version change" && exit 0
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push
