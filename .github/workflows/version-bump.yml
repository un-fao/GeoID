name: Tag Version

# Tag the merge commit on main with the next semver. The repo's version
# is derived from the latest reachable tag by setuptools-scm at build time —
# no VERSION file, no bump commit, no merge conflicts on feature branches.
#
# Triggers:
#   - push to main (PR merges + direct commits)
#   - workflow_dispatch (manual major/minor bump)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      level:
        description: 'Bump level'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

concurrency:
  group: tag-version
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Compute next tag
        id: tag
        env:
          LEVEL: ${{ github.event.inputs.level || 'patch' }}
        run: |
          set -euo pipefail
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -n1)
          LATEST="${LATEST#v}"
          LATEST="${LATEST:-0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          case "$LEVEL" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch|"")
              PATCH=$((PATCH + 1))
              if [ "$PATCH" -gt 99 ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              fi
              ;;
            *) echo "Unknown level: $LEVEL" >&2; exit 1 ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Tagging v${NEW} (was v${LATEST}, level=${LEVEL})"

      - name: Push tag
        env:
          NEW: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${NEW}" -m "Release v${NEW}"
          git push origin "v${NEW}"
