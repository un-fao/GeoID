name: Test

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore: ['geoid-refs.json', 'VERSION']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        type: boolean
        default: true

  # Reusable — called by deployment repos (dynastore, catalog, etc.) to gate deploys
  workflow_call:
    inputs:
      run_integration:
        type: boolean
        default: true
    outputs:
      tests_passed:
        description: "'true' if all tests passed"
        value: ${{ jobs.test.outputs.tests_passed }}
      artifact_name:
        description: "Name of the uploaded test badge artifact"
        value: ${{ jobs.test.outputs.artifact_name }}

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  typecheck:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies for type checking
        run: |
          pip install "pyright>=1.1.390"
          pip install -e ".[all]"

      - name: Run Pyright
        run: pyright src/dynastore/ --warnings

  test:
    runs-on: ubuntu-22.04
    # Belt-and-braces timeout. ``pytest-timeout`` in pytest.ini is the
    # primary defence against individual-test hangs; this job-level
    # ``timeout-minutes`` catches hangs that escape pytest (docker-compose
    # build stuck, pytest bootstrap stalled, etc.). 45min is ~3x the
    # historical norm; any run approaching it is a genuine infra issue.
    # Static config — no untrusted-input interpolation.
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
      pull-requests: write

    outputs:
      tests_passed: ${{ steps.set-result.outputs.tests_passed }}
      artifact_name: ${{ steps.set-artifact.outputs.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Build test infrastructure
        run: docker compose -f src/dynastore/docker/docker-compose.test.yml build

      - name: Run unit tests
        id: unit
        run: |
          docker compose -f src/dynastore/docker/docker-compose.test.yml run --rm test-runner \
            /opt/venv/bin/pytest tests/ --ignore-glob="**/integration/*" \
            --junitxml=/dynastore/workspace/unit-test-results.xml

      - name: Report unit tests
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Tests
          path: './unit-test-results.xml'
          reporter: java-junit

      - name: Generate unit badge
        if: always()
        uses: ./.github/actions/test-badge
        with:
          junit-xml-path: './unit-test-results.xml'
          output-path: 'unit-badge.svg'
          label: 'Unit Tests'

      - name: Run integration tests
        id: integration
        # inputs.run_integration is only set for workflow_dispatch / workflow_call.
        # For push/pull_request it is undefined (''), which GitHub Actions coerces
        # to false in a boolean comparison — so `!= false` would evaluate to false
        # and the step would be silently skipped.  Use a string comparison instead:
        # 'false' only when the caller explicitly passes run_integration=false.
        if: ${{ inputs.run_integration != 'false' }}
        run: |
          docker compose -f src/dynastore/docker/docker-compose.test.yml run --rm test-runner \
            /opt/venv/bin/pytest tests/ \
            --junitxml=/dynastore/workspace/test-results.xml

      - name: Display Docker logs on failure
        if: failure()
        run: |
          docker compose -f src/dynastore/docker/docker-compose.test.yml logs catalog
          docker compose -f src/dynastore/docker/docker-compose.test.yml logs worker
          docker compose -f src/dynastore/docker/docker-compose.test.yml logs test-runner

      - name: Report integration tests
        uses: dorny/test-reporter@v3
        # Only report when the integration step actually ran (produced an XML).
        # When the step is skipped the file does not exist and dorny would fail.
        if: always() && steps.integration.outcome != 'skipped'
        with:
          name: Integration Tests
          path: './test-results.xml'
          reporter: java-junit
          fail-on-error: 'false'

      - name: Generate integration badge
        if: always() && steps.integration.outcome != 'skipped'
        uses: ./.github/actions/test-badge
        with:
          junit-xml-path: './test-results.xml'
          output-path: 'integration-badge.svg'
          label: 'Integration Tests'

      - name: Generate test report JSON
        if: always()
        run: |
          python3 .github/actions/test-badge/generate_test_report.py \
            --unit-xml './unit-test-results.xml' \
            --integration-xml './test-results.xml' \
            --output 'test-results.json'

      - name: Set artifact name
        id: set-artifact
        if: always()
        run: echo "name=test-badges-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload badges
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-badges-${{ github.run_id }}
          path: |
            unit-badge.svg
            integration-badge.svg
            test-results.json

      - name: Set result
        id: set-result
        if: always()
        run: |
          if [[ "${{ steps.unit.outcome }}" == "success" && \
                ("${{ steps.integration.outcome }}" == "success" || \
                 "${{ steps.integration.outcome }}" == "skipped") ]]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi
