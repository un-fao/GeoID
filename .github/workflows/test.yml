name: Test

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore: ['geoid-refs.json', 'VERSION']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        type: boolean
        default: true

  # Reusable — called by deployment repos (dynastore, catalog, etc.) to gate deploys
  workflow_call:
    inputs:
      run_integration:
        type: boolean
        default: true
    outputs:
      tests_passed:
        description: "'true' if all tests passed"
        value: ${{ jobs.aggregate.outputs.tests_passed }}
      artifact_name:
        description: "Name of the uploaded test badge artifact"
        value: ${{ jobs.aggregate.outputs.artifact_name }}

# Cancel in-progress runs on the same ref when a new push lands. Prevents
# the pipeline pile-up where 5+ runs spin in parallel against stale
# commits — we observed runs lingering >50 min as a result.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  typecheck:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # Build the `tester` stage of the canonical Dockerfile. Override SCOPE
      # with the `typecheck` extra so pyright can resolve every optional code
      # path (duckdb, pyiceberg, morecantile…) that the runtime `all` extra
      # intentionally omits. GHA layer cache scope is per-target+SCOPE since
      # the typecheck SCOPE differs from unit/integration jobs.
      - name: Build tester image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=typecheck
          tags: dynastore-tester:ci
          load: true
          cache-from: type=gha,scope=tester-typecheck
          cache-to: type=gha,mode=max,scope=tester-typecheck

      - name: Run Pyright
        run: |
          docker run --rm \
            --workdir /dynastore \
            dynastore-tester:ci \
            /opt/venv/bin/pyright src/dynastore/ --warnings

  unit-tests:
    runs-on: ubuntu-22.04
    # pytest-timeout in pytest.ini is the primary defence against individual-test
    # hangs; this job timeout catches hangs that escape pytest (compose build
    # stuck, bootstrap stalled). 30min on unit alone is ~6x the post-fix norm.
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      # ubuntu-22.04 runners ship with ~14 GB free; the catalog/worker images
      # exporting from buildx tip the runner past disk capacity (observed:
      # "no space left on device" on `#38 importing to docker`). Drop the
      # preinstalled toolchains we don't use to recover ~25 GB before any
      # docker work begins.
      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before:"
          df -h /
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          echo "Disk after:"
          df -h /

      - uses: docker/setup-buildx-action@v3

      # Pre-build the tester image with GHA layer cache; docker compose then
      # picks it up via the cached image without rebuilding. Cache scope=tester
      # is shared with integration-tests so warm runs land in seconds.
      - name: Build test-runner image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=all
          tags: geoid-test-runner:ci
          load: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester

      # `db` is from `Dockerfile.db` and not pre-baked by the build-push-action
      # above, so build it via the canonical compose. Uses the SAME compose
      # file as prod and dev; no separate test compose.
      - name: Build db image
        run: docker compose -f src/dynastore/docker/docker-compose.yml build db

      - name: Start db
        run: docker compose -f src/dynastore/docker/docker-compose.yml up -d --wait db

      # Test-runner is invoked as a one-off `docker run` joined to the
      # canonical compose's network so it can resolve `db` by service name
      # (matches integration's pattern). Source + tests + workspace mounts
      # mirror the previous test-runner service; env vars set the same DDL
      # timeouts that the test compose used to inject for xdist contention.
      # Project name is derived from the compose file's directory ("docker"),
      # so the network resolves to `docker_dynastore_net`; we look it up
      # dynamically via `docker network ls` to avoid hard-coding the prefix.
      - name: Run unit tests
        id: unit
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          NETWORK=$(docker network ls --filter "name=dynastore_net" --format "{{.Name}}" | head -n1)
          test -n "$NETWORK" || { echo "dynastore_net not found"; docker network ls; exit 1; }
          # Source .env so DATABASE_URL picks up the actual db credentials
          # (POSTGRES_USER/PASSWORD/DB) the canonical compose's db started with.
          # Hardcoding postgres:postgres breaks because .env sets
          # POSTGRES_USER=testuser, POSTGRES_PASSWORD=testpassword.
          # Extract just the POSTGRES_* vars we need; the full .env contains
          # placeholder tokens like '<change-me>' that bash `source` mis-parses
          # as redirections (line 84: IDP_CLIENT_SECRET=<change-me>).
          eval "$(grep -E '^(POSTGRES_USER|POSTGRES_PASSWORD|POSTGRES_DB)=' src/dynastore/docker/.env | sed 's/^/export /')"
          docker run --rm \
            --network "$NETWORK" \
            --workdir /dynastore \
            --env-file src/dynastore/docker/.env \
            -v "$WORKSPACE":/dynastore/workspace \
            -v "$WORKSPACE/src":/dynastore/src \
            -v "$WORKSPACE/tests":/dynastore/tests \
            -v "$WORKSPACE/pytest.ini":/dynastore/pytest.ini \
            -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}" \
            -e DYNASTORE_DDL_STATEMENT_TIMEOUT=120s \
            -e DYNASTORE_DDL_LOCK_TIMEOUT=120s \
            -e LOG_LEVEL=INFO \
            -e PYTEST_CURRENT_TEST=true \
            geoid-test-runner:ci \
            /opt/venv/bin/pytest tests/ --ignore-glob="**/integration/*" \
              --durations=20 \
              --junitxml=/dynastore/workspace/unit-test-results.xml

      - name: Stop db
        if: always()
        run: docker compose -f src/dynastore/docker/docker-compose.yml down -v

      - name: Report unit tests
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Tests
          path: './unit-test-results.xml'
          reporter: java-junit

      - name: Generate unit badge
        if: always()
        uses: ./.github/actions/test-badge
        with:
          junit-xml-path: './unit-test-results.xml'
          output-path: 'unit-badge.svg'
          label: 'Unit Tests'

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-output
          path: |
            unit-test-results.xml
            unit-badge.svg
          if-no-files-found: warn

  integration-tests:
    runs-on: ubuntu-22.04
    # 20 min cap. Post PR #124 the actual numbers are: build ~4 min
    # (image-reuse), tests ~7 min on 4-vCPU GHA xdist, total ~11 min.
    # A local 12-vCPU run completes the same 53 integration tests in
    # ~13.5 min, including the ES + keycloak + GCP test paths the CI
    # conftest auto-skips. 20 min leaves 9 min headroom for cold-cache
    # runs; if a future change pushes us past 20 min that's a real
    # regression worth investigating, not a budget to extend.
    timeout-minutes: 20
    # inputs.run_integration is only set for workflow_dispatch / workflow_call.
    # For push/pull_request it is undefined (''), so the comparison evaluates
    # != 'false' as true. Skip only when the caller explicitly passes false.
    if: ${{ inputs.run_integration != 'false' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      # See unit-tests note: integration's docker compose builds db + catalog
      # + worker + test-runner in parallel via buildx, peaking disk usage
      # well past the 14 GB default. Free ~25 GB up front.
      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before:"
          df -h /
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          echo "Disk after:"
          df -h /

      - uses: docker/setup-buildx-action@v3

      # Same scope=tester cache as unit-tests — when both jobs run in parallel
      # the second to finish a layer warms the other's next run.
      - name: Build test-runner image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=all
          tags: geoid-test-runner:ci
          load: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester

      - name: Build catalog/worker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/dynastore/docker/Dockerfile
          target: builder
          build-args: SCOPE=all
          tags: geoid-builder:ci
          load: true
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      # Bring up the integration stack from the canonical compose. SCOPE=all
      # for catalog/worker so every conformance path is registered. Db isn't
      # pre-baked by the build-push-action above, so `--build` ensures it's
      # built before `up -d` (catalog/worker pick up their `image:` tags
      # from the buildx load).
      - name: Start integration stack (db + es + keycloak + catalog + worker)
        env:
          CATALOG_SCOPE: all
          WORKER_SCOPE: all
        run: |
          docker compose -f src/dynastore/docker/docker-compose.yml build db
          docker compose -f src/dynastore/docker/docker-compose.yml up -d --wait \
            db elasticsearch keycloak catalog worker

      # Tests run via one-off `docker run` against the canonical compose's
      # network so they can resolve `db`, `catalog`, `worker`, `elasticsearch`,
      # `keycloak` by service name. Project name is derived from the compose
      # file's directory ("docker"), so the network is `docker_dynastore_net`;
      # we look it up dynamically via `docker network ls`.
      #
      # The `find … -print0` + `mapfile` pattern preserves the previous
      # workflow's behavior: scopes pytest to the 53 integration files,
      # surfaces zero-find as a non-zero exit, and is safe against shell
      # metacharacters.
      #
      # No `-m` marker filter on purpose. `tests/conftest.py` already
      # auto-skips `local_only` (when CI / GITHUB_ACTIONS / REMOTE_TEST_
      # EXECUTION is set), `gcp` (when ADC creds aren't resolvable), and
      # `elasticsearch` (when DYNASTORE_RUN_ELASTICSEARCH_TESTS isn't set).
      # Filtering at the workflow layer would only duplicate that logic.
      - name: Run integration tests
        id: integration
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          NETWORK=$(docker network ls --filter "name=dynastore_net" --format "{{.Name}}" | head -n1)
          test -n "$NETWORK" || { echo "dynastore_net not found"; docker network ls; exit 1; }
          # Extract just the POSTGRES_* vars we need; the full .env contains
          # placeholder tokens like '<change-me>' that bash `source` mis-parses
          # as redirections (line 84: IDP_CLIENT_SECRET=<change-me>).
          eval "$(grep -E '^(POSTGRES_USER|POSTGRES_PASSWORD|POSTGRES_DB)=' src/dynastore/docker/.env | sed 's/^/export /')"
          docker run --rm \
            --network "$NETWORK" \
            --workdir /dynastore \
            -v "$WORKSPACE":/dynastore/workspace \
            -v "$WORKSPACE/src":/dynastore/src \
            -v "$WORKSPACE/tests":/dynastore/tests \
            -v "$WORKSPACE/pytest.ini":/dynastore/pytest.ini \
            --env-file src/dynastore/docker/.env \
            -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}" \
            -e DYNASTORE_API_URL=http://catalog:80 \
            -e DYNASTORE_WORKER_URL=http://worker:81 \
            -e REMOTE_TEST_EXECUTION=true \
            -e DYNASTORE_DDL_STATEMENT_TIMEOUT=120s \
            -e DYNASTORE_DDL_LOCK_TIMEOUT=120s \
            -e LOG_LEVEL=INFO \
            -e PYTEST_CURRENT_TEST=true \
            geoid-test-runner:ci \
            bash -c 'set -euo pipefail; mapfile -d "" -t TESTS < <(find tests -path "*/integration/*" -name "test_*.py" -type f -print0 | sort -z); test "${#TESTS[@]}" -gt 0 || { echo "no integration tests found"; exit 1; }; /opt/venv/bin/pytest "${TESTS[@]}" --durations=20 --junitxml=/dynastore/workspace/test-results.xml'

      - name: Display Docker logs on failure
        if: failure()
        run: |
          docker compose -f src/dynastore/docker/docker-compose.yml logs catalog
          docker compose -f src/dynastore/docker/docker-compose.yml logs worker

      - name: Tear down integration stack
        if: always()
        run: docker compose -f src/dynastore/docker/docker-compose.yml down -v

      - name: Report integration tests
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Tests
          path: './test-results.xml'
          reporter: java-junit
          fail-on-error: 'false'

      - name: Generate integration badge
        if: always()
        uses: ./.github/actions/test-badge
        with:
          junit-xml-path: './test-results.xml'
          output-path: 'integration-badge.svg'
          label: 'Integration Tests'

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-output
          path: |
            test-results.xml
            integration-badge.svg
          if-no-files-found: warn

  aggregate:
    # Fan-in: combine unit + integration artifacts, generate the test report
    # JSON, upload the badge bundle, and surface workflow_call outputs.
    # Runs even when integration is skipped so callers still get outputs.
    runs-on: ubuntu-22.04
    needs: [unit-tests, integration-tests]
    if: always()
    permissions:
      contents: read
    outputs:
      tests_passed: ${{ steps.set-result.outputs.tests_passed }}
      artifact_name: ${{ steps.set-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Download unit artifacts
        if: needs.unit-tests.result != 'skipped'
        uses: actions/download-artifact@v5
        with:
          name: unit-test-output
          path: .

      - name: Download integration artifacts
        if: needs.integration-tests.result != 'skipped'
        uses: actions/download-artifact@v5
        with:
          name: integration-test-output
          path: .

      - name: Generate test report JSON
        if: always()
        run: |
          python3 .github/actions/test-badge/generate_test_report.py \
            --unit-xml './unit-test-results.xml' \
            --integration-xml './test-results.xml' \
            --output 'test-results.json'

      - name: Set artifact name
        id: set-artifact
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
        run: echo "name=test-badges-${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Upload badges
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-badges-${{ github.run_id }}
          path: |
            unit-badge.svg
            integration-badge.svg
            test-results.json
          if-no-files-found: warn

      - name: Set result
        id: set-result
        if: always()
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
        run: |
          if [[ "$UNIT_RESULT" == "success" && \
                ( "$INTEGRATION_RESULT" == "success" || "$INTEGRATION_RESULT" == "skipped" ) ]]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi
