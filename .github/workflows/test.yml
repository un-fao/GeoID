name: Test

# ── Triggers ──────────────────────────────────────────────────────────────────
# Auto-triggers on push/pull_request were dropped to control CI minutes. The
# suite now runs:
#   - once daily on schedule (regression catch);
#   - on demand via workflow_dispatch (Actions tab → Test → Run workflow,
#     or `gh workflow run test.yml --ref <branch>`);
#   - via workflow_call from dynastore / fao-aip-catalog deploy gates, so
#     production deploys remain test-gated.
on:
  schedule:
    # Daily nightly run at 04:00 UTC (~05/06 Europe/Rome). Surfaces overnight
    # regressions before the workday starts without burning minutes on every
    # push or PR. Remove this entry to fully disable scheduled runs.
    - cron: '0 4 * * *'

  workflow_dispatch:
    inputs:
      run_integration:
        type: boolean
        default: true

  # Reusable — called by deployment repos (dynastore, catalog, etc.) to gate deploys
  workflow_call:
    inputs:
      run_integration:
        type: boolean
        default: true
    outputs:
      tests_passed:
        description: "'true' if all tests passed"
        value: ${{ jobs.aggregate.outputs.tests_passed }}
      artifact_name:
        description: "Name of the uploaded test badge artifact"
        value: ${{ jobs.aggregate.outputs.artifact_name }}

# Cancel in-progress runs on the same ref when a new push lands. Prevents
# the pipeline pile-up where 5+ runs spin in parallel against stale
# commits — we observed runs lingering >50 min as a result.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  typecheck:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # Build the `tester` stage of the canonical Dockerfile. Override SCOPE
      # with the `typecheck` extra so pyright can resolve every optional code
      # path (duckdb, pyiceberg, morecantile…) that the runtime `all` extra
      # intentionally omits. GHA layer cache scope is per-target+SCOPE since
      # the typecheck SCOPE differs from unit/integration jobs.
      - name: Build tester image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/core/src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=typecheck
          tags: dynastore-tester:ci
          load: true
          cache-from: type=gha,scope=tester-typecheck
          cache-to: type=gha,mode=max,scope=tester-typecheck

      - name: Run Pyright
        run: |
          docker run --rm \
            --workdir /dynastore \
            dynastore-tester:ci \
            /opt/venv/bin/pyright packages/core/src/dynastore/ --warnings

  unit-tests:
    runs-on: ubuntu-22.04
    # pytest-timeout in pytest.ini is the primary defence against individual-test
    # hangs; this job timeout catches hangs that escape pytest (compose build
    # stuck, bootstrap stalled). 30min on unit alone is ~6x the post-fix norm.
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      # ubuntu-22.04 runners ship with ~14 GB free; the catalog/worker images
      # exporting from buildx tip the runner past disk capacity (observed:
      # "no space left on device" on `#38 importing to docker`). Drop the
      # preinstalled toolchains we don't use to recover ~25 GB before any
      # docker work begins.
      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before:"
          df -h /
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          echo "Disk after:"
          df -h /

      - uses: docker/setup-buildx-action@v3

      # Pre-build the tester image with GHA layer cache; docker compose then
      # picks it up via the cached image without rebuilding. Cache scope=tester
      # is shared with integration-tests so warm runs land in seconds.
      - name: Build test-runner image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/core/src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=all
          tags: geoid-test-runner:ci
          load: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester

      # `db` is from `Dockerfile.db` and not pre-baked by the build-push-action
      # above, so build it via the canonical compose. Uses the SAME compose
      # file as prod and dev; no separate test compose.
      - name: Build db image
        run: docker compose -f packages/core/src/dynastore/docker/docker-compose.yml build db

      - name: Start db
        run: docker compose -f packages/core/src/dynastore/docker/docker-compose.yml up -d --wait db

      # Test-runner is invoked as a one-off `docker run` joined to the
      # canonical compose's network so it can resolve `db` by service name
      # (matches integration's pattern). Source + tests + workspace mounts
      # mirror the previous test-runner service; env vars set the same DDL
      # timeouts that the test compose used to inject for xdist contention.
      # Project name is derived from the compose file's directory ("docker"),
      # so the network resolves to `docker_dynastore_net`; we look it up
      # dynamically via `docker network ls` to avoid hard-coding the prefix.
      - name: Run unit tests
        id: unit
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          NETWORK=$(docker network ls --filter "name=dynastore_net" --format "{{.Name}}" | head -n1)
          test -n "$NETWORK" || { echo "dynastore_net not found"; docker network ls; exit 1; }
          # Source .env so DATABASE_URL picks up the actual db credentials
          # (POSTGRES_USER/PASSWORD/DB) the canonical compose's db started with.
          # Hardcoding postgres:postgres breaks because .env sets
          # POSTGRES_USER=testuser, POSTGRES_PASSWORD=testpassword.
          # Extract just the POSTGRES_* vars we need; the full .env contains
          # placeholder tokens like '<change-me>' that bash `source` mis-parses
          # as redirections (line 84: IDP_CLIENT_SECRET=<change-me>).
          eval "$(grep -E '^(POSTGRES_USER|POSTGRES_PASSWORD|POSTGRES_DB)=' packages/core/src/dynastore/docker/.env | sed 's/^/export /')"
          docker run --rm \
            --network "$NETWORK" \
            --workdir /dynastore \
            --env-file packages/core/src/dynastore/docker/.env \
            -v "$WORKSPACE":/dynastore/workspace \
            -v "$WORKSPACE/src":/dynastore/src \
            -v "$WORKSPACE/tests":/dynastore/tests \
            -v "$WORKSPACE/docs":/dynastore/docs \
            -v "$WORKSPACE/pytest.ini":/dynastore/pytest.ini \
            -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}" \
            -e DYNASTORE_DDL_STATEMENT_TIMEOUT=120s \
            -e DYNASTORE_DDL_LOCK_TIMEOUT=120s \
            -e LOG_LEVEL=INFO \
            -e PYTEST_CURRENT_TEST=true \
            geoid-test-runner:ci \
            /opt/venv/bin/pytest tests/ --ignore-glob="**/integration/*" \
              --durations=20 \
              --junitxml=/dynastore/workspace/unit-test-results.xml

      - name: Stop db
        if: always()
        run: docker compose -f packages/core/src/dynastore/docker/docker-compose.yml down -v

      - name: Report unit tests
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Tests
          path: './unit-test-results.xml'
          reporter: java-junit

      - name: Generate unit badge
        if: always()
        uses: ./.github/actions/test-badge
        with:
          junit-xml-path: './unit-test-results.xml'
          output-path: 'unit-badge.svg'
          label: 'Unit Tests'

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-output
          path: |
            unit-test-results.xml
            unit-badge.svg
          if-no-files-found: warn

  integration-tests:
    runs-on: ubuntu-22.04
    # Post-#541 triage: cancellations stopped 2026-05-15; recent nightlies
    # finish in ~21-22 min (pytest 14-17 min + ~5 min build/start). 25 min
    # gives a tight ~3 min margin above current p95 so a regression surfaces
    # as a cancellation (and a sentinel artifact) rather than burning the
    # full 30 min. Underlying slowness is broad — ~5-7 tests with ~60 s
    # teardown soaks (httpx-default-timeout on hung DELETE catalog
    # round-trips) plus 35-41 s per-test catalog setups; shared_catalog
    # PR #218 still not adopted outside its self-pinning file. Drop to 20
    # only once pytest wall-clock is consistently under 15 min across 5 runs.
    timeout-minutes: 25
    # inputs.run_integration is only set for workflow_dispatch / workflow_call.
    # For push/pull_request it is undefined (''), so the comparison evaluates
    # != 'false' as true. Skip only when the caller explicitly passes false.
    if: ${{ inputs.run_integration != 'false' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      # See unit-tests note: integration's docker compose builds db + catalog
      # + worker + test-runner in parallel via buildx, peaking disk usage
      # well past the 14 GB default. Free ~25 GB up front.
      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk before:"
          df -h /
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          echo "Disk after:"
          df -h /

      - uses: docker/setup-buildx-action@v3

      # Same scope=tester cache as unit-tests — when both jobs run in parallel
      # the second to finish a layer warms the other's next run.
      - name: Build test-runner image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/core/src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=all
          tags: geoid-test-runner:ci
          load: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester

      # Bring up the bare-minimum integration stack: db only. Every
      # integration test uses an in-process FastAPI client
      # (`ASGITransport(app=app)` via `in_process_client` /
      # `sysadmin_in_process_client`), so no catalog/worker container is
      # ever connected to. Elasticsearch and IDP markers auto-skip in CI
      # (see tests/conftest.py:251-271 — they require explicit
      # DYNASTORE_RUN_ELASTICSEARCH_TESTS / DYNASTORE_RUN_IDP_TESTS opt-ins).
      # Starting catalog+worker would add ~3 min of compose-rebuild cost
      # (the canonical compose has no `image:` directive on those services
      # so `up` rebuilds them every run) without exercising any code path
      # tests actually use.
      - name: Start db
        run: |
          docker compose -f packages/core/src/dynastore/docker/docker-compose.yml build db
          docker compose -f packages/core/src/dynastore/docker/docker-compose.yml up -d --wait db

      # Tests run via one-off `docker run` joined to the compose network so
      # they can resolve `db` by service name. Project name is derived from
      # the compose file's directory ("docker"), so the network is
      # `docker_dynastore_net`; we look it up dynamically.
      #
      # The `find … -print0` + `mapfile` pattern scopes pytest to the
      # `*/integration/*` files and surfaces zero-find as a non-zero exit.
      #
      # No `-m` marker filter on purpose. `tests/conftest.py` already
      # auto-skips `local_only` (when CI / GITHUB_ACTIONS / REMOTE_TEST_
      # EXECUTION is set), `gcp` (when ADC creds aren't resolvable),
      # `elasticsearch` (without DYNASTORE_RUN_ELASTICSEARCH_TESTS), and
      # `idp` (without DYNASTORE_RUN_IDP_TESTS).
      - name: Run integration tests
        id: integration
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          NETWORK=$(docker network ls --filter "name=dynastore_net" --format "{{.Name}}" | head -n1)
          test -n "$NETWORK" || { echo "dynastore_net not found"; docker network ls; exit 1; }
          # Extract just the POSTGRES_* vars we need; the full .env contains
          # placeholder tokens like '<change-me>' that bash `source` mis-parses
          # as redirections (line 84: IDP_CLIENT_SECRET=<change-me>).
          eval "$(grep -E '^(POSTGRES_USER|POSTGRES_PASSWORD|POSTGRES_DB)=' packages/core/src/dynastore/docker/.env | sed 's/^/export /')"
          docker run --rm \
            --network "$NETWORK" \
            --workdir /dynastore \
            -v "$WORKSPACE":/dynastore/workspace \
            -v "$WORKSPACE/src":/dynastore/src \
            -v "$WORKSPACE/tests":/dynastore/tests \
            -v "$WORKSPACE/docs":/dynastore/docs \
            -v "$WORKSPACE/pytest.ini":/dynastore/pytest.ini \
            --env-file packages/core/src/dynastore/docker/.env \
            -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}" \
            -e REMOTE_TEST_EXECUTION=true \
            -e DYNASTORE_DDL_STATEMENT_TIMEOUT=120s \
            -e DYNASTORE_DDL_LOCK_TIMEOUT=120s \
            -e LOG_LEVEL=INFO \
            -e PYTEST_CURRENT_TEST=true \
            -e DYNASTORE_TEST_SENTINEL=/dynastore/workspace/last-test.txt \
            geoid-test-runner:ci \
            bash -c 'set -euo pipefail; mapfile -d "" -t TESTS < <(find tests -path "*/integration/*" -name "test_*.py" -type f -print0 | sort -z); test "${#TESTS[@]}" -gt 0 || { echo "no integration tests found"; exit 1; }; PYTHONUNBUFFERED=1 /opt/venv/bin/pytest "${TESTS[@]}" -v --tb=short -p no:cacheprovider --durations=20 --junitxml=/dynastore/workspace/test-results.xml 2>&1 | tee /dynastore/workspace/integration-tests.log'

      - name: Display db logs on failure
        if: failure()
        run: docker compose -f packages/core/src/dynastore/docker/docker-compose.yml logs db

      - name: Tear down integration stack
        if: always()
        run: docker compose -f packages/core/src/dynastore/docker/docker-compose.yml down -v

      - name: Report integration tests
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Tests
          path: './test-results.xml'
          reporter: java-junit
          fail-on-error: 'false'

      - name: Generate integration badge
        if: always()
        uses: ./.github/actions/test-badge
        with:
          junit-xml-path: './test-results.xml'
          output-path: 'integration-badge.svg'
          label: 'Integration Tests'

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-output
          path: |
            test-results.xml
            integration-badge.svg
            integration-tests.log
            last-test.txt
          if-no-files-found: warn

  integration-tests-elasticsearch:
    # Coverage matrix job — runs the ~13 tests carrying
    # `@pytest.mark.elasticsearch` against a live OpenSearch container.
    # Conftest gates these on DYNASTORE_RUN_ELASTICSEARCH_TESTS=true; this
    # job is the one place that env var is set, so the core
    # `integration-tests` job continues to skip them (no overlap, no double
    # execution). Advisory-only — its outcome is NOT included in
    # aggregate.tests_passed while ES coverage stabilises (1 known-failing
    # test in this set as of 2026-05-04). Re-include in the gate once
    # green for ~5 consecutive runs.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: ${{ inputs.run_integration != 'false' }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - uses: docker/setup-buildx-action@v3

      # Reuse the same `scope=tester` cache as integration-tests / unit-tests.
      # When the three jobs run concurrently, whichever finishes first warms
      # the cache for the others' next run.
      - name: Build test-runner image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/core/src/dynastore/docker/Dockerfile
          target: tester
          build-args: SCOPE=all
          tags: geoid-test-runner:ci
          load: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester

      - name: Start db + elasticsearch
        run: |
          docker compose -f packages/core/src/dynastore/docker/docker-compose.yml build db
          docker compose -f packages/core/src/dynastore/docker/docker-compose.yml up -d --wait db elasticsearch

      - name: Run elasticsearch-marked tests
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          NETWORK=$(docker network ls --filter "name=dynastore_net" --format "{{.Name}}" | head -n1)
          test -n "$NETWORK" || { echo "dynastore_net not found"; docker network ls; exit 1; }
          eval "$(grep -E '^(POSTGRES_USER|POSTGRES_PASSWORD|POSTGRES_DB)=' packages/core/src/dynastore/docker/.env | sed 's/^/export /')"
          docker run --rm \
            --network "$NETWORK" \
            --workdir /dynastore \
            -v "$WORKSPACE":/dynastore/workspace \
            -v "$WORKSPACE/src":/dynastore/src \
            -v "$WORKSPACE/tests":/dynastore/tests \
            -v "$WORKSPACE/docs":/dynastore/docs \
            -v "$WORKSPACE/pytest.ini":/dynastore/pytest.ini \
            --env-file packages/core/src/dynastore/docker/.env \
            -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}" \
            -e ELASTICSEARCH_URL="http://elasticsearch:9200" \
            -e DYNASTORE_RUN_ELASTICSEARCH_TESTS=true \
            -e REMOTE_TEST_EXECUTION=true \
            -e DYNASTORE_DDL_STATEMENT_TIMEOUT=120s \
            -e DYNASTORE_DDL_LOCK_TIMEOUT=120s \
            -e LOG_LEVEL=INFO \
            -e PYTEST_CURRENT_TEST=true \
            geoid-test-runner:ci \
            /opt/venv/bin/pytest -m elasticsearch \
              tests/dynastore/ \
              --durations=10 \
              --junitxml=/dynastore/workspace/test-results-es.xml

      - name: Display elasticsearch logs on failure
        if: failure()
        run: |
          docker compose -f packages/core/src/dynastore/docker/docker-compose.yml logs elasticsearch
          docker compose -f packages/core/src/dynastore/docker/docker-compose.yml logs db

      - name: Tear down stack
        if: always()
        run: docker compose -f packages/core/src/dynastore/docker/docker-compose.yml down -v

      - name: Report elasticsearch tests
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Tests (Elasticsearch)
          path: './test-results-es.xml'
          reporter: java-junit
          fail-on-error: 'false'

      - name: Upload elasticsearch artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-output-es
          path: test-results-es.xml
          if-no-files-found: warn

  aggregate:
    # Fan-in: combine unit + integration artifacts, generate the test report
    # JSON, upload the badge bundle, and surface workflow_call outputs.
    # Runs even when integration is skipped so callers still get outputs.
    runs-on: ubuntu-22.04
    needs: [unit-tests, integration-tests]
    if: always()
    permissions:
      contents: read
    outputs:
      tests_passed: ${{ steps.set-result.outputs.tests_passed }}
      artifact_name: ${{ steps.set-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Download unit artifacts
        if: needs.unit-tests.result != 'skipped'
        uses: actions/download-artifact@v5
        with:
          name: unit-test-output
          path: .

      - name: Download integration artifacts
        if: needs.integration-tests.result != 'skipped'
        uses: actions/download-artifact@v5
        with:
          name: integration-test-output
          path: .

      - name: Generate test report JSON
        if: always()
        run: |
          python3 .github/actions/test-badge/generate_test_report.py \
            --unit-xml './unit-test-results.xml' \
            --integration-xml './test-results.xml' \
            --output 'test-results.json'

      - name: Set artifact name
        id: set-artifact
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
        run: echo "name=test-badges-${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Upload badges
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-badges-${{ github.run_id }}
          path: |
            unit-badge.svg
            integration-badge.svg
            test-results.json
          if-no-files-found: warn

      - name: Set result
        id: set-result
        if: always()
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
        run: |
          if [[ "$UNIT_RESULT" == "success" && \
                ( "$INTEGRATION_RESULT" == "success" || "$INTEGRATION_RESULT" == "skipped" ) ]]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi
