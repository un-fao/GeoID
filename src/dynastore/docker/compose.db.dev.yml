# Dev-mode db fragment: exposes 54320 for host psql, mounts the SSOT scripts
# directory, runs db_entrypoint_dev.sh to apply RESET_MODE on boot.
# Consumer sets RESET_MODE in their overlay (default for dev, keycloak for test).
# The reset-done healthcheck waits for /tmp/reset_done before reporting healthy.
#
# `../scripts:/scripts:ro` resolves relative to THIS file's directory per
# Compose's extends rules → src/dynastore/scripts/ (the SSOT scripts dir).

services:
  db:
    extends:
      file: compose.db.yml
      service: db
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts:/scripts:ro
    entrypoint: ["bash", "/scripts/db_entrypoint_dev.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/reset_done && psql -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-gis_dev} -c 'SELECT 1' -q --no-align --tuples-only"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
