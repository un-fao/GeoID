services:
  db:
    extends:
      file: ./compose.db.dev.yml
      service: db
    container_name: geoid_db
    env_file: .env
    environment:
      RESET_MODE: default
    networks:
      - dynastore_net

  catalog:
    extends:
      file: docker-compose.yml
      service: catalog
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${CATALOG_SCOPE:-scope_catalog}
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../src:/dynastore/src # Hot reload mount
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      DB_POOL_MIN_SIZE: "20"
      DB_CONNECT_TIMEOUT: "30"
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "5678:5678" # Debug port
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 80 --reload --reload-dir src

  geoid:
    extends:
      file: docker-compose.yml
      service: geoid
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: development
      args:
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../src:/dynastore/src
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      ES_HOST: elasticsearch
      ES_PORT: "9200"

  worker:
    extends:
      file: docker-compose.yml
      service: worker
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${WORKER_SCOPE:-scope_worker}
        BUILD_JUPYTERLITE: "false"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../../src:/dynastore/src
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "5679:5679" # Debug port for worker
    command: python -m debugpy --listen 0.0.0.0:5679 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 81 --reload --reload-dir src

  tools:
    extends:
      file: docker-compose.yml
      service: tools
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${TOOLS_SCOPE:-scope_tools}
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../src:/dynastore/src
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
    ports:
      - "5680:5680" # Debug port for tools
    command: python -m debugpy --listen 0.0.0.0:5680 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 8082 --reload --reload-dir src

  maps:
    extends:
      file: docker-compose.yml
      service: maps
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: development
      args:
        SCOPE: ${MAPS_SCOPE:-scope_maps}
        BUILD_JUPYTERLITE: "true"
    volumes:
      - ../../../src:/dynastore/src
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "5681:5681" # Debug port for maps
    command: python -m debugpy --listen 0.0.0.0:5681 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 8083 --reload --reload-dir src

  elasticsearch:
    extends:
      file: ./compose.es.yml
      service: elasticsearch
    container_name: geoid_elasticsearch
    ports:
      - "9200:9200"
    networks:
      - dynastore_net

  kibana:
    extends:
      file: ./compose.kibana.yml
      service: kibana
    container_name: geoid_kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dynastore_net

  keycloak:
    extends:
      file: ./compose.keycloak.yml
      service: keycloak
    container_name: geoid_keycloak
    ports:
      - "${HOST_PORT_KEYCLOAK:-8181}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
