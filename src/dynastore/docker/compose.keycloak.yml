# Base keycloak service fragment. Does NOT include the realm-export bind
# mount — that is repo-specific (each consumer picks its own realm JSON).
# Downstream compose files add:
#   volumes:
#     - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
# if they want the --import-realm behaviour.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.6
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-gis_dev}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_DB_SCHEMA: keycloak
      KC_DB_POOL_INITIAL_SIZE: "5"
      KC_DB_POOL_MIN_SIZE: "5"
      KC_DB_POOL_MAX_SIZE: "15"
      KC_DB_POOL_ACQUIRE_TIMEOUT_MILLIS: "30000"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Pin the issuer URL so every issued token carries the same `iss`
      # regardless of whether the caller hit Keycloak via the host-mapped
      # port (`localhost:8180`) or via docker DNS (`keycloak:8080`).
      # Without this, `iss` defaults to the request URL and the catalog
      # rejects tokens whose iss doesn't match `IDP_ISSUER_URL`. See
      # `src/dynastore/modules/iam/identity_providers/KEYCLOAK_SETUP.md`.
      # KC_HOSTNAME accepts a full URL in Keycloak 26 (renamed from the
      # pre-26 `KC_HOSTNAME_URL`). STRICT=true is required to actually
      # honor the override (otherwise iss falls back to request URL).
      KC_HOSTNAME: http://keycloak:8080
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm --health-enabled=true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
