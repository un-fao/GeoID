# Test override for db: same as dev but RESET_MODE=keycloak so the kc schema
# is preserved between test runs (tests clear collection data but should not
# force keycloak to re-bootstrap every invocation).

services:
  db:
    extends:
      file: compose.db.yml
      service: db
    ports:
      - "54320:5432"
    environment:
      RESET_MODE: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts:/scripts:ro
    entrypoint: ["bash", "/scripts/db_entrypoint_dev.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/reset_done && psql -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-gis_dev} -c 'SELECT 1' -q --no-align --tuples-only"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
