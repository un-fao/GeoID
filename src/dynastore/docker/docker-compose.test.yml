services:
  db:
    extends:
      file: ./compose.db.dev.yml
      service: db
    container_name: geoid_db_test
    # The dev compose binds 54320:5432 on the host so a developer can connect
    # via psql on a non-default port. Tests reach Postgres through the docker
    # network using the `db` service name on internal port 5432 — they never
    # need a host-side binding. Clearing the inherited port mapping prevents
    # CI from racing with pre-existing port-54320 state on the runner
    # (observed: "address already in use" on PR #108 run 25070127934 unit-tests).
    ports: []
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      RESET_MODE: keycloak
    networks:
      - dynastore_net

  keycloak:
    extends:
      file: ./compose.keycloak.yml
      service: keycloak
    container_name: geoid_keycloak_test
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  catalog:
    extends:
      file: docker-compose.yml
      service: catalog
    restart: "no"
    # `image:` lets compose reuse the buildx-pre-built `geoid-builder:ci`
    # tag from the workflow's `Build catalog/worker image (cached)` step
    # instead of rebuilding via this `build:` block. compose still falls
    # back to building when the image isn't already loaded (local devs,
    # first run on a fresh runner).
    image: geoid-builder:ci
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: builder
      args:
        SCOPE: ${CATALOG_SCOPE:-all}
    container_name: geoid_catalog_test
    env_file:
      - .env
      - path: .env.local
        required: false
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      - LOG_LEVEL=DEBUG
      - GUNICORN_WORKERS=1
      - IGNORE_BAKED_ENV=true
      - TCP_PORT=80
      - API_ROOT_PATH=/
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gis_dev}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    command: python -m uvicorn dynastore.main:app --host 0.0.0.0 --port 80 --workers 1

  worker:
    extends:
      file: docker-compose.yml
      service: worker
    restart: "no"
    # See `catalog` above: same `geoid-builder:ci` tag is reused for
    # the worker since both share `target: builder` + SCOPE=all.
    image: geoid-builder:ci
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: builder
      args:
        SCOPE: ${WORKER_SCOPE:-all}
    container_name: geoid_worker_test
    env_file:
      - .env
      - path: .env.local
        required: false
    depends_on:
      db:
        condition: service_healthy
    environment:
      - LOG_LEVEL=DEBUG
      - GUNICORN_WORKERS=1
      - IGNORE_BAKED_ENV=true
      - TCP_PORT=81
      - API_ROOT_PATH=/
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gis_dev}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:81/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    command: python -m uvicorn dynastore.main:app --host 0.0.0.0 --port 81 --workers 1

  test-runner:
    # Reuse the buildx-pre-built `geoid-test-runner:ci` from the
    # workflow's `Build test-runner image (cached)` step. compose
    # still falls back to building from this `build:` block when the
    # image isn't already loaded (local devs, first run on a fresh
    # runner).
    image: geoid-test-runner:ci
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      target: tester
      args:
        SCOPE: ${TEST_SCOPE:-all}
    container_name: geoid_test_runner
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      - LOG_LEVEL=INFO
      - PYTEST_CURRENT_TEST=true
      - REMOTE_TEST_EXECUTION=true
      - DYNASTORE_API_URL=http://catalog:80
      - DYNASTORE_WORKER_URL=http://worker:81
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gis_dev}
      # Raise DDL timeouts above the 30s prod default — xdist runs N
      # bootstraps in parallel against the same shared PG, and the
      # CatalogModule lifespan DDL routinely takes >30s under that
      # contention. Surfaces as QueryCanceledError / LockNotAvailableError
      # in CI but never reproduces locally where the suite is sequential.
      - DYNASTORE_DDL_STATEMENT_TIMEOUT=120s
      - DYNASTORE_DDL_LOCK_TIMEOUT=120s
    volumes:
      - ../../../tests:/dynastore/tests
      - ../../../src:/dynastore/src
      - ../../..:/dynastore/workspace
      - ../../../pytest.ini:/dynastore/pytest.ini
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      catalog:
        condition: service_healthy
      worker:
        condition: service_healthy
    networks:
      - dynastore_net
    command: [ "/opt/venv/bin/pytest", "tests", "--junitxml=/dynastore/workspace/test-results.xml" ]

volumes:
  postgres_data:


networks:
  dynastore_net:
    driver: bridge
