services:
  db:
    extends:
      file: ./compose.db.yml
      service: db
    container_name: geoid_db
    env_file: .env
    networks:
      - dynastore_net

  catalog:
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      args:
        SCOPE: ${CATALOG_SCOPE:-scope_catalog}
        BUILD_JUPYTERLITE: "true"
    container_name: geoid_catalog
    restart: always
    stop_grace_period: 30s
    env_file: .env
    environment:
      SCOPE: ${CATALOG_SCOPE:-scope_catalog}
      TCP_PORT: 80
      UVICORN_WORKERS: 4
      DB_POOL_MIN_SIZE: "20"
      DB_CONNECT_TIMEOUT: "30"
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_CATALOG:-80}:80"
    volumes:
      - ../../../logs/catalog:/dynastore/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  geoid:
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      args:
        SCOPE: ${GEOID_SCOPE:-scope_geoid}
        BUILD_JUPYTERLITE: "true"
    container_name: geoid_web
    restart: always
    stop_grace_period: 30s
    env_file: .env
    environment:
      SCOPE: ${GEOID_SCOPE:-scope_geoid}
      TCP_PORT: 80
      UVICORN_WORKERS: 1
      # Embedded logs dashboard: upstream URL includes the Dashboards base
      # path so both the provisioner and the reverse proxy can forward
      # requests unchanged. Keep in sync with the kibana service
      # SERVER_BASEPATH env above. For prod against Elastic Cloud, set this
      # to the managed Kibana endpoint (no /dashboards suffix) and provide
      # KIBANA_UPSTREAM_API_KEY via Secret Manager.
      KIBANA_UPSTREAM_URL: ${KIBANA_UPSTREAM_URL:-http://kibana:5601/dashboards}
      KIBANA_UPSTREAM_API_KEY: ${KIBANA_UPSTREAM_API_KEY:-}
      KIBANA_PUBLIC_PATH: ${KIBANA_PUBLIC_PATH:-/dashboards}
    ports:
      - "8080:80"
    volumes:
      - ../../../logs/geoid:/dynastore/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  worker:
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      args:
        SCOPE: ${WORKER_SCOPE:-scope_worker}
        BUILD_JUPYTERLITE: "false"
    container_name: geoid_worker
    restart: always
    stop_grace_period: 30s
    env_file: .env
    # Run in worker mode (same image as catalog, different modules + CMD)
    command: ["worker"]
    environment:
      SCOPE: ${WORKER_SCOPE:-scope_worker}
      TCP_PORT: 81
      UVICORN_WORKERS: 2
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_WORKER:-81}:81"
    volumes:
      - ../../../logs/worker:/dynastore/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  tools:
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      args:
        SCOPE: ${TOOLS_SCOPE:-scope_tools}
        # tools doesn't serve /web/pages/notebooks — skip the ~250 MB stage.
        BUILD_JUPYTERLITE: "false"
    container_name: geoid_tools
    restart: always
    stop_grace_period: 30s
    env_file: .env
    environment:
      SCOPE: ${TOOLS_SCOPE:-scope_tools}
      TCP_PORT: 8082
      UVICORN_WORKERS: 2
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_TOOLS:-8082}:8082"
    volumes:
      - ../../../logs/tools:/dynastore/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  maps:
    build:
      context: ../../..
      dockerfile: src/dynastore/docker/Dockerfile
      args:
        SCOPE: ${MAPS_SCOPE:-scope_maps}
        # maps serves raster tiles, not notebooks — skip the ~250 MB stage.
        BUILD_JUPYTERLITE: "false"
    container_name: geoid_maps
    restart: always
    stop_grace_period: 30s
    env_file: .env
    environment:
      SCOPE: ${MAPS_SCOPE:-scope_maps}
      TCP_PORT: 8083
      UVICORN_WORKERS: 2
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_MAPS:-8083}:8083"
    volumes:
      - ../../../logs/maps:/dynastore/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

  elasticsearch:
    extends:
      file: ./compose.es.yml
      service: elasticsearch
    container_name: geoid_elasticsearch
    ports:
      - "9200:9200"
    networks:
      - dynastore_net

  kibana:
    extends:
      file: ./compose.kibana.yml
      service: kibana
    container_name: geoid_kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dynastore_net

  keycloak:
    extends:
      file: ./compose.keycloak.yml
      service: keycloak
    container_name: geoid_keycloak
    ports:
      - "${HOST_PORT_KEYCLOAK:-8181}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net

volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
