<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynaStore Login</title>
    <link rel="icon" type="image/png" href="/web/static/dynastore.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background decoration -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[100px] -z-10"></div>
    
    <div class="glass-panel w-full max-w-md p-8 rounded-2xl shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <img src="/web/static/dynastore.png" alt="DynaStore" class="w-16 h-16 mx-auto mb-4 rounded-xl shadow-lg shadow-blue-500/20">
            <h2 class="text-2xl font-bold text-white tracking-tight">Sign in to DynaStore</h2>
            <p class="text-slate-400 text-sm mt-2">Enter your credentials to access the platform</p>
        </div>

        <form method="post" id="loginForm" class="space-y-6">
            <input type="hidden" name="redirect_uri" id="redirect_uri">
            <input type="hidden" name="state" id="state">
            <input type="hidden" name="scope" id="scope">
            
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <input type="text" id="username" name="username" required 
                    class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-white placeholder-slate-500 transition-all"
                    placeholder="sysadmin">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" id="password" name="password" required 
                    class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-white placeholder-slate-500 transition-all"
                    placeholder="••••••••">
            </div>
            
            <button type="submit" 
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                Sign In
            </button>
        </form>
        
        <div class="mt-8 text-center border-t border-slate-700 pt-6">
            <p class="text-xs text-slate-500">
                Protected by DynaStore Identity Provider<br>
                &copy; 2025 FAO
            </p>
        </div>
    </div>
    <script>
        // Populate hidden fields from URL parameters if they are not already set by backend substitution
        // Note: The python code serves this file via FileResponse, so no f-string substitution happens there anymore.
        // We rely on JS to pick up query params from the URL.
        const urlParams = new URLSearchParams(window.location.search);
        
        // We use '||' to provide defaults if params are missing
        document.getElementById('redirect_uri').value = urlParams.get('redirect_uri') || '/auth/debug';
        document.getElementById('state').value = urlParams.get('state') || 'init';
        document.getElementById('scope').value = urlParams.get('scope') || 'openid email profile';

        // Dynamically set form action to handle path prefixes
        // It assumes the login handler is at ./login relative to this page (if this page is /auth/login)
        // OR we can reconstruct it from root.
        // Since this page is likely served at .../auth/login, submitting to empty action or ./login works.
        // However, explicit path is safer.
        const loginUrl = window.location.href.split('?')[0]; 
        document.getElementById('loginForm').action = loginUrl;
    </script>
</body>
</html>
