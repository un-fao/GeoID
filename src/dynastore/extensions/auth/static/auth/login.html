<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP | Login</title>
    <link rel="icon" type="image/png" href="../web/static/dynastore.png">
    <link rel="stylesheet" href="auth.css">
</head>
<body data-accent="blue">
    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="auth-header">
            <img src="../web/static/dynastore.png" alt="AgroInformatics Platform" class="auth-logo">
            <h2 class="auth-title">AIP | Catalog Services</h2>
            <p class="auth-subtitle">AgroInformatics Platform — Sign in to continue</p>
        </div>

        <form method="post" id="loginForm" class="auth-form">
            <input type="hidden" name="redirect_uri" id="redirect_uri">
            <input type="hidden" name="state" id="state">
            <input type="hidden" name="scope" id="scope">

            <div class="auth-field">
                <label for="username" class="auth-label">Username</label>
                <input type="text" id="username" name="username" required class="auth-input" placeholder="sysadmin">
            </div>

            <div class="auth-field">
                <label for="password" class="auth-label">Password</label>
                <input type="password" id="password" name="password" required class="auth-input" placeholder="••••••••">
            </div>

            <button type="submit" class="auth-button">Sign In</button>
        </form>

        <div class="auth-footer">
            Protected by AIP Identity Provider<br>
            &copy; 2025 FAO
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);

        const errorMsg = urlParams.get('error');
        if (errorMsg) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'auth-error';
            errorDiv.innerText = errorMsg;
            const form = document.getElementById('loginForm');
            form.parentElement.insertBefore(errorDiv, form);
        }

        const _authIdx = window.location.pathname.indexOf('/auth/');
        const _proxyPrefix = _authIdx >= 0 ? window.location.pathname.substring(0, _authIdx) : '';
        document.getElementById('redirect_uri').value = urlParams.get('redirect_uri') || (_proxyPrefix + '/web/');
        document.getElementById('state').value = urlParams.get('state') || 'init';
        document.getElementById('scope').value = urlParams.get('scope') || 'openid email profile';

        document.getElementById('loginForm').action = 'login';
    </script>
</body>
</html>
