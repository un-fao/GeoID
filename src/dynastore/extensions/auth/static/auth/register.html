<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynaStore Register</title>
    <link rel="icon" type="image/png" href="../web/static/dynastore.png">
    <link rel="stylesheet" href="auth.css">
</head>
<body data-accent="purple">
    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="auth-header">
            <img src="../web/static/dynastore.png" alt="DynaStore" class="auth-logo">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the DynaStore platform</p>
        </div>

        <form method="post" action="register" class="auth-form compact">
            <input type="hidden" name="redirect_uri" id="redirect_uri">
            <input type="hidden" name="state" id="state">

            <div class="auth-field">
                <label for="username" class="auth-label">Username</label>
                <input type="text" id="username" name="username" required class="auth-input">
            </div>

            <div class="auth-field">
                <label for="email" class="auth-label">Email</label>
                <input type="email" id="email" name="email" required class="auth-input">
            </div>

            <div class="auth-field">
                <label for="password" class="auth-label">Password</label>
                <input type="password" id="password" name="password" required class="auth-input">
            </div>

            <div class="auth-field">
                <label for="confirm_password" class="auth-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required class="auth-input">
            </div>

            <button type="submit" class="auth-button">Register</button>
        </form>

        <div class="auth-aside">
            <a href="login" class="auth-link">Already have an account? Sign in</a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);

        const errorMsg = urlParams.get('error');
        if (errorMsg) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'auth-error';
            errorDiv.innerText = errorMsg;
            const form = document.querySelector('form');
            form.parentElement.insertBefore(errorDiv, form);
        }

        const _authIdx = window.location.pathname.indexOf('/auth/');
        const _proxyPrefix = _authIdx >= 0 ? window.location.pathname.substring(0, _authIdx) : '';
        document.getElementById('redirect_uri').value = urlParams.get('redirect_uri') || (_proxyPrefix + '/web/');
        document.getElementById('state').value = urlParams.get('state') || 'init';
    </script>
</body>
</html>
