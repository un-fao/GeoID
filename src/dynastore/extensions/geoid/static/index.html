<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoID Service</title>
    <link rel="icon" type="image/svg+xml" href="/web/geoid/geoid_icon.svg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        geoid: {
                            dark: '#0f172a',
                            darker: '#020617',
                            primary: '#3b82f6', // Matching Dynastore blue for now
                            secondary: '#64748b',
                            accent: '#0ea5e9',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Background Gradients -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 opacity-20 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:40px_40px]"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-emerald-500/5 rounded-full blur-[100px]"></div>
    </div>

    <div class="relative z-10 w-full max-w-lg">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <img src="/web/geoid/geoid_logo.svg" alt="GeoID Logo" class="h-16 mx-auto mb-4 drop-shadow-lg">
            <h1 class="text-3xl font-bold text-white tracking-tight">GeoID Service</h1>
            <p class="text-slate-400 mt-2">High-precision geoid height calculation</p>
        </div>

        <!-- Calculation Card -->
        <div class="glass-panel rounded-2xl p-8 shadow-2xl border border-white/5">
            <form id="geoid-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Latitude</label>
                        <input type="number" step="any" id="lat" placeholder="0.00" class="input-field w-full px-4 py-3 rounded-lg font-mono text-sm" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Longitude</label>
                        <input type="number" step="any" id="lon" placeholder="0.00" class="input-field w-full px-4 py-3 rounded-lg font-mono text-sm" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-calculator group-hover:rotate-12 transition-transform"></i>
                    <span>Calculate Height</span>
                </button>
            </form>

            <!-- Result Area -->
            <div id="result-area" class="mt-8 hidden border-t border-white/10 pt-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-400 text-sm">Geoid Height (N)</span>
                    <span class="text-emerald-400 text-xs font-mono bg-emerald-500/10 px-2 py-1 rounded">EGM2008</span>
                </div>
                <div class="text-4xl font-mono font-bold text-white text-center py-4 bg-black/20 rounded-xl border border-white/5">
                    <span id="result-value">0.000</span> <span class="text-lg text-slate-500">m</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-slate-600">
            &copy; 2025 GeoID Service. Powered by Dynastore.
        </div>
    </div>

    <script>
        document.getElementById('geoid-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            
            // Simulating API call
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Calculating...';
            btn.disabled = true;

            setTimeout(() => {
                // Mock result (replace with actual API call)
                const mockHeight = (Math.random() * 100).toFixed(3);
                
                document.getElementById('result-value').innerText = mockHeight;
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('result-area').classList.add('fade-in'); // Assuming fade-in class exists or simple display
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 800);
        });
    </script>
</body>
</html>
