<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration Hub</title>
  <link rel="stylesheet" href="/web/static/vendor/vendor.css">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --primary: #58a6ff;
      --primary-dark: #1f6feb;
      --success: #3fb950;
      --danger: #f85149;
      --warning: #d29922;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    main { max-width: 1400px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    h1 i { color: var(--primary); margin-right: 10px; }
    .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 20px; }

    .context-bar {
      background: var(--surface);
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .scope-select {
      padding: 6px 10px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      gap: 16px;
      min-height: 600px;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 260px 1fr; }
      .preview-panel { display: none; }
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      overflow: auto;
    }
    .panel-header {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .form-panel { display: flex; flex-direction: column; gap: 14px; }
    .form-panel-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .btn {
      padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.85rem; font-weight: 500;
      display: inline-flex; align-items: center; gap: 6px; transition: all .15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary-dark); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary); }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
    .status { color: var(--text-dim); font-size: 0.85rem; flex: 1; }
    .status.ok { color: var(--success); }
    .status.err { color: var(--danger); }
    .status.warn { color: var(--warning); }

    pre.preview-json {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 0.72rem;
      overflow: auto;
      max-height: 600px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty-hint {
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1><i class="fa-solid fa-sliders"></i> Configuration Hub</h1>
      <p class="subtitle">
        Schema-driven editor for every registered plugin configuration — routing, drivers,
        and anything else exposing a Pydantic model. Changes are scoped and patched.
      </p>
    </section>

    <div id="context-bar" class="context-bar"></div>

    <div class="layout">
      <aside id="schema-list" class="panel">
        <div class="panel-header">Plugins</div>
      </aside>

      <section class="panel form-panel">
        <div>
          <div class="panel-header" id="form-header">Editor</div>
          <div id="schema-form"></div>
        </div>
        <div class="form-panel-actions">
          <button id="revert" class="btn btn-secondary" disabled>
            <i class="fa-solid fa-rotate-left"></i> Revert
          </button>
          <button id="apply" class="btn btn-primary" disabled>
            <i class="fa-solid fa-save"></i> Save
          </button>
          <span id="status" class="status"></span>
        </div>
      </section>

      <aside class="panel preview-panel">
        <div class="panel-header">Resolved (read-only)</div>
        <pre id="preview-json" class="preview-json"></pre>
      </aside>
    </div>
  </main>

  <script type="module" src="configuration.js"></script>
</body>
</html>
