<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Exposure</title>
  <link rel="stylesheet" href="/web/static/vendor/vendor.css">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --primary: #58a6ff;
      --primary-dark: #1f6feb;
      --success: #3fb950;
      --danger: #f85149;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    h1 i { color: var(--primary); margin-right: 10px; }
    .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }
    .section { margin-bottom: 24px; }
    .scope-picker {
      display: flex; gap: 16px; align-items: center; margin: 16px 0;
      background: var(--surface); padding: 16px; border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .scope-picker label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 0.9rem; }
    .scope-picker input[type="radio"] { cursor: pointer; }
    .scope-picker select {
      padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.85rem;
    }
    .scope-picker select:disabled { opacity: 0.5; cursor: not-allowed; }
    table {
      width: 100%; border-collapse: collapse; margin: 16px 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    table th, table td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.85rem; }
    table th { background: var(--surface2); color: #fff; font-weight: 600; }
    table tr:last-child td { border-bottom: none; }
    table input[type="checkbox"] { cursor: pointer; }
    table select { padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; }
    .footer {
      display: flex; gap: 12px; align-items: center; margin-top: 24px;
      padding: 16px; background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .btn {
      padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; gap: 7px; transition: all .2s;
    }
    .btn-primary { background: var(--primary-dark); color: #fff; }
    .btn-primary:hover { background: var(--primary); }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface2); color: var(--text); }
    #status { color: var(--text-dim); font-size: 0.85rem; flex: 1; }
    #status.ok { color: var(--success); }
    #status.err { color: var(--danger); }
  </style>
</head>
<body>
  <main>
    <section>
      <h1><i class="fa-solid fa-toggle-on"></i> Service Exposure</h1>
      <p class="subtitle">Enable or disable extensions at platform or catalog scope. Changes apply immediately.</p>
    </section>

    <section class="scope-picker">
      <label><input type="radio" name="scope" value="platform" checked> Platform Scope</label>
      <label><input type="radio" name="scope" value="catalog"> Catalog Scope</label>
      <select id="catalog-select" disabled>
        <option value="">-- select catalog --</option>
      </select>
    </section>

    <section>
      <table id="exposure-grid">
        <thead>
          <tr>
            <th>Extension</th>
            <th>Platform</th>
            <th>Catalog Override</th>
            <th>Effective</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <footer class="footer">
      <button id="revert" class="btn btn-secondary"><i class="fa-solid fa-rotate-left"></i> Revert</button>
      <button id="apply" class="btn btn-primary"><i class="fa-solid fa-save"></i> Apply</button>
      <span id="status"></span>
    </footer>
  </main>

  <script src="exposure.js"></script>
</body>
</html>
