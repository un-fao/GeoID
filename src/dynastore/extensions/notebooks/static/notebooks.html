<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notebooks</title>
<link rel="stylesheet" href="/web/static/vendor/vendor.css"/>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --primary: #58a6ff;
    --primary-dark: #1f6feb;
    --success: #3fb950;
    --danger: #f85149;
    --warning: #d29922;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .panel { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
  h1 i { color: var(--primary); margin-right: 10px; }
  .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }

  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 200px; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.85rem; outline: none;
  }
  .search-box:focus { border-color: var(--primary); }

  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
    display: inline-flex; align-items: center; gap: 7px; transition: all .2s;
  }
  .btn-primary { background: var(--primary-dark); color: #fff; }
  .btn-primary:hover { background: var(--primary); }
  .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
  .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: none; }
  .btn-ghost:hover { color: var(--text); }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500;
    color: var(--text-dim); border-bottom: 2px solid transparent; transition: all .2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: all .2s; cursor: pointer; position: relative;
  }
  .card:hover { border-color: var(--primary); transform: translateY(-2px); }
  .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .card-desc { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 12px; line-height: 1.4; }
  .card-meta { display: flex; align-items: center; gap: 12px; font-size: 0.78rem; color: var(--text-dim); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .card-tag {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
    background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border);
  }
  .card-meta i { width: 14px; text-align: center; }
  .card-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.72rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-platform { background: #1a3a2a; color: var(--success); }
  .badge-catalog { background: #1a2a3a; color: var(--primary); }

  .card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; opacity: 0; transition: opacity .2s; }
  .card:hover .card-actions { opacity: 1; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.3; }
  .empty p { font-size: 0.9rem; }

  /* Viewer panel */
  .viewer-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  }
  .viewer-overlay.open { display: flex; justify-content: center; align-items: center; }
  .viewer-panel {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    width: 90vw; max-width: 1100px; height: 85vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .viewer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .viewer-header h2 { font-size: 1.1rem; font-weight: 600; color: #fff; }
  .viewer-body { flex: 1; overflow-y: auto; padding: 24px; }
  .viewer-body.hidden { display: none; }

  /* JupyterLite iframe */
  .lite-frame {
    display: none; flex: 1; border: none; width: 100%; height: 100%;
    background: var(--bg);
  }
  .lite-frame.active { display: block; }

  /* Notebook cell rendering */
  .nb-cell { margin-bottom: 16px; }
  .nb-cell-md { line-height: 1.6; }
  .nb-cell-md h1 { font-size: 1.4rem; margin: 16px 0 8px; color: #fff; }
  .nb-cell-md h2 { font-size: 1.2rem; margin: 14px 0 6px; color: #fff; }
  .nb-cell-md h3 { font-size: 1.05rem; margin: 12px 0 4px; color: #fff; }
  .nb-cell-md p { margin: 6px 0; }
  .nb-cell-md ul, .nb-cell-md ol { margin: 6px 0 6px 20px; }
  .nb-cell-md table { border-collapse: collapse; margin: 8px 0; width: 100%; }
  .nb-cell-md th, .nb-cell-md td { padding: 6px 10px; border: 1px solid var(--border); font-size: 0.85rem; }
  .nb-cell-md th { background: var(--surface2); font-weight: 600; color: #fff; }
  .nb-cell-md code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; font-size: 0.85em; }
  .nb-cell-md a { color: var(--primary); text-decoration: none; }
  .nb-cell-md a:hover { text-decoration: underline; }
  .nb-cell-code {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    overflow-x: auto;
  }
  .nb-cell-code pre {
    padding: 12px 16px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82rem; line-height: 1.5; color: var(--text); white-space: pre; margin: 0;
  }
  .nb-cell-label {
    font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600;
  }

  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    padding: 12px 20px; border-radius: var(--radius); font-size: 0.85rem;
    opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 320px;
  }
  #toast.show { opacity: 1; }
  #toast.ok { background: #1e3a25; border: 1px solid var(--success); color: var(--success); }
  #toast.err { background: #3a1a1a; border: 1px solid var(--danger); color: var(--danger); }
</style>
<script src="../website/context-selector.js"></script>
<!-- Markdown rendering (sanitized by marked.js defaults — no raw HTML passthrough) -->
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
<div class="panel">
  <h1><i class="fa-solid fa-book-open"></i> Notebooks</h1>
  <p class="subtitle">Interactive documentation and how-to guides. Browse examples or manage catalog notebooks.</p>

  <div class="tabs">
    <div class="tab active" data-tab="platform" onclick="switchTab('platform')">
      <i class="fa-solid fa-graduation-cap"></i> Platform
    </div>
    <div class="tab" data-tab="catalog" onclick="switchTab('catalog')">
      <i class="fa-solid fa-database"></i> Catalog Notebooks
    </div>
  </div>

  <div id="tab-platform">
    <div class="toolbar">
      <input class="search-box" id="search-platform" placeholder="Search platform notebooks..." oninput="filterCards('platform')">
    </div>
    <div class="card-grid" id="grid-platform">
      <div class="empty" id="empty-platform"><i class="fa-solid fa-box-open"></i><p>No platform notebooks found.</p></div>
    </div>
  </div>

  <div id="tab-catalog" style="display:none">
    <div class="toolbar">
      <input class="search-box" id="search-catalog" placeholder="Search catalog notebooks..." oninput="filterCards('catalog')">
      <button class="btn btn-primary" onclick="copyAllPlatform()"><i class="fa-solid fa-copy"></i> Copy All to Catalog</button>
    </div>
    <div class="card-grid" id="grid-catalog">
      <div class="empty" id="empty-catalog"><i class="fa-solid fa-box-open"></i><p>No notebooks in this catalog. Copy an example to get started.</p></div>
    </div>
  </div>
</div>

<!-- Viewer overlay -->
<div class="viewer-overlay" id="viewer">
  <div class="viewer-panel">
    <div class="viewer-header">
      <h2 id="viewer-title">Notebook</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" id="btn-run-lite" onclick="toggleLiteMode()" title="Run in JupyterLite"><i class="fa-solid fa-play"></i> <span id="btn-run-label">Run</span></button>
        <button class="btn btn-outline btn-sm" id="btn-download" onclick="downloadNotebook()" title="Download .ipynb"><i class="fa-solid fa-download"></i> Download</button>
        <button class="btn btn-outline btn-sm" id="btn-share" onclick="shareNotebook()" title="Copy share link"><i class="fa-solid fa-share-nodes"></i> Share</button>
        <button class="btn btn-outline btn-sm" id="btn-copy-to-catalog" onclick="copyCurrentToCatalog()" title="Copy to catalog"><i class="fa-solid fa-copy"></i> Copy to Catalog</button>
        <button class="btn btn-ghost" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
    <div class="viewer-body" id="viewer-body"></div>
    <iframe class="lite-frame" id="lite-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>
</div>

<div id="toast"></div>

<script>
/* global marked, DOMPurify */

// Configure marked to not allow raw HTML passthrough (XSS prevention)
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

/** Sanitize HTML string through DOMPurify */
function sanitize(html) {
  if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(html);
  // Fallback: strip all tags
  var d = document.createElement('div');
  d.textContent = html;
  return d.textContent;
}

const API_BASE = (function() {
  const p = window.location.pathname;
  const idx = p.indexOf('/web/');
  return idx >= 0 ? p.substring(0, idx) : '';
})();

let currentTab = 'platform';
let platformNotebooks = [];
let catalogNotebooks = [];
let currentNotebook = null;
let currentNotebookSource = null;

function getSelectedCatalog() {
  if (window.DynaStoreContext && window.DynaStoreContext.catalog) return window.DynaStoreContext.catalog;
  const sel = document.getElementById('context-catalog-select');
  return sel ? sel.value : null;
}

function getLanguage() {
  if (window.DynaStoreContext && window.DynaStoreContext.language) return window.DynaStoreContext.language;
  var qs = new URLSearchParams(window.location.search).get('language');
  if (qs) return qs;
  return (document.documentElement.lang || 'en').slice(0, 2);
}

/** Resolve an i18n value that may be a plain string or a {lang: string} dict. */
function i18n(val, fallback) {
  if (val == null) return fallback || '';
  if (typeof val === 'string') return val;
  if (typeof val === 'object') {
    var lang = getLanguage();
    return val[lang] || val.en || Object.values(val)[0] || (fallback || '');
  }
  return String(val);
}

function getAuthHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (window.DynaStoreContext && window.DynaStoreContext.token) {
    h['Authorization'] = 'Bearer ' + window.DynaStoreContext.token;
  }
  return h;
}

// --- Tab switching ---
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  document.getElementById('tab-platform').style.display = tab === 'platform' ? '' : 'none';
  document.getElementById('tab-catalog').style.display = tab === 'catalog' ? '' : 'none';
  if (tab === 'catalog') loadCatalogNotebooks();
}

// --- Loading ---
async function loadPlatformNotebooks() {
  try {
    var r = await fetch(API_BASE + '/notebooks/platform');
    if (!r.ok) throw new Error(r.statusText);
    var data = await r.json();
    platformNotebooks = data.items || [];
    renderGrid('platform', platformNotebooks);
  } catch (e) {
    console.error('Failed to load platform notebooks:', e);
    renderGrid('platform', []);
  }
}

async function loadCatalogNotebooks() {
  var cat = getSelectedCatalog();
  if (!cat) { renderGrid('catalog', []); return; }
  try {
    var r = await fetch(API_BASE + '/notebooks/' + encodeURIComponent(cat), { headers: getAuthHeaders() });
    if (!r.ok) throw new Error(r.statusText);
    var data = await r.json();
    catalogNotebooks = data.items || [];
    renderGrid('catalog', catalogNotebooks);
  } catch (e) {
    console.error('Failed to load catalog notebooks:', e);
    renderGrid('catalog', []);
  }
}

// --- Rendering ---
function renderGrid(type, items) {
  var grid = document.getElementById('grid-' + type);
  var empty = document.getElementById('empty-' + type);
  // Remove existing cards only (keep empty placeholder)
  Array.from(grid.querySelectorAll('.card')).forEach(function(c) { c.remove(); });

  if (!items.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  items.forEach(function(nb) {
    var card = document.createElement('div');
    card.className = 'card';

    var isExample = type === 'platform' || nb.source === 'bundled';

    // Build card content using safe DOM methods
    var actionsDiv = document.createElement('div');
    actionsDiv.className = 'card-actions';
    if (type === 'platform') {
      var copyBtn = document.createElement('button');
      copyBtn.className = 'btn btn-outline btn-sm';
      copyBtn.title = 'Copy to Catalog';
      var copyIcon = document.createElement('i');
      copyIcon.className = 'fa-solid fa-copy';
      copyBtn.appendChild(copyIcon);
      var nbIdCopy = nb.notebook_id;
      copyBtn.addEventListener('click', (function(id) { return function(ev) { ev.stopPropagation(); copyToCatalog(id); }; })(nbIdCopy));
      actionsDiv.appendChild(copyBtn);
    }
    if (type === 'catalog') {
      var delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-sm';
      delBtn.title = 'Delete';
      var delIcon = document.createElement('i');
      delIcon.className = 'fa-solid fa-trash';
      delBtn.appendChild(delIcon);
      var nbId = nb.notebook_id;
      delBtn.addEventListener('click', (function(id) { return function(ev) { ev.stopPropagation(); deleteNotebook(id); }; })(nbId));
      actionsDiv.appendChild(delBtn);
    }
    card.appendChild(actionsDiv);

    var headerDiv = document.createElement('div');
    headerDiv.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;';
    var badge = document.createElement('span');
    badge.className = 'card-badge ' + (isExample ? 'badge-platform' : 'badge-catalog');
    badge.textContent = isExample ? 'Platform' : 'Catalog';
    headerDiv.appendChild(badge);
    var title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = i18n(nb.title, nb.notebook_id);
    headerDiv.appendChild(title);
    card.appendChild(headerDiv);

    var desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = i18n(nb.description, '');
    card.appendChild(desc);

    if (Array.isArray(nb.tags) && nb.tags.length) {
      var tagsDiv = document.createElement('div');
      tagsDiv.className = 'card-tags';
      nb.tags.forEach(function(t) {
        var tag = document.createElement('span');
        tag.className = 'card-tag';
        tag.textContent = t;
        tagsDiv.appendChild(tag);
      });
      card.appendChild(tagsDiv);
    }

    var meta = document.createElement('div');
    meta.className = 'card-meta';
    if (nb.updated_at) {
      var d = new Date(nb.updated_at);
      var span = document.createElement('span');
      var clockIcon = document.createElement('i');
      clockIcon.className = 'fa-regular fa-clock';
      span.appendChild(clockIcon);
      span.appendChild(document.createTextNode(' ' + d.toLocaleDateString()));
      meta.appendChild(span);
    }
    card.appendChild(meta);

    var notebookId = nb.notebook_id;
    card.addEventListener('click', (function(t, id) { return function() { openNotebook(t, id); }; })(type, notebookId));
    grid.appendChild(card);
  });
}

function filterCards(type) {
  var q = document.getElementById('search-' + type).value.toLowerCase().trim();
  var items = type === 'platform' ? platformNotebooks : catalogNotebooks;
  if (!q) { renderGrid(type, items); return; }
  var filtered = items.filter(function(nb) {
    var hay = [
      i18n(nb.title, ''),
      i18n(nb.description, ''),
      nb.notebook_id || '',
      (nb.tags || []).join(' ')
    ].join(' ').toLowerCase();
    return hay.indexOf(q) >= 0;
  });
  renderGrid(type, filtered);
}

// --- Viewer ---
async function openNotebook(type, notebookId) {
  currentNotebookSource = type;
  try {
    var url;
    if (type === 'platform') {
      url = API_BASE + '/notebooks/platform/' + encodeURIComponent(notebookId);
    } else {
      var cat = getSelectedCatalog();
      url = API_BASE + '/notebooks/' + encodeURIComponent(cat) + '/' + encodeURIComponent(notebookId);
    }
    var r = await fetch(url, { headers: getAuthHeaders() });
    if (!r.ok) throw new Error(r.statusText);
    var data = await r.json();
    // Catalog notebooks wrap content in a .content field
    if (data.content && data.content.cells) data = data.content;
    currentNotebook = { id: notebookId, data: data };
    renderNotebook(data);
    document.getElementById('viewer-title').textContent = i18n(data.metadata && data.metadata.title, notebookId);
    document.getElementById('btn-copy-to-catalog').style.display = type === 'platform' ? '' : 'none';
    document.getElementById('viewer').classList.add('open');
    // Jump straight into JupyterLab so the user gets per-cell Run + editable
    // contents; the read-only preview remains reachable via the View toggle.
    toggleLiteMode();
  } catch (e) {
    toast('Failed to load notebook: ' + e.message, true);
  }
}

function renderNotebook(nb) {
  var body = document.getElementById('viewer-body');
  // Clear using safe method
  while (body.firstChild) body.removeChild(body.firstChild);

  if (!nb.cells) {
    var emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty';
    var emptyP = document.createElement('p');
    emptyP.textContent = 'Invalid notebook format.';
    emptyDiv.appendChild(emptyP);
    body.appendChild(emptyDiv);
    return;
  }

  nb.cells.forEach(function(cell) {
    var div = document.createElement('div');
    div.className = 'nb-cell';
    var src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');

    if (cell.cell_type === 'markdown') {
      div.className += ' nb-cell-md';
      // Render markdown through marked, then sanitize with DOMPurify
      var rawHtml = typeof marked !== 'undefined' ? marked.parse(src) : src;
      div.appendChild(createSanitizedFragment(rawHtml));
    } else if (cell.cell_type === 'code') {
      var label = document.createElement('div');
      label.className = 'nb-cell-label';
      label.textContent = 'Python';
      div.appendChild(label);

      var codeWrap = document.createElement('div');
      codeWrap.className = 'nb-cell-code';
      var pre = document.createElement('pre');
      pre.textContent = src;  // textContent is safe against XSS
      codeWrap.appendChild(pre);
      div.appendChild(codeWrap);
    }
    body.appendChild(div);
  });
}

/** Create a DocumentFragment from sanitized HTML */
function createSanitizedFragment(html) {
  var clean = sanitize(html);
  var template = document.createElement('template');
  template.innerHTML = clean;
  return template.content;
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  currentNotebook = null;
}

// --- CRUD operations ---
async function copyCurrentToCatalog() {
  var cat = getSelectedCatalog();
  if (!cat) { toast('Select a catalog first', true); return; }
  if (!currentNotebook) return;

  try {
    var r = await fetch(API_BASE + '/notebooks/' + encodeURIComponent(cat) + '/copy/' + encodeURIComponent(currentNotebook.id), {
      method: 'POST',
      headers: getAuthHeaders(),
    });
    if (!r.ok) throw new Error(await r.text());
    toast('Copied to catalog: ' + cat);
    if (currentTab === 'catalog') loadCatalogNotebooks();
  } catch (e) {
    toast('Copy failed: ' + e.message, true);
  }
}

async function copyAllPlatform() {
  var cat = getSelectedCatalog();
  if (!cat) { toast('Select a catalog first', true); return; }
  if (!platformNotebooks.length) { toast('No platform notebooks available', true); return; }

  var ok = 0;
  for (var i = 0; i < platformNotebooks.length; i++) {
    var nb = platformNotebooks[i];
    try {
      var s = await fetch(API_BASE + '/notebooks/' + encodeURIComponent(cat) + '/copy/' + encodeURIComponent(nb.notebook_id), {
        method: 'POST',
        headers: getAuthHeaders(),
      });
      if (s.ok) ok++;
    } catch (e) { /* skip */ }
  }
  toast('Copied ' + ok + '/' + platformNotebooks.length + ' platform notebooks to ' + cat);
  loadCatalogNotebooks();
}

async function deleteNotebook(notebookId) {
  if (!confirm('Delete notebook "' + notebookId + '"?')) return;
  var cat = getSelectedCatalog();
  if (!cat) return;
  try {
    var r = await fetch(API_BASE + '/notebooks/' + encodeURIComponent(cat) + '/' + encodeURIComponent(notebookId), {
      method: 'DELETE',
      headers: getAuthHeaders(),
    });
    if (!r.ok) throw new Error(await r.text());
    toast('Deleted: ' + notebookId);
    loadCatalogNotebooks();
  } catch (e) {
    toast('Delete failed: ' + e.message, true);
  }
}

// --- Copy single platform notebook to catalog ---
async function copyToCatalog(platformNotebookId) {
  var cat = getSelectedCatalog();
  if (!cat) { toast('Select a catalog first', true); return; }
  try {
    var r = await fetch(API_BASE + '/notebooks/' + encodeURIComponent(cat) + '/copy/' + encodeURIComponent(platformNotebookId), {
      method: 'POST',
      headers: getAuthHeaders(),
    });
    if (!r.ok) throw new Error(await r.text());
    toast('Copied to catalog: ' + cat);
    if (currentTab === 'catalog') loadCatalogNotebooks();
  } catch (e) {
    toast('Copy failed: ' + e.message, true);
  }
}

// --- Helpers ---
function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (err ? 'err' : 'ok');
  setTimeout(function() { t.className = ''; }, 3000);
}

// --- Context change listener ---
if (window.addEventListener) {
  window.addEventListener('dynastore-context-change', function() {
    if (currentTab === 'catalog') loadCatalogNotebooks();
  });
}

// --- Download / Share ---
function downloadNotebook() {
  if (!currentNotebook || !currentNotebook.data) { toast('No notebook loaded', true); return; }
  var content = JSON.stringify(currentNotebook.data, null, 2);
  var blob = new Blob([content], { type: 'application/x-ipynb+json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (currentNotebook.id || 'notebook') + '.ipynb';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Downloaded: ' + a.download);
}

function shareNotebook() {
  if (!currentNotebook) { toast('No notebook loaded', true); return; }
  // Build a direct link to this notebook via the API
  var base = window.location.origin + API_BASE;
  var link;
  if (currentNotebookSource === 'platform') {
    link = base + '/notebooks/platform/' + encodeURIComponent(currentNotebook.id);
  } else {
    var cat = getSelectedCatalog();
    if (!cat) { toast('Select a catalog to share catalog notebooks', true); return; }
    link = base + '/notebooks/' + encodeURIComponent(cat) + '/' + encodeURIComponent(currentNotebook.id);
  }
  // Copy to clipboard
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(function() {
      toast('Link copied: ' + link);
    }).catch(function() {
      prompt('Copy this link:', link);
    });
  } else {
    prompt('Copy this link:', link);
  }
}

// --- JupyterLite integration ---
let liteActive = false;
let liteReady = false;

function getLiteBaseUrl() {
  // JupyterLite assets served by the notebooks extension's @expose_static("lite")
  // provider, mounted under the web extension at /web/lite/.
  return '/web/lite/lab/index.html';
}

async function toggleLiteMode() {
  var body = document.getElementById('viewer-body');
  var frame = document.getElementById('lite-frame');
  var label = document.getElementById('btn-run-label');

  if (liteActive) {
    // Switch back to read-only view
    body.classList.remove('hidden');
    frame.classList.remove('active');
    frame.src = '';
    label.textContent = 'Run';
    liteActive = false;
    liteReady = false;
    return;
  }

  // Preflight: JupyterLite assets are built at container build time
  // (BUILD_JUPYTERLITE=true). If missing, fail loudly instead of loading
  // a 404 into the iframe.
  var liteUrl = getLiteBaseUrl();
  try {
    // GET (not HEAD — the static route only registers GET).
    var probe = await fetch(liteUrl, { method: 'GET' });
    if (!probe.ok) {
      toast('Run unavailable: JupyterLite assets not built (rebuild with BUILD_JUPYTERLITE=true).', true);
      return;
    }
  } catch (e) {
    toast('Run unavailable: cannot reach JupyterLite (' + e.message + ')', true);
    return;
  }

  // Switch to JupyterLite
  body.classList.add('hidden');
  frame.classList.add('active');
  label.textContent = 'View';
  liteActive = true;

  frame.src = liteUrl;

  // Wait for JupyterLite to signal readiness, then inject notebook
  frame.onload = function() {
    // Give JupyterLite time to initialize, then send notebook content
    setTimeout(function() { sendNotebookToLite(); }, 3000);
  };
}

function sendNotebookToLite() {
  if (!currentNotebook || !currentNotebook.data) return;
  var frame = document.getElementById('lite-frame');
  if (!frame.contentWindow) return;

  var token = null;
  if (window.DynaStoreContext && window.DynaStoreContext.token) {
    token = window.DynaStoreContext.token;
  }

  // Send context + notebook content via postMessage
  frame.contentWindow.postMessage({
    type: 'INIT_CONTEXT',
    token: token,
    catalogCode: getSelectedCatalog(),
    baseUrl: API_BASE
  }, '*');

  frame.contentWindow.postMessage({
    type: 'LOAD_NOTEBOOK',
    notebook: currentNotebook.data,
    notebookId: currentNotebook.id
  }, '*');
}

// Listen for NOTEBOOK_READY from JupyterLite iframe
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'NOTEBOOK_READY') {
    if (liteReady) return; // Idempotent: bridge may re-emit this during boot
    liteReady = true;
    sendNotebookToLite();
  }
});

// Reset lite state when viewer closes
var _origCloseViewer = closeViewer;
closeViewer = function() {
  liteActive = false;
  liteReady = false;
  var frame = document.getElementById('lite-frame');
  if (frame) { frame.src = ''; frame.classList.remove('active'); }
  var body = document.getElementById('viewer-body');
  if (body) { body.classList.remove('hidden'); }
  var label = document.getElementById('btn-run-label');
  if (label) { label.textContent = 'Run'; }
  _origCloseViewer();
};

// --- Init ---
loadPlatformNotebooks();
</script>
