<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Configuration Editor — Agro-Informatics Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --primary: #58a6ff;
    --primary-dark: #1f6feb;
    --success: #3fb950;
    --danger: #f85149;
    --warning: #d29922;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .panel { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
  h1 i { color: var(--primary); margin-right: 10px; }
  .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }

  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 200px; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.85rem;
    outline: none;
  }
  .search-box:focus { border-color: var(--primary); }
  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
    display: flex; align-items: center; gap: 7px; transition: all .2s;
  }
  .btn-primary { background: var(--primary-dark); color: #fff; }
  .btn-primary:hover { background: var(--primary); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  /* Editor container */
  #config-editor-wrap {
    background: var(--surface); padding: 20px; border-radius: var(--radius);
    border: 1px solid var(--border); overflow-x: auto;
  }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.9rem; }

  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    padding: 12px 20px; border-radius: var(--radius); font-size: 0.85rem;
    opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 320px;
  }
  #toast.show { opacity: 1; }
  #toast.ok { background: #1e3a25; border: 1px solid var(--success); color: var(--success); }
  #toast.err { background: #3a1a1a; border: 1px solid var(--danger); color: var(--danger); }

  /* JSON Editor styling overrides for dark mode */
  .je-object__container { border: 1px solid var(--border) !important; padding: 10px !important; margin-bottom: 10px !important; }
  .je-header { color: #fff !important; font-size: 1rem !important; }
  label { color: var(--text-dim) !important; font-size: 0.8rem !important; }
  input, select, textarea { background: var(--surface2) !important; color: var(--text) !important; border: 1px solid var(--border) !important; }
</style>
<script src="../website/context-selector.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@json-editor/json-editor@latest/dist/jsoneditor.min.js"></script>
</head>
<body>
<div class="panel">
  <h1><i class="fa-solid fa-sliders"></i> Platform Configuration</h1>
  <p class="subtitle">Unified configuration editor for platform, catalog and collection settings.</p>

  <div class="toolbar">
    <div id="cs-config-container"></div>
    <select id="config-plugin-select" class="search-box" style="margin-left:auto; max-width:250px;" onchange="loadConfigEditor()">
      <option value="">Select Plugin/Extension...</option>
    </select>
    <button class="btn btn-primary" onclick="loadConfigSchemas()"><i class="fa-solid fa-rotate"></i> Refresh</button>
  </div>

  <div id="config-editor-wrap" style="display:none;">
    <div id="json-editor-container"></div>
    <div class="form-actions">
        <button class="btn btn-danger" onclick="deleteConfig()"><i class="fa-solid fa-trash"></i> Reset to Default</button>
        <button class="btn btn-primary" onclick="saveConfig()"><i class="fa-solid fa-save"></i> Save Configuration</button>
    </div>
  </div>
  <div id="config-empty-state" class="empty">Please select a context and a plugin to edit its configuration.</div>
</div>

<div id="toast"></div>

<script>
// Derive API root from the page URL so paths work behind any prefix proxy.
const _CONFIGS_ROOT = (function () {
    const path = window.location.pathname.replace(/\/web\/.*$/, '');
    return path || '';
}());
const API_BASE = `${_CONFIGS_ROOT}/configs`;
let _configSchemas = {};
let _jsonEditor = null;
let _csConfig = null;

let TOKEN_KEY = 'ds_token';
let _tokenKeyPromise = fetch(`${_CONFIGS_ROOT}/configs/web_config`).then(r => r.ok ? r.json() : {}).then(c => {
  if (c.token_key) TOKEN_KEY = c.token_key;
}).catch(() => {});

async function getAuthHeaders() {
  await _tokenKeyPromise;
  const token = localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY) || '';
  return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
               : { 'Content-Type': 'application/json' };
}

async function apiFetch(path, opts = {}) {
  const headers = await getAuthHeaders();
  opts.headers = { ...headers, ...(opts.headers || {}) };
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${ok ? 'ok' : 'err'}`;
  setTimeout(() => t.className = '', 3000);
}

async function loadConfigSchemas() {
  try {
    _configSchemas = await apiFetch('/schemas');
    const select = document.getElementById('config-plugin-select');
    select.innerHTML = '<option value="">Select Plugin/Extension...</option>';
    for (const pluginId of Object.keys(_configSchemas)) {
      const opt = document.createElement('option');
      opt.value = pluginId;
      opt.textContent = _configSchemas[pluginId].title || pluginId;
      select.appendChild(opt);
    }
  } catch(e) { toast('Failed to load config schemas: ' + e.message, false); }
}

function getConfigUrl(pluginId) {
  let url = '';
  if (_csConfig && _csConfig.state.catalogId && _csConfig.state.catalogId !== '_system_') {
    url = `/catalogs/${encodeURIComponent(_csConfig.state.catalogId)}`;
    if (_csConfig.state.collectionId && _csConfig.state.collectionId !== '_system_') {
      url += `/collections/${encodeURIComponent(_csConfig.state.collectionId)}`;
    }
    url += '/configs';
  }
  return url + (pluginId ? `/${pluginId}` : (url ? '' : '/'));
}

async function loadConfigEditor() {
  const pluginId = document.getElementById('config-plugin-select').value;
  const wrap = document.getElementById('config-editor-wrap');
  const empty = document.getElementById('config-empty-state');
  
  if (!pluginId) {
    wrap.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  
  const schema = _configSchemas[pluginId];
  wrap.style.display = 'block';
  empty.style.display = 'none';
  
  const container = document.getElementById('json-editor-container');
  if (_jsonEditor) _jsonEditor.destroy();
  container.innerHTML = '';
  
  _jsonEditor = new JSONEditor(container, {
    schema: schema,
    theme: 'html', 
    iconlib: 'fontawesome5',
    disable_edit_json: false,
    disable_properties: false,
    disable_collapse: true
  });
  
  try {
    let url = getConfigUrl('');
    const configs = await apiFetch(url);
    
    let currentData = {};
    if (configs.results) {
        const found = configs.results.find(c => c.plugin_id === pluginId);
        if (found) currentData = found.config_data;
    } else {
        if (configs[pluginId]) currentData = configs[pluginId];
        else {
            // Try fetching specific plugin config if not in list
            try {
                currentData = await apiFetch(getConfigUrl(pluginId));
            } catch(ex) { console.warn('Could not fetch specific config', ex); }
        }
    }
    
    if (currentData && Object.keys(currentData).length > 0) {
        _jsonEditor.setValue(currentData);
    }
  } catch(e) { console.error('Failed to load current config', e); }
}

async function saveConfig() {
  const pluginId = document.getElementById('config-plugin-select').value;
  if (!pluginId || !_jsonEditor) return;
  
  if (_jsonEditor.validate().length) {
    toast('Fix validation errors before saving.', false);
    return;
  }
  
  try {
    await apiFetch(getConfigUrl(pluginId), { method: 'PUT', body: JSON.stringify(_jsonEditor.getValue()) });
    toast('Configuration saved successfully.');
  } catch(e) { toast('Save failed: ' + e.message, false); }
}

async function deleteConfig() {
  const pluginId = document.getElementById('config-plugin-select').value;
  if (!pluginId || !confirm('Reset to defaults?')) return;
  
  try {
    await apiFetch(getConfigUrl(pluginId), { method: 'DELETE' });
    toast('Configuration reset.');
    loadConfigEditor(); 
  } catch(e) { toast('Reset failed: ' + e.message, false); }
}

document.addEventListener('DOMContentLoaded', () => {
  _csConfig = new ContextSelector({
    containerId: 'cs-config-container',
    enableCollection: true,
    enableSearch: true,
    onChange: () => { loadConfigEditor(); }
  });
  loadConfigSchemas();
});
</script>
</body>
</html>
