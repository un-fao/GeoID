<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Database Migrations — DynaStore Admin</title>
<link rel="stylesheet" href="/web/static/vendor/vendor.css"/>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
    --primary: #58a6ff; --primary-dark: #1f6feb;
    --success: #3fb950; --danger: #f85149; --warning: #d29922;
    --text: #c9d1d9; --text-dim: #8b949e; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .panel { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
  h1 i { color: var(--primary); margin-right: 10px; }
  .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }

  /* Status banner */
  .status-banner {
    padding: 16px 20px; border-radius: var(--radius); margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px; font-weight: 500;
  }
  .status-up-to-date { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); color: var(--success); }
  .status-pending { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.3); color: var(--warning); }
  .status-drift { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); color: var(--danger); }
  .status-unchecked { background: rgba(88,166,255,.1); border: 1px solid rgba(88,166,255,.3); color: var(--primary); }
  .status-loading { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
  .tab-btn {
    padding: 10px 20px; border: none; background: none; color: var(--text-dim);
    font-family: 'Inter', sans-serif; font-size: 0.9rem; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s;
    display: flex; align-items: center; gap: 8px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Buttons */
  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
    display: inline-flex; align-items: center; gap: 7px; transition: all .2s;
  }
  .btn-primary { background: var(--primary-dark); color: #fff; }
  .btn-primary:hover { background: var(--primary); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: var(--surface2); color: var(--text-dim); font-weight: 600; padding: 10px 14px; text-align: left; }
  td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(88,166,255,.04); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
  }
  .badge-ok { background: rgba(63,185,80,.15); color: var(--success); }
  .badge-warn { background: rgba(210,153,34,.15); color: var(--warning); }
  .badge-err { background: rgba(248,81,73,.15); color: var(--danger); }
  .badge-info { background: rgba(88,166,255,.12); color: var(--primary); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: 1rem; color: #fff; margin-bottom: 12px; }

  /* Manifest grid */
  .manifest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .manifest-item {
    background: var(--surface2); border-radius: var(--radius); padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .manifest-module { font-weight: 600; color: var(--text); }
  .manifest-version { font-family: monospace; color: var(--primary); }

  /* SQL preview */
  .sql-preview {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; font-family: monospace; font-size: 0.8rem; color: var(--text-dim);
    max-height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 8px;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
  .empty-state i { font-size: 2rem; margin-bottom: 12px; display: block; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
    border-radius: var(--radius); font-size: 0.85rem; font-weight: 500;
    z-index: 1000; transition: opacity .3s; opacity: 0;
  }
  .toast.show { opacity: 1; }
  .toast-success { background: var(--success); color: #fff; }
  .toast-error { background: var(--danger); color: #fff; }
</style>
</head>
<body>
<div class="panel">
  <h1><i class="fa-solid fa-database"></i> Database Migrations</h1>
  <p class="subtitle">Manage structural database migrations, view history, and monitor schema health.</p>

  <!-- Status Banner -->
  <div id="statusBanner" class="status-banner status-loading">
    <i class="fa-solid fa-spinner fa-spin"></i>
    <span id="statusText">Loading migration status...</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="overview"><i class="fa-solid fa-gauge"></i> Overview</button>
    <button class="tab-btn" data-tab="pending"><i class="fa-solid fa-clock"></i> Pending</button>
    <button class="tab-btn" data-tab="history"><i class="fa-solid fa-history"></i> History</button>
    <button class="tab-btn" data-tab="schemas"><i class="fa-solid fa-layer-group"></i> Schema Health</button>
  </div>

  <!-- Overview Tab -->
  <div id="tab-overview" class="tab-pane active">
    <div class="card">
      <h3><i class="fa-solid fa-cube"></i> Expected Manifest (Global)</h3>
      <div id="expectedManifest" class="manifest-grid"></div>
    </div>
    <div class="card">
      <h3><i class="fa-solid fa-cubes"></i> Stored Manifest</h3>
      <div id="storedManifest" class="manifest-grid"></div>
    </div>
    <div class="card">
      <h3><i class="fa-solid fa-users"></i> Expected Tenant Manifest</h3>
      <div id="tenantManifest" class="manifest-grid"></div>
    </div>
  </div>

  <!-- Pending Tab -->
  <div id="tab-pending" class="tab-pane">
    <div class="toolbar">
      <button class="btn btn-secondary" onclick="loadPending()"><i class="fa-solid fa-refresh"></i> Refresh</button>
      <button class="btn btn-primary" id="btnApply" onclick="applyMigrations()" disabled>
        <i class="fa-solid fa-play"></i> Apply All Migrations
      </button>
    </div>
    <div id="pendingContent">
      <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i>Loading...</div>
    </div>
  </div>

  <!-- History Tab -->
  <div id="tab-history" class="tab-pane">
    <div class="toolbar">
      <select id="historySchema" class="btn btn-secondary" onchange="loadHistory()">
        <option value="public">public (global)</option>
      </select>
      <button class="btn btn-secondary" onclick="loadHistory()"><i class="fa-solid fa-refresh"></i> Refresh</button>
    </div>
    <div id="historyContent">
      <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i>Loading...</div>
    </div>
  </div>

  <!-- Schema Health Tab -->
  <div id="tab-schemas" class="tab-pane">
    <div class="toolbar">
      <input id="catalogInput" placeholder="Enter catalog_id..." class="btn btn-secondary" style="flex:1;min-width:200px;"/>
      <button class="btn btn-primary" onclick="loadSchemaHealth()"><i class="fa-solid fa-stethoscope"></i> Check Health</button>
    </div>
    <div id="schemaHealthContent">
      <div class="empty-state"><i class="fa-solid fa-layer-group"></i>Enter a catalog ID to check schema health.</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = window.location.origin;

// --- Tabs ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// --- Toast ---
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// --- API helpers ---
async function apiGet(path) {
  const r = await fetch(API + '/admin' + path, {credentials: 'include'});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiPost(path, body={}) {
  const r = await fetch(API + '/admin' + path, {
    method: 'POST', credentials: 'include',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// --- Render helpers ---
function renderManifest(el, manifest) {
  if (!manifest || Object.keys(manifest).length === 0) {
    el.innerHTML = '<div class="empty-state" style="padding:16px"><i class="fa-solid fa-inbox"></i>No modules registered</div>';
    return;
  }
  el.innerHTML = Object.entries(manifest).map(([mod, ver]) =>
    `<div class="manifest-item"><span class="manifest-module">${mod}</span><span class="manifest-version">${ver}</span></div>`
  ).join('');
}

// --- Load status ---
async function loadStatus() {
  try {
    const data = await apiGet('/migrations/status');
    const banner = document.getElementById('statusBanner');
    const text = document.getElementById('statusText');

    const statusMap = {
      'up_to_date':         { cls: 'status-up-to-date', icon: 'fa-circle-check', label: 'Database is up to date' },
      'pending_migrations': { cls: 'status-pending',    icon: 'fa-clock',        label: 'Pending migrations — apply via controls below' },
      'drift_detected':     { cls: 'status-drift',      icon: 'fa-triangle-exclamation', label: 'Drift detected — investigate module changes' },
      'unchecked':          { cls: 'status-unchecked',   icon: 'fa-question-circle',      label: 'Database not yet initialized' },
    };
    const s = statusMap[data.status] || statusMap['unchecked'];
    banner.className = 'status-banner ' + s.cls;
    banner.innerHTML = `<i class="fa-solid ${s.icon}"></i><span>${s.label}</span>`;

    renderManifest(document.getElementById('expectedManifest'), data.expected_manifest);
    renderManifest(document.getElementById('storedManifest'), data.stored_manifest);
    renderManifest(document.getElementById('tenantManifest'), data.expected_tenant_manifest);

    document.getElementById('btnApply').disabled = data.status === 'up_to_date';
  } catch (e) {
    document.getElementById('statusBanner').className = 'status-banner status-drift';
    document.getElementById('statusBanner').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><span>Failed to load status: ${e.message}</span>`;
  }
}

// --- Load pending ---
async function loadPending() {
  const el = document.getElementById('pendingContent');
  try {
    const data = await apiGet('/migrations/pending');
    let html = '';

    if (data.global && data.global.length > 0) {
      html += '<div class="card"><h3><i class="fa-solid fa-globe"></i> Global Pending</h3>';
      html += '<div class="table-wrap"><table><tr><th>Module</th><th>Version</th><th>Description</th></tr>';
      data.global.forEach(m => {
        html += `<tr><td><span class="badge badge-info">${m.module}</span></td><td>${m.version}</td><td>${m.description}</td></tr>`;
      });
      html += '</table></div></div>';
    }

    if (data.tenant && Object.keys(data.tenant).length > 0) {
      for (const [schema, migrations] of Object.entries(data.tenant)) {
        html += `<div class="card"><h3><i class="fa-solid fa-user"></i> Tenant: ${schema}</h3>`;
        html += '<div class="table-wrap"><table><tr><th>Module</th><th>Version</th><th>Description</th></tr>';
        migrations.forEach(m => {
          if (m.error) {
            html += `<tr><td colspan="3" style="color:var(--danger)">${m.error}</td></tr>`;
          } else {
            html += `<tr><td><span class="badge badge-info">${m.module}</span></td><td>${m.version}</td><td>${m.description}</td></tr>`;
          }
        });
        html += '</table></div></div>';
      }
    }

    if (!html) {
      html = '<div class="empty-state"><i class="fa-solid fa-circle-check"></i>No pending migrations</div>';
    }
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty-state" style="color:var(--danger)"><i class="fa-solid fa-exclamation-triangle"></i>${e.message}</div>`;
  }
}

// --- Apply ---
async function applyMigrations() {
  if (!confirm('Apply all pending migrations? This will execute SQL against the database.')) return;
  try {
    const result = await apiPost('/migrations/apply', {scope: 'all', dry_run: false});
    showToast('Migrations applied successfully!');
    loadStatus();
    loadPending();
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

// --- Load history ---
async function loadHistory() {
  const schema = document.getElementById('historySchema').value;
  const el = document.getElementById('historyContent');
  try {
    const data = await apiGet('/migrations/history?schema=' + encodeURIComponent(schema));
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i>No migration history</div>';
      return;
    }
    let html = '<div class="table-wrap"><table><tr><th>Module</th><th>Version</th><th>Description</th><th>Applied</th><th>By</th><th>Rollback</th></tr>';
    data.forEach(r => {
      const dt = r.applied_at ? new Date(r.applied_at).toLocaleString() : '-';
      const rb = r.has_rollback
        ? `<button class="btn btn-danger" style="padding:2px 8px;font-size:0.75rem" onclick="rollback('${r.module}','${r.version}','${schema}')"><i class="fa-solid fa-rotate-left"></i></button>`
        : '<span class="badge badge-warn">none</span>';
      html += `<tr><td><span class="badge badge-info">${r.module}</span></td><td>${r.version}</td><td>${r.description}</td><td>${dt}</td><td>${r.applied_by}</td><td>${rb}</td></tr>`;
    });
    html += '</table></div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty-state" style="color:var(--danger)"><i class="fa-solid fa-exclamation-triangle"></i>${e.message}</div>`;
  }
}

// --- Rollback ---
async function rollback(module, version, schema) {
  if (!confirm(`Rollback [${module}] ${version} in schema '${schema}'?`)) return;
  try {
    await apiPost('/migrations/rollback', {module, version, schema_name: schema});
    showToast(`Rolled back [${module}] ${version}`);
    loadHistory();
    loadStatus();
  } catch (e) {
    showToast('Rollback failed: ' + e.message, 'error');
  }
}

// --- Schema Health ---
async function loadSchemaHealth() {
  const catalogId = document.getElementById('catalogInput').value.trim();
  if (!catalogId) return;
  const el = document.getElementById('schemaHealthContent');
  el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i>Checking...</div>';
  try {
    const data = await apiGet('/schemas/' + encodeURIComponent(catalogId) + '/health');
    if (!data.collections || data.collections.length === 0) {
      el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i>No collections found</div>';
      return;
    }
    let html = `<div class="card"><h3><i class="fa-solid fa-database"></i> Schema: ${data.schema}</h3>`;
    html += '<div class="table-wrap"><table><tr><th>Collection</th><th>Schema Hash</th><th>Snapshot</th><th>Updated</th><th>Actions</th></tr>';
    data.collections.forEach(c => {
      const snap = c.has_snapshot
        ? '<span class="badge badge-ok">tracked</span>'
        : '<span class="badge badge-warn">no snapshot</span>';
      const hash = c.schema_hash ? c.schema_hash.substring(0, 12) + '...' : '-';
      html += `<tr><td>${c.collection_id}</td><td><code>${hash}</code></td><td>${snap}</td><td>${c.updated_at || '-'}</td>`;
      html += `<td><button class="btn btn-secondary" style="padding:4px 10px;font-size:0.78rem" onclick="evolveCollection('${catalogId}','${c.collection_id}')"><i class="fa-solid fa-code-compare"></i> Diff</button></td></tr>`;
    });
    html += '</table></div></div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty-state" style="color:var(--danger)"><i class="fa-solid fa-exclamation-triangle"></i>${e.message}</div>`;
  }
}

// --- Evolve collection ---
async function evolveCollection(catalogId, collectionId) {
  try {
    const result = await apiPost('/schemas/' + encodeURIComponent(catalogId) + '/' + encodeURIComponent(collectionId) + '/evolve');
    if (!result.has_changes) {
      showToast('No schema changes detected');
      return;
    }
    let msg = `Safe: ${result.safe_ops.length}, Unsafe: ${result.unsafe_ops.length}`;
    if (result.is_safe && result.safe_ops.length > 0) {
      if (confirm(`Schema diff found ${result.safe_ops.length} safe operation(s):\n${result.safe_ops.map(o=>o.detail).join('\n')}\n\nApply safe changes?`)) {
        const applied = await apiPost('/schemas/' + encodeURIComponent(catalogId) + '/' + encodeURIComponent(collectionId) + '/evolve', {apply_safe: true});
        showToast('Safe evolution applied!');
      }
    } else if (result.unsafe_ops.length > 0) {
      alert(`Unsafe changes detected (requires export-import):\n${result.unsafe_ops.map(o=>o.detail).join('\n')}`);
    }
  } catch (e) {
    showToast('Evolution check failed: ' + e.message, 'error');
  }
}

// --- Init ---
loadStatus();
loadPending();
loadHistory();
</script>
</body>
</html>
