# PR 1e step 3b вҖ” collection-tier PG metadata is now served by the
# composition driver ``CollectionPostgresqlDriver``.  It instantiates
# ``CollectionCorePostgresqlDriver`` + (try-imported)
# ``CollectionStacPostgresqlDriver`` internally via
# ``MetadataPgSidecarRegistry``; the two raw drivers' entry-points
# were removed in this PR so ``get_protocols(CollectionMetadataStore)``
# no longer surfaces them and routing fan-out happens once, inside the
# wrapper.  The CATALOG-tier raw drivers stay entry-point-registered
# until step 3c lands ``CatalogPostgresqlDriver``.
collection_postgresql = "dynastore.modules.storage.drivers.collection_metadata_postgresql:CollectionPostgresqlDriver"
# PR 1e step 3c вҖ” catalog-tier PG metadata is now served by the
# composition driver ``CatalogPostgresqlDriver``.  It instantiates
# ``CatalogCorePostgresqlDriver`` + (try-imported)
# ``CatalogStacPostgresqlDriver`` internally via
# ``CatalogMetadataPgSidecarRegistry``; the two raw drivers'
# entry-points were removed in this PR so
# ``get_protocols(CatalogMetadataStore)`` no longer surfaces them.
catalog_postgresql = "dynastore.modules.storage.drivers.catalog_metadata_postgresql:CatalogPostgresqlDriver"
# M3.2 вҖ” first concrete INDEX-role driver for the catalog tier.
# Diagnostic-only (logs every dispatch); NOT in the default
# CatalogRoutingConfig.operations[INDEX] list вҖ” opt-in via platform
# override.  See src/dynastore/modules/storage/drivers/catalog_log_indexer.py
# for rationale + future real-indexer reference-implementation notes.
metadata_catalog_log_indexer = "dynastore.modules.storage.drivers.catalog_log_indexer:LogCatalogIndexer"

