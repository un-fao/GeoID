# ==========================================================================
# GRANULAR TASKS
#
# Naming convention (SSOT — don't drift):
#   * catalog_task_<name> — lightweight, in-process task hosted by the catalog
#                           service (executed via FastAPI BackgroundTasks).
#                           Examples: bucket provisioning, GCS finalize hooks,
#                           catalog cleanup.
#   * worker_task_<name>  — heavy task packaged for Cloud Run Jobs (sync-db).
#                           On-prem, the `worker` service simulates these via
#                           in-process BackgroundTasks but the SCOPE naming
#                           stays the same so SCOPE=worker_task_<name> is a
#                           single, unambiguous task-type declaration.
#
# The gcp_cloud_runner reads each Cloud Run Job's SCOPE env var, strips the
# `worker_task_` prefix, and maps the remainder to the task entry-point name.
# See src/dynastore/modules/gcp/gcp_module.py::get_job_config.
# ==========================================================================

# ---- Dependency-only aliases (not runner-typed; consumed by the
#      catalog_task_* / worker_task_* extras below as composition blocks).
task_gdal_deps = ["dynastore[module_gdal]"]
task_elasticsearch_deps = ["dynastore[module_elasticsearch]"]
task_elasticsearch_indexer_deps = ["dynastore[module_elasticsearch]"]
task_ingestion_deps = ["dynastore[geospatial,module_gcp]"]
task_dwh_join_deps = ["dynastore[dwh]"]
task_export_features_deps = ["dynastore[geospatial_core,stac]"]
task_tiles_preseed_deps = ["dynastore[geospatial_core]", "morecantile>=7.0.3,<8"]
task_dimensions_materialize_deps = ["dynastore[extension_dimensions]"]

# ---- Catalog-hosted lightweight tasks (async-db, in-process).
catalog_task_gcp_provision = ["dynastore[module_gcp]"]
catalog_task_gcp_catalog_cleanup = ["dynastore[module_gcp,module_catalog]"]

# ==========================================================================
# PUBLIC FEATURE ALIASES — compose module + extension in one name
# ==========================================================================
catalog = ["dynastore[module_catalog,extension_catalog]"]
gcp = ["dynastore[module_gcp,extension_gcp_bucket]"]
datastore = ["dynastore[module_datastore]"]
db_config = ["dynastore[module_db_config]"]
iam = ["dynastore[module_iam,extension_iam]"]
db = ["dynastore[module_db]"]
crs = ["dynastore[module_crs,extension_crs]"]
cache = ["dynastore[module_cache]"]
events = ["dynastore[module_events,extension_events]"]
elasticsearch = ["dynastore[module_elasticsearch,task_elasticsearch_deps]"]
gdal = ["dynastore[module_gdal,extension_gdal,task_gdal_deps]"]
maps = ["dynastore[extension_maps]"]
stac = ["dynastore[module_stac, extension_stac]"]
stats = ["dynastore[module_stats,extension_stats]"]
web = ["dynastore[extension_web]"]
geoid = ["dynastore[web_core,extension_geoid]"]
processes = ["dynastore[extension_processes]"]
features = ["dynastore[extension_features]"]
styles = ["dynastore[module_styles,extension_styles]"]
moving_features = ["dynastore[module_moving_features,extension_moving_features]"]
connected_systems = ["dynastore[module_connected_systems,extension_connected_systems]"]
tiles = ["dynastore[module_tiles,extension_tiles]"]
tasks = ["dynastore[module_tasks,extension_tasks]"]
proxy = ["dynastore[module_proxy,extension_proxy]"]
logs = ["dynastore[extension_logs]"]
assets = ["dynastore[extension_assets]"]
configs = ["dynastore[extension_configs]"]
search = ["dynastore[extension_search]"]
storage = ["dynastore[module_storage]"]
auth = ["dynastore[extension_auth]"]
template = ["dynastore[extension_template]"]
dimensions = ["dynastore[extension_dimensions]"]
notebooks = ["dynastore[extension_notebooks]"]
