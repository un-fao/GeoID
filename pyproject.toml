[project]
name = "DynaStore"
version = "0.1.1"
description = "DynaStore application"
authors = [
    { name = "Carlo Cancellieri", email = "ccancellieri@gmail.com" }
]
dependencies = [ # Minimal Core Framework
    "pydantic>=2.0",
    "pydantic-settings>=2.3.0",
    "pydantic-extra-types>=2.10.6",
    "python-dotenv>=1.0.0",
    "python-dateutil",
    "cachetools",
    "async-lru",
    "orjson>=3.9.0",
]
requires-python = ">=3.12"
license-files = ["LICENSE"]
readme = "README.md"

# The 'optional-dependencies' defines the dependencies for each module/extension/task
# and aggregates them into 'api', 'worker', and 'all' variants for deployment.

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
# Features (Modules & Extensions)
# --- Base Dependencies (Modules/Extensions/Tasks) ---

# Granular Modules
module-catalog = ["dynastore[geospatial]", "sqlalchemy>=2.0.0", "async-lru>=2.0.0"]
module-gcp = ["gcloud-aio-storage==9.6.0", "google-cloud-bigquery==3.24.0", "google-cloud-run", "google-cloud-storage>=3.1.0", "google-cloud-pubsub", "gcsfs>=2024.5.0", "charset-normalizer", "httpx"]
module-datastore = ["dynastore[db-sync]", "psycopg2-binary>=2.9.7"]
module-db-config = ["async-lru", "psycopg2-binary>=2.9.7", "sqlalchemy", "geoalchemy2", "h3>=4.4.2", "s2sphere>=0.2.5", "python-dateutil"]
module-apikey = ["pydantic[email]", "argon2-cffi", "bcrypt"]
module-db = ["dynastore[db-async]", "sqlalchemy[asyncio]", "asyncpg"]
module-crs = ["dynastore[geospatial]", "pyproj>=3.0.0"]
module-events = ["psycopg[binary,pool]"]
module-elasticsearch = ["elasticsearch[async]"]
module-gdal = ["dynastore[geospatial]", "GDAL==3.11.4"]
module-tiles = ["dynastore[geospatial]"]
module-tasks = []
module-proxy = []
module-styles = []
module-stats = []
module-notebooks = []

# Granular Extensions (Depends on corresponding module if it exists)
extension-web = ["markdown>=3.3.7"]
extension-httpx = ["httpx"]
extension-catalog = ["dynastore[module-catalog]"]
extension-stac = ["dynastore[ingestion]", "pystac[validation]>=1.13.0"]
extension-auth = ["identify_middleware[google,fastapi] @ git+https://github.com/un-fao/identify-middleware.git@ref", "python-multipart>=0.0.9"]
extension-template = ["attrs>=25.3.0", "aiohttp>=3.12.15", "jinja2>=3.1.6", "xmltodict>=0.13.0", "httpx>=0.24.1"]
extension-processes = ["jsonschema"]
extension-features = ["dynastore[geospatial]", "dynastore[stac]"]
extension-tiles = ["dynastore[module-tiles]"]
extension-tasks = ["dynastore[module-tasks]"]
extension-proxy = ["dynastore[module-proxy]"]
extension-gdal = ["dynastore[module-gdal]"]
extension-styles = ["dynastore[module-styles]"]
extension-apikey = ["dynastore[module-apikey]"]
extension-logs = []
extension-configs = []
extension-stats = ["dynastore[module-stats]"]
extension-crs = ["dynastore[module-crs]"]
extension-events = ["dynastore[module-events]"]
extension-wfs = ["dynastore[geospatial]", "dynastore[ingestion]"]
extension-admin = ["dynastore[extension-apikey]"]
extension-assets = []
extension-notebooks = ["dynastore[module-notebooks]"]
extension-search = []
extension-gcp-bucket = ["dynastore[module-gcp]"]
extension-geoid = ["dynastore[extension-web]", "user-agents>=2.2.0"]
extension-maps = ["dynastore[geospatial]", "dynastore[mvt]", "GDAL==3.11.4"]
extension-dwh = ["dynastore[dwh]"]

# Granular Tasks
task-gdal = ["dynastore[module-gdal]"]
task-gcp-provision = ["dynastore[module-gcp]"]
task-elasticsearch = ["dynastore[module-elasticsearch]"]
task-ingestion = ["dynastore[geospatial]", "dynastore[module-gcp]"]
task-dwh-join = ["dynastore[dwh]"]
task-export_features = ["dynastore[geospatial]", "dynastore[stac]"]
task-tiles-preseed = ["dynastore[geospatial]", "morecantile==7.0.2"]

# --- Features (Public Aliases composing Module + Extension) ---
catalog = ["dynastore[module-catalog]", "dynastore[extension-catalog]"]
gcp = ["dynastore[module-gcp]", "dynastore[extension-gcp-bucket]"]
datastore = ["dynastore[module-datastore]"]
db_config = ["dynastore[module-db-config]"]
apikey = ["dynastore[module-apikey]", "dynastore[extension-apikey]"]
db = ["dynastore[module-db]"]
crs = ["dynastore[module-crs]", "dynastore[extension-crs]"]
events = ["dynastore[module-events]", "dynastore[extension-events]"]
elasticsearch = ["dynastore[module-elasticsearch]", "dynastore[task-elasticsearch]"]
gdal = ["dynastore[module-gdal]", "dynastore[extension-gdal]", "dynastore[task-gdal]"]
maps = ["dynastore[extension-maps]"]
stac = ["dynastore[extension-stac]"]
stats = ["dynastore[module-stats]", "dynastore[extension-stats]"]
web = ["dynastore[extension-web]"]
geoid = ["dynastore[web-core]", "dynastore[extension-geoid]"]
processes = ["dynastore[extension-processes]"]
features = ["dynastore[extension-features]"]
styles = ["dynastore[module-styles]", "dynastore[extension-styles]"]
tiles = ["dynastore[module-tiles]", "dynastore[extension-tiles]"]
tasks = ["dynastore[module-tasks]", "dynastore[extension-tasks]"]
proxy = ["dynastore[module-proxy]", "dynastore[extension-proxy]"]
logs = ["dynastore[extension-logs]"]
assets = ["dynastore[extension-assets]"]
configs = ["dynastore[extension-configs]"]
search = ["dynastore[extension-search]"]
auth = ["dynastore[extension-auth]"]
template = ["dynastore[extension-template]"]

# --- Logical Groupings (Primitives) ---
geospatial = [
    "lxml==6.0.2",
    "shapely>=2.1.1",
    "pyarrow<19,>=16",
    "numpy==1.26.4",
    "geopandas>=0.14.0",
    "fiona>=1.9.4",
    "geojson-pydantic>=1.0.0",
]
geometries = ["dynastore[geospatial]", "dynastore[extension-wfs]", "dynastore[features]", "dynastore[tiles]"]
maps-group = ["dynastore[styles]", "dynastore[maps]"]
google = ["dynastore[module-gcp]", "dynastore[dwh]"]
db-async = ["dynastore[db_config]", "dynastore[db]"]
db-sync = ["dynastore[db_config]", "dynastore[datastore]"]

# --- Catalog Groupings ---
catalog-group = ["dynastore[geospatial]", "dynastore[db-async]", "dynastore[catalog]", "dynastore[events]", "dynastore[stats]", "dynastore[extension-search]", "dynastore[assets]", "dynastore[configs]"]
g-catalog = ["dynastore[catalog-group]", "dynastore[gdal]", "dynastore[google]"]

# --- Task Groupings (sync-db) ---
task-base = ["dynastore[db-sync]", "dynastore[module-tasks]", "dynastore[extension-processes]"]
ingestion = ["dynastore[task-base]", "dynastore[module-gcp]", "dynastore[task-ingestion]"]

# Per Cloud Run Job extras (all use db-sync via task-base)
task-dwh-join-job = ["dynastore[task-base]", "dynastore[dwh]"]
task-ingestion-job = ["dynastore[ingestion]", "dynastore[g-catalog]"]
task-export-features-job = ["dynastore[task-base]", "dynastore[stac]", "dynastore[geospatial]"]
task-tiles-preseed-job = ["dynastore[task-base]", "dynastore[tiles]", "dynastore[crs]"]
task-gdal-job = ["dynastore[task-base]", "dynastore[gdal]"]

# --- Service Compositions (async-db) ---
# api-core: minimal HTTP service with auth, logging, async DB
api-core = ["dynastore[db-async]", "dynastore[web]", "dynastore[extension-httpx]", "dynastore[logs]", "dynastore[apikey]", "dynastore[stats]"]
# api-auth: core + authentication layer
api-auth = ["dynastore[api-core]", "dynastore[auth]", "dynastore[template]"]
# api-catalog: full catalog service (most common deployment)
api-catalog = ["dynastore[api-core]", "dynastore[catalog-group]", "dynastore[gdal]", "dynastore[google]", "dynastore[stac]", "dynastore[processes]", "dynastore[proxy]", "dynastore[elasticsearch]", "dynastore[features]", "dynastore[auth]", "dynastore[template]", "dynastore[extension-admin]"]
# api-maps: maps/tiles/styles service
api-maps = ["dynastore[api-core]", "dynastore[db-async]", "dynastore[g-catalog]", "dynastore[geometries]", "dynastore[maps-group]", "dynastore[dwh]"]
# api-full: all features (for local dev or monolithic deployments)
api-full = ["dynastore[api-catalog]", "dynastore[api-maps]"]
# geoid-service: api-catalog + geoid extension (geoid IS api + geoid module)
geoid-service = ["dynastore[api-catalog]", "dynastore[extension-geoid]"]
# worker-service: background task processor (long-running, async-db + task modules)
worker-service = ["dynastore[g-catalog]", "dynastore[tasks]", "dynastore[processes]", "dynastore[events]", "dynastore[elasticsearch]", "dynastore[tiles]", "dynastore[ingestion]", "dynastore[task-export-features-job]", "dynastore[task-dwh-join-job]", "dynastore[task-tiles-preseed-job]", "dynastore[task-gdal-job]", "dynastore[apikey]"]
# worker-local: dev-only — worker-service + FastAPI to simulate Cloud Run Jobs via BackgroundTasks
worker-local = ["dynastore[worker-service]", "fastapi>=0.100"]

# --- Development & Legacy ---
all = ["dynastore[api-full]", "dynastore[geoid-service]", "dynastore[worker-service]"]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.5", "pytest-cov>=4.1.0", "pytest-xdist>=3.5.0", "requests>=2.31.0", "orjson>=3.9.15"]
dev = ["ruff", "black", "mypy", "debugpy", "dynastore[test]"]

# Internals/Aliases
mvt = []
dwh = ["google-cloud-bigquery", "db-dtypes", "pandas"]
"psycopg-pool" = ["psycopg[binary,pool]"]

[project.entry-points."dynastore.modules"]
tasks = "dynastore.modules.tasks.tasks_module:TasksModule"
proxy = "dynastore.modules.proxy.proxy_module:ProxyModule"
gdal = "dynastore.modules.gdal.gdal_module:GdalModule"
catalog = "dynastore.modules.catalog.catalog_module:CatalogModule"
gcp = "dynastore.modules.gcp.gcp_module:GCPModule"
tiles = "dynastore.modules.tiles.tiles_module:TilesModule"
datastore = "dynastore.modules.datastore.datastore_service:DatastoreModule"
styles = "dynastore.modules.styles.styles_module:StylesModule"
db_config = "dynastore.modules.db_config.db_config_service:DBConfigModule"
apikey = "dynastore.modules.apikey.module:ApiKeyModule"
db = "dynastore.modules.db.db_service:DBService"
crs = "dynastore.modules.crs.crs_module:CRSModule"
events = "dynastore.modules.events.events_module:EventsModule"
notebooks = "dynastore.modules.notebooks.notebooks_module:NotebooksModule"
elasticsearch = "dynastore.modules.elasticsearch.module:ElasticsearchModule"
stats = "dynastore.modules.stats.stats_module:STATS"
web = "dynastore.modules.web.web_module:WebModule"

[project.entry-points."dynastore.extensions"]
maps = "dynastore.extensions.maps.maps_service:MapsService"
stac = "dynastore.extensions.stac.stac_service:STACService"
dwh = "dynastore.extensions.dwh.dwh:DwhService"
tasks = "dynastore.extensions.tasks.tasks_service:TasksService"
proxy = "dynastore.extensions.proxy.proxy_service:ProxyService"
gdal = "dynastore.extensions.gdal.gdal_service:GdalService"
auth = "dynastore.extensions.auth.authentication:Authentication"
web = "dynastore.extensions.web.web:Web"
processes = "dynastore.extensions.processes.processes_service:ProcessesService"
features = "dynastore.extensions.features.features_service:OGCFeaturesService"
template = "dynastore.extensions.template.templating:TemplatingExtension"
admin = "dynastore.extensions.admin.admin_service:AdminService"
geoid = "dynastore.extensions.geoid.geoid:Geoid"
gcp_bucket = "dynastore.extensions.gcp.bucket_service:BucketService"
search = "dynastore.extensions.search.search_service:SearchService"
styles = "dynastore.extensions.styles.styles_service:StylesService"
httpx = "dynastore.extensions.httpx.httpx_service:HttpxExtension"
apikey = "dynastore.extensions.apikey.service:ApiKeyExtension"
logs = "dynastore.extensions.logs.log_extension:LogExtension"
configs = "dynastore.extensions.configs.service:ConfigsService"
crs = "dynastore.extensions.crs.crs_extension:CRSExtension"
events = "dynastore.extensions.events.extension:EventsExtension"
wfs = "dynastore.extensions.wfs.wfs_service:WFSService"
assets = "dynastore.extensions.assets.assets_service:AssetService"
notebooks = "dynastore.extensions.notebooks.notebooks_extension:NotebooksExtension"
stats = "dynastore.extensions.stats.extension:StatsExtension"
tiles = "dynastore.extensions.tiles.tiles_service:TilesService"

[project.entry-points."dynastore.tasks"]
gdal = "dynastore.tasks.gdal.gdalinfo_task:GdalInfoTask"
gcp_provision = "dynastore.tasks.gcp_provision.task:ProvisioningTask"
elasticsearch = "dynastore.tasks.elasticsearch.tasks:ElasticsearchIndexTask"
ingestion = "dynastore.tasks.ingestion.ingestion_task:IngestionTask"
dwh_join = "dynastore.tasks.dwh_join.dwh_join_export_task:DwhJoinExportTask"
export_features = "dynastore.tasks.export_features.export_features_task:ExportFeaturesTask"
tiles_preseed = "dynastore.tasks.tiles_preseed.task:TilePreseedTask"
event_dispatch = "dynastore.tasks.events.event_dispatch_task:EventDispatchTask"
webhook_delivery = "dynastore.tasks.events.webhook_delivery_task:WebhookDeliveryTask"
gcs_storage_event = "dynastore.tasks.gcp.gcs_storage_event_task:GcsStorageEventTask"
gcp_catalog_cleanup = "dynastore.tasks.gcp.gcp_catalog_cleanup_task:GcpCatalogCleanupTask"
structural_migration = "dynastore.tasks.structural_migration:StructuralMigrationTask"
schema_migration = "dynastore.tasks.schema_migration:SchemaMigrationTask"

[tool.setuptools]
# Include files specified in MANIFEST.in
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
# Include all .html and .sql files found within any package
"*" = ["*.html", "*.sql", "*.md", "*.css", "*.js", "*.txt", "*.png", "*.jpg", "*.jpeg", "*.gif", "static/**"]

[project.urls]
Homepage = "https://github.com/un-fao/dynastore/"
Documentation = "https://github.com/un-fao/dynastore/#readme"
Issues = "https://github.com/un-fao/dynastore/issues"
Changelog = "https://github.com/un-fao/dynastore/blob/main/CHANGES.md"

# Machine compositions have been moved to docker/.env (Docker) and
# .github/config/apps.base.yml (cloud). Use the extras groups above as building blocks.
