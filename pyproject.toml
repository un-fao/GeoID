[project]
# DynaStore — meta-package. Pure orchestration: no source code. Pulls in
# `dynastore-core` (modules + tools + models + tasks + shared extension base)
# and dispatches the SCOPE composition through `[project.optional-dependencies]`
# to per-extension wheels (`dynastore-ext-*`). Real code lives under
# `packages/core/` and `packages/extensions/<name>/`.
name = "DynaStore"
dynamic = ["version"]
description = "DynaStore meta-package — SCOPE composition over per-wheel distributions."
authors = [
    { name = "Carlo Cancellieri", email = "ccancellieri@gmail.com" }
]
dependencies = [
    "dynastore-core",
]
requires-python = ">=3.12"
license-files = ["LICENSE"]
readme = "README.md"

# The 'optional-dependencies' defines the dependencies for each module/extension/task
# and aggregates them into 'api', 'worker', and 'all' variants for deployment.

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

# ===========================================================================
# uv workspace — per-wheel split (extensions + core).
# Each member under packages/** produces its own pip-installable wheel
# (e.g. dynastore-core, dynastore-ext-maps). See packages/README.md for the
# migration plan.
# ===========================================================================
[tool.uv.workspace]
members = ["packages/core", "packages/extensions/*"]

[tool.uv.sources]
dynastore-core = { workspace = true }
dynastore-ext-tasks = { workspace = true }
dynastore-ext-stats = { workspace = true }
dynastore-ext-edr = { workspace = true }
dynastore-ext-moving-features = { workspace = true }
dynastore-ext-connected-systems = { workspace = true }
