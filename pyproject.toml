[project]
name = "DynaStore"
dynamic = ["version"]
description = "DynaStore application"
authors = [
    { name = "Carlo Cancellieri", email = "ccancellieri@gmail.com" }
]
dependencies = [ # Minimal Core Framework
    "pydantic>=2.0",
    "pydantic-settings>=2.3.0",
    "pydantic-extra-types>=2.10.6",
    "python-dotenv>=1.0.0",
    "python-dateutil",
    "orjson>=3.9.0",
]
requires-python = ">=3.12"
license-files = ["LICENSE"]
readme = "README.md"

# The 'optional-dependencies' defines the dependencies for each module/extension/task
# and aggregates them into 'api', 'worker', and 'all' variants for deployment.

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
# ==========================================================================
# GRANULAR MODULES — building blocks, one per domain
# Use underscores to match entry-point names and folder names.
# pip normalizes _ to - internally (PEP 685); no effect on resolution.
# ==========================================================================
module_storage = []
module_storage_duckdb = ["duckdb>=1.0.0"]
module_storage_iceberg = ["pyiceberg[sql-postgres]>=0.9.0", "pyarrow>=14.0.0"]
module_catalog = ["dynastore[geospatial_core]", "sqlalchemy>=2.0.0"]
module_gcp = ["gcloud-aio-storage==9.6.0", "google-cloud-bigquery==3.24.0", "google-cloud-run", "google-cloud-storage>=3.1.0", "google-cloud-pubsub", "gcsfs>=2024.5.0", "charset-normalizer", "httpx"]
module_datastore = ["dynastore[db_sync]", "psycopg2-binary>=2.9.7"]
module_db_config = ["psycopg2-binary>=2.9.7", "sqlalchemy", "geoalchemy2", "h3>=4.4.2", "s2sphere>=0.2.5", "python-dateutil"]
module_iam = ["pydantic[email]", "PyJWT>=2.0.0"]
module_db = ["dynastore[db_async]", "sqlalchemy[asyncio]", "asyncpg"]
module_crs = ["dynastore[geospatial_core]", "pyproj>=3.0.0"]
module_events = ["psycopg[binary,pool]"]
module_elasticsearch = ["opensearch-py[async]"]
module_gdal = ["dynastore[geospatial_core]", "GDAL==3.12.3"]
module_tiles = ["dynastore[geospatial_core]"]
module_cache = ["valkey>=6.0", "msgpack>=1.0"]
module_tasks = []
module_proxy = []
module_styles = []
module_stats = []
module_notebooks = []

# ==========================================================================
# GRANULAR EXTENSIONS — FastAPI routers, one per domain
# ==========================================================================
extension_base = ["fastapi>=0.100"]
extension_web = ["dynastore[extension_base]", "markdown>=3.3.7"]
extension_httpx = ["dynastore[extension_base]", "httpx"]
extension_catalog = ["dynastore[extension_base,module_catalog]"]
extension_stac = ["dynastore[extension_base]", "pystac[validation]>=1.13.0", "stac-pydantic[validation]>=3.1.0"]
extension_auth = ["dynastore[extension_base]", "identify_middleware[google,fastapi] @ git+https://github.com/un-fao/identify-middleware.git@ref", "python-multipart>=0.0.9"]
extension_template = ["dynastore[extension_base]", "attrs>=25.3.0", "aiohttp>=3.12.15", "jinja2>=3.1.6", "xmltodict>=0.13.0", "httpx>=0.24.1"]
extension_processes = ["dynastore[extension_base]", "jsonschema"]
extension_features = ["dynastore[extension_base,geospatial_core]", "pygeofilter[backend-sqlalchemy]"]
extension_tiles = ["dynastore[extension_base,module_tiles]"]
extension_tasks = ["dynastore[extension_base,module_tasks]"]
extension_proxy = ["dynastore[extension_base,module_proxy]"]
extension_gdal = ["dynastore[extension_base,module_gdal]"]
extension_styles = ["dynastore[extension_base,module_styles]"]
extension_iam = ["dynastore[extension_base,module_iam]"]
extension_logs = ["dynastore[extension_base]"]
extension_configs = ["dynastore[extension_base]"]
extension_stats = ["dynastore[extension_base,module_stats]"]
extension_crs = ["dynastore[extension_base,module_crs]"]
extension_events = ["dynastore[extension_base,module_events]"]
extension_wfs = ["dynastore[extension_base,geospatial_core]"]
extension_admin = ["dynastore[extension_base,extension_iam]"]
extension_assets = ["dynastore[extension_base]"]
extension_notebooks = ["dynastore[extension_base,module_notebooks]"]
extension_records = ["dynastore[extension_base]"]
extension_search = ["dynastore[extension_base]"]
extension_gcp_bucket = ["dynastore[extension_base,module_gcp]"]
extension_geoid = ["dynastore[extension_base,extension_web]", "user-agents>=2.2.0"]
extension_maps = ["dynastore[extension_base,geospatial_core,mvt]", "GDAL==3.12.3"]
extension_coverages = ["dynastore[extension_base,geospatial_core]"]
extension_dwh = ["dynastore[extension_base,dwh]"]
extension_dimensions = ["dynastore[extension_base]", "ogc-dimensions @ git+https://github.com/ccancellieri/ogc-dimensions.git@main#subdirectory=reference-implementation"]

# ==========================================================================
# GRANULAR TASKS
# ==========================================================================
task_gdal = ["dynastore[module_gdal]"]
task_gcp_provision = ["dynastore[module_gcp]"]
task_elasticsearch = ["dynastore[module_elasticsearch]"]
task_elasticsearch_indexer = ["dynastore[module_elasticsearch]"]
task_ingestion = ["dynastore[geospatial,module_gcp]"]
task_dwh_join = ["dynastore[dwh]"]
task_export_features = ["dynastore[geospatial_core,stac]"]
task_tiles_preseed = ["dynastore[geospatial_core]", "morecantile==7.0.2"]

# ==========================================================================
# PUBLIC FEATURE ALIASES — compose module + extension in one name
# ==========================================================================
catalog = ["dynastore[module_catalog,extension_catalog]"]
gcp = ["dynastore[module_gcp,extension_gcp_bucket]"]
datastore = ["dynastore[module_datastore]"]
db_config = ["dynastore[module_db_config]"]
iam = ["dynastore[module_iam,extension_iam]"]
db = ["dynastore[module_db]"]
crs = ["dynastore[module_crs,extension_crs]"]
cache = ["dynastore[module_cache]"]
events = ["dynastore[module_events,extension_events]"]
elasticsearch = ["dynastore[module_elasticsearch,task_elasticsearch]"]
gdal = ["dynastore[module_gdal,extension_gdal,task_gdal]"]
maps = ["dynastore[extension_maps]"]
stac = ["dynastore[extension_stac]"]
stats = ["dynastore[module_stats,extension_stats]"]
web = ["dynastore[extension_web]"]
geoid = ["dynastore[web_core,extension_geoid]"]
processes = ["dynastore[extension_processes]"]
features = ["dynastore[extension_features]"]
styles = ["dynastore[module_styles,extension_styles]"]
tiles = ["dynastore[module_tiles,extension_tiles]"]
tasks = ["dynastore[module_tasks,extension_tasks]"]
proxy = ["dynastore[module_proxy,extension_proxy]"]
logs = ["dynastore[extension_logs]"]
assets = ["dynastore[extension_assets]"]
configs = ["dynastore[extension_configs]"]
search = ["dynastore[extension_search]"]
storage = ["dynastore[module_storage]"]
auth = ["dynastore[extension_auth]"]
template = ["dynastore[extension_template]"]
dimensions = ["dynastore[extension_dimensions]"]
notebooks = ["dynastore[extension_notebooks]"]

# ==========================================================================
# PRIMITIVES
# ==========================================================================
geospatial_core = [
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
]
geospatial_io = [
    "dynastore[geospatial_core]",
    "lxml==6.0.2",
    "pyarrow<19,>=16",
    "numpy==1.26.4",
    "geopandas>=0.14.0",
    "fiona>=1.9.4",
]
geospatial = ["dynastore[geospatial_io]"]
db_async = ["dynastore[db_config,db]"]
db_sync = ["dynastore[db_config,datastore]"]

# ==========================================================================
# DOMAIN GROUPS — major functional areas, composable independently
#
#   0. core         — async DB, web framework, system config & events
#   1. catalog_grp  — data catalog, features, STAC, assets, search, records
#   2. maps_grp     — rendering: WFS, tiles, CRS, styles, maps
#   3. google_grp   — GCP storage, BigQuery DWH
#   4. auth_grp     — iam + auth + admin  (always the LAST wrapper)
#   5. tools_grp    — HTTP client, templating (proxy is opt-in for catalog/maps)
#   6. monitor_grp  — stats, logs
#   7. index_grp    — Elasticsearch full-text search
#   *  processes    — standalone; on catalog (cloud) or worker (on-prem)
#
# ==========================================================================
core = ["dynastore[db_async,web,configs,events,storage]"]
catalog_grp = ["dynastore[geospatial_core,catalog,features,stac,assets,search,extension_records]"]
maps_grp = ["dynastore[styles,maps,extension_wfs,tiles,crs,gdal,extension_coverages]"]
google_grp = ["dynastore[gcp,extension_dwh]"]
auth_grp = ["dynastore[iam,auth,extension_admin]"]
tools_grp = ["dynastore[extension_httpx,template,dimensions,notebooks]"]
monitor_grp = ["dynastore[stats,logs]"]
index_grp = ["dynastore[elasticsearch,task_elasticsearch_indexer]"]

# ==========================================================================
# TASK GROUPINGS (sync-db)
# ==========================================================================
task_base = ["dynastore[db_sync,module_tasks,extension_processes]"]
ingestion = ["dynastore[task_base,module_gcp,task_ingestion]"]

# Per Cloud Run Job extras (all use db-sync via task-base)
task_dwh_join_job = ["dynastore[task_base,dwh]"]
task_ingestion_job = ["dynastore[ingestion,catalog_grp,google_grp,gdal]"]
task_export_features_job = ["dynastore[task_base,stac,geospatial_core]"]
task_tiles_preseed_job = ["dynastore[task_base,tiles,crs]"]
task_gdal_job = ["dynastore[task_base,gdal]"]

# ==========================================================================
# SERVICE COMPOSITIONS (async-db)
#
#   ┌──────────────────────────────────────────────────────────┐
#   │  Domain groups (all WITHOUT auth)                        │
#   ├──────────────────────────────────────────────────────────┤
#   │  core        = db_async + web + configs + events         │
#   │  catalog_grp = geospatial + catalog + features + stac    │
#   │               + assets + search + records                │
#   │  maps_grp    = styles + maps + wfs + tiles + crs + gdal  │
#   │  google_grp  = gcp + dwh                                 │
#   │  tools_grp   = httpx + template                          │
#   │  monitor_grp = stats + logs                              │
#   │  index_grp   = elasticsearch                             │
#   ├──────────────────────────────────────────────────────────┤
#   │  Standalone (deployment-dependent)                       │
#   ├──────────────────────────────────────────────────────────┤
#   │  processes   = task orchestration API                     │
#   │               cloud  → on catalog (tasks on Cloud Run)   │
#   │               on-prem → on worker  (tasks run locally)   │
#   ├──────────────────────────────────────────────────────────┤
#   │  Auth wrapper (added LAST)                               │
#   ├──────────────────────────────────────────────────────────┤
#   │  auth_grp    = iam + auth + admin                        │
#   ├──────────────────────────────────────────────────────────┤
#   │  Deployable services                                     │
#   ├──────────────────────────────────────────────────────────┤
#   │  api_open       = core + catalog + google                │
#   │                   + monitor + index                      │
#   │                   + processes               ... NO auth  │
#   │                   (tools_grp on dedicated tools service) │
#   │  api_catalog    = api_open + auth_grp      ... WITH auth │
#   │  api_maps_open  = core + catalog + google + maps         │
#   │                   + tools + monitor         ... NO auth  │
#   │  api_maps       = api_maps_open + auth_grp ... WITH auth │
#   │  api_features   = core + catalog_grp        ... NO auth  │
#   │  api_full       = api_catalog + maps_grp                 │
#   │                   + geospatial_io          ... WITH auth │
#   │  geoid_service  = api_catalog + geoid ← ONLY auth svc   │
#   │  worker_service = core + catalog + google + index        │
#   │                   + tasks + processes                     │
#   │                   + ingestion + jobs        ... NO auth  │
#   ├──────────────────────────────────────────────────────────┤
#   │  Local-only scopes                                       │
#   ├──────────────────────────────────────────────────────────┤
#   │  catalog_local  = api_open w/o google_grp     ... NO gcp │
#   │  worker_local   = worker_service + monitor    ... NO auth│
#   └──────────────────────────────────────────────────────────┘
#
# Docker scopes (scope_* extras):
#   catalog service -> CATALOG_SCOPE=scope_catalog (no auth)
#   geoid   service -> GEOID_SCOPE=scope_geoid     (catalog + auth + geoid UI)
#   worker  service -> WORKER_SCOPE=scope_worker   (tasks + processes/stats UI)
#   tools   service -> TOOLS_SCOPE=scope_tools     (proxy + template)
#   maps    service -> MAPS_SCOPE=scope_maps       (tiles/styles, no auth)
#
# ==========================================================================
# api_open: full catalog WITHOUT auth — open for testing (no tools_grp: proxy/template served by the dedicated tools service)
api_open = ["dynastore[core,catalog_grp,google_grp,monitor_grp,index_grp,processes,tasks,task_gcp_provision]"]
# api_catalog: api_open + auth (most common production deployment)
api_catalog = ["dynastore[api_open,auth_grp]"]
# api_maps: maps/tiles/styles service — WITH auth (kept for reference / future use)
api_maps = ["dynastore[core,catalog_grp,google_grp,maps_grp,tools_grp,monitor_grp,auth_grp]"]
# api_maps_open: maps service WITHOUT auth — public tile/style serving
api_maps_open = ["dynastore[core,catalog_grp,google_grp,maps_grp,tools_grp,monitor_grp]"]
# api_features: lightweight local-dev service — OGC Features + STAC, no GCP/tools/index
api_features = ["dynastore[core,catalog_grp]"]
# api_full: all features (local dev or monolithic deployments)
api_full = ["dynastore[api_catalog,maps_grp,geospatial_io]"]
# geoid_service: api_catalog + geoid extension — the ONLY service with auth
geoid_service = ["dynastore[api_catalog,extension_geoid]"]
# worker_service: background task processor (sync-db tasks + async-db catalog reads), no auth
worker_service = ["dynastore[core,catalog_grp,google_grp,index_grp,tasks,processes,ingestion,task_export_features_job,task_dwh_join_job,task_tiles_preseed,task_tiles_preseed_job,task_gdal_job,task_gcp_provision]"]
# catalog_local: local dev catalog — api_open without google_grp/gcp_cloud_runner (no tools_grp: use the dedicated tools service)
catalog_local = ["dynastore[core,catalog_grp,monitor_grp,index_grp,processes]"]
# worker_local: local HTTP simulation of Cloud Run Jobs — all tasks + processes/stats UI
worker_local = ["dynastore[worker_service,monitor_grp]"]

# ==========================================================================
# DOCKER SERVICE SCOPES (used by docker-compose SCOPE build arg)
# Prefixed with scope_ to avoid collision with module-level extras above.
# ==========================================================================
# scope_catalog: catalog API without auth — open for local testing
scope_catalog = ["dynastore[core,catalog_grp,google_grp,monitor_grp,index_grp,processes,tasks,task_gcp_provision,module_cache,notebooks]"]
# scope_geoid: catalog + geoid UI + auth/iam — maps to geospatial-auth in cloud
scope_geoid = ["dynastore[scope_catalog,extension_geoid,auth_grp]"]
# scope_worker: background task processor — headless Cloud Run job runner
scope_worker = ["dynastore[core,module_catalog,gcp,extension_dwh,index_grp,tasks,ingestion,task_export_features_job,task_dwh_join_job,task_tiles_preseed,task_tiles_preseed_job,task_gdal_job,task_gcp_provision]"]
# scope_tools: proxy + template tools service — no auth
scope_tools = ["dynastore[core,template,notebooks,cache]"]
# scope_maps: map tiles/styles service — no auth
scope_maps = ["dynastore[core,catalog_grp,google_grp,maps_grp,monitor_grp,module_cache,notebooks]"]

# ==========================================================================
# DEVELOPMENT & TESTING
# ==========================================================================
all = ["dynastore[api_full,geoid_service,worker_service]"]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.5", "pytest-cov>=4.1.0", "pytest-xdist>=3.5.0", "requests>=2.31.0", "orjson>=3.9.15"]
dev = ["ruff", "black", "mypy", "pyright>=1.1.390", "debugpy", "dynastore[test]"]

# Internals/Aliases
mvt = []
dwh = ["google-cloud-bigquery", "db-dtypes", "pandas"]
psycopg_pool = ["psycopg[binary,pool]"]

