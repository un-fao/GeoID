[tool.setuptools]
# Meta-package: no Python source. Tell setuptools auto-discovery
# explicitly that there are no packages here so it doesn't sweep up
# `packages/` (the workspace tree) or `notebook_showcase/`.
packages = []

[tool.setuptools_scm]
# Meta-package version derives from git tags via setuptools-scm. The same tag
# also stamps every dynastore-{core,ext-*} workspace member, so all wheels in
# a build share one version (set explicitly via SETUPTOOLS_SCM_PRETEND_VERSION
# in the Docker layer 3 re-install loop, where APP_VERSION is passed by CI).
local_scheme = "no-local-version"
fallback_version = "0.0.0+unknown"

[project.urls]
Homepage = "https://github.com/un-fao/dynastore/"
Documentation = "https://github.com/un-fao/dynastore/#readme"
Issues = "https://github.com/un-fao/dynastore/issues"
Changelog = "https://github.com/un-fao/dynastore/blob/main/CHANGES.md"

# ==========================================================================
# TYPE CHECKING — Pyright
# ==========================================================================
[tool.pyright]
pythonVersion = "3.12"
pythonPlatform = "Linux"
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"
# Type-check the workspace tree: dynastore-core + every per-extension wheel.
# (After the Phase 1 move, src/ at the repo root no longer exists; all
# Python source lives under packages/core/src/ and packages/extensions/*/src/.)
include = [
    "packages/core/src/dynastore",
    "packages/extensions/*/src/dynastore",
]
extraPaths = [
    "packages/core/src",
    "packages/extensions/coverages/src",
    "packages/extensions/gdal/src",
    "packages/extensions/notebooks/src",
    "packages/extensions/template/src",
    "packages/extensions/web/src",
]
exclude = [
    "**/__pycache__",
    "**/build",
    "tests",
    "scripts",
]
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportUnknownParameterType = false
reportUnknownVariableType = false
reportMissingParameterType = false
# Disabled: optional cross-env packages (rasterio, zarr, osgeo, _scm_version)
# are present in CI but absent in local dev venvs.  Any # type: ignore on
# their import lines is necessary locally but "unnecessary" in CI, creating
# false-positive warnings that fail --warnings-mode builds.
reportUnnecessaryTypeIgnoreComment = "none"
# Many runtime deps ship as binary wheels without source (.py) files; pyright
# resolves them via stubs. The "could not be resolved from source" warning is
# noise that doesn't indicate a real problem.
reportMissingModuleSource = "none"

[[tool.pyright.executionEnvironments]]
root = "packages/core/src/dynastore/models/protocols"
typeCheckingMode = "strict"

# Optional-extra raster paths (rasterio): silence missing-import noise on files
# that lazy-import these at call time. Runtime guards with try/except.
[[tool.pyright.executionEnvironments]]
root = "packages/core/src/dynastore/modules/coverages"
reportMissingImports = "none"

[[tool.pyright.executionEnvironments]]
root = "packages/core/src/dynastore/modules/gdal"
reportMissingImports = "none"

[[tool.pyright.executionEnvironments]]
root = "packages/core/src/dynastore/modules/edr"
reportMissingImports = "none"

[[tool.pyright.executionEnvironments]]
root = "packages/core/src/dynastore/tasks/gdal"
reportMissingImports = "none"

[[tool.pyright.executionEnvironments]]
root = "packages/core/src/dynastore/tasks/ingestion/readers"
reportMissingImports = "none"

[[tool.pyright.executionEnvironments]]
root = "packages/extensions/coverages/src/dynastore/extensions/coverages"
reportMissingImports = "none"

[[tool.pyright.executionEnvironments]]
root = "src/dynastore/extensions/maps"
reportMissingImports = "none"

# Machine compositions have been moved to docker/.env (Docker) and
# .github/config/apps.base.yml (cloud). Use the extras groups above as building blocks.
