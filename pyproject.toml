[project]
name = "DynaStore"
version = "0.1.1"
description = "DynaStore application"
authors = [
    { name = "Carlo Cancellieri", email = "ccancellieri@gmail.com" }
]
dependencies = [ # Minimal Core Framework
    "pydantic>=2.0",
    "pydantic-settings>=2.3.0",
    "pydantic-extra-types>=2.10.6",
    "python-dotenv>=1.0.0",
    "python-dateutil",
    "cachetools",
    "async-lru",
    "orjson>=3.9.0",
]
requires-python = ">=3.12"
license-files = ["LICENSE"]
readme = "README.md"

# The 'optional-dependencies' defines the dependencies for each module/extension/task
# and aggregates them into 'api', 'worker', and 'all' variants for deployment.

[build-system]
requires = ["setuptools>=80.9.0"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
# Features (Modules & Extensions)
# --- Base Dependencies (Modules/Extensions/Tasks) ---

# Granular Modules — use underscores to match entry-point names and folder names.
# pip normalizes _ to - internally (PEP 685); no effect on resolution.
module_catalog = ["dynastore[geospatial_core]", "sqlalchemy>=2.0.0", "async-lru>=2.0.0"]
module_gcp = ["gcloud-aio-storage==9.6.0", "google-cloud-bigquery==3.24.0", "google-cloud-run", "google-cloud-storage>=3.1.0", "google-cloud-pubsub", "gcsfs>=2024.5.0", "charset-normalizer", "httpx"]
module_datastore = ["dynastore[db_sync]", "psycopg2-binary>=2.9.7"]
module_db_config = ["async-lru", "psycopg2-binary>=2.9.7", "sqlalchemy", "geoalchemy2", "h3>=4.4.2", "s2sphere>=0.2.5", "python-dateutil"]
module_apikey = ["pydantic[email]", "argon2-cffi", "bcrypt", "PyJWT>=2.0.0"]
module_db = ["dynastore[db_async]", "sqlalchemy[asyncio]", "asyncpg"]
module_crs = ["dynastore[geospatial_core]", "pyproj>=3.0.0"]
module_events = ["psycopg[binary,pool]"]
module_elasticsearch = ["elasticsearch[async]"]
module_gdal = ["dynastore[geospatial_core]", "GDAL==3.11.4"]
module_tiles = ["dynastore[geospatial_core]"]
module_tasks = []
module_proxy = []
module_styles = []
module_stats = []
module_notebooks = []

# Extension Base
extension_base = ["fastapi>=0.100"]

# Granular Extensions (Depends on corresponding module if it exists)
extension_web = ["dynastore[extension_base]", "markdown>=3.3.7"]
extension_httpx = ["dynastore[extension_base]", "httpx"]
extension_catalog = ["dynastore[extension_base]", "dynastore[module_catalog]"]
extension_stac = ["dynastore[extension_base]", "pystac[validation]>=1.13.0"]
extension_auth = ["dynastore[extension_base]", "identify_middleware[google,fastapi] @ git+https://github.com/un-fao/identify-middleware.git@ref", "python-multipart>=0.0.9"]
extension_template = ["dynastore[extension_base]", "attrs>=25.3.0", "aiohttp>=3.12.15", "jinja2>=3.1.6", "xmltodict>=0.13.0", "httpx>=0.24.1"]
extension_processes = ["dynastore[extension_base]", "jsonschema"]
extension_features = ["dynastore[extension_base]", "dynastore[geospatial_core]", "pygeofilter[backend-sqlalchemy]"]
extension_tiles = ["dynastore[extension_base]", "dynastore[module_tiles]"]
extension_tasks = ["dynastore[extension_base]", "dynastore[module_tasks]"]
extension_proxy = ["dynastore[extension_base]", "dynastore[module_proxy]"]
extension_gdal = ["dynastore[extension_base]", "dynastore[module_gdal]"]
extension_styles = ["dynastore[extension_base]", "dynastore[module_styles]"]
extension_apikey = ["dynastore[extension_base]", "dynastore[module_apikey]"]
extension_logs = ["dynastore[extension_base]"]
extension_configs = ["dynastore[extension_base]"]
extension_stats = ["dynastore[extension_base]", "dynastore[module_stats]"]
extension_crs = ["dynastore[extension_base]", "dynastore[module_crs]"]
extension_events = ["dynastore[extension_base]", "dynastore[module_events]"]
extension_wfs = ["dynastore[extension_base]", "dynastore[geospatial_core]"]
extension_admin = ["dynastore[extension_base]", "dynastore[extension_apikey]"]
extension_assets = ["dynastore[extension_base]"]
extension_notebooks = ["dynastore[extension_base]", "dynastore[module_notebooks]"]
extension_search = ["dynastore[extension_base]"]
extension_gcp_bucket = ["dynastore[extension_base]", "dynastore[module_gcp]"]
extension_geoid = ["dynastore[extension_base]", "dynastore[extension_web]", "user-agents>=2.2.0"]
extension_maps = ["dynastore[extension_base]", "dynastore[geospatial_core]", "dynastore[mvt]", "GDAL==3.11.4"]
extension_dwh = ["dynastore[extension_base]", "dynastore[dwh]"]

# Granular Tasks
task_gdal = ["dynastore[module_gdal]"]
task_gcp_provision = ["dynastore[module_gcp]"]
task_elasticsearch = ["dynastore[module_elasticsearch]"]
task_ingestion = ["dynastore[geospatial]", "dynastore[module_gcp]"]
task_dwh_join = ["dynastore[dwh]"]
task_export_features = ["dynastore[geospatial_core]", "dynastore[stac]"]
task_tiles_preseed = ["dynastore[geospatial_core]", "morecantile==7.0.2"]

# --- Features (Public Aliases composing Module + Extension) ---
catalog = ["dynastore[module_catalog]", "dynastore[extension_catalog]"]
gcp = ["dynastore[module_gcp]", "dynastore[extension_gcp_bucket]"]
datastore = ["dynastore[module_datastore]"]
db_config = ["dynastore[module_db_config]"]
apikey = ["dynastore[module_apikey]", "dynastore[extension_apikey]"]
db = ["dynastore[module_db]"]
crs = ["dynastore[module_crs]", "dynastore[extension_crs]"]
events = ["dynastore[module_events]", "dynastore[extension_events]"]
elasticsearch = ["dynastore[module_elasticsearch]", "dynastore[task_elasticsearch]"]
gdal = ["dynastore[module_gdal]", "dynastore[extension_gdal]", "dynastore[task_gdal]"]
maps = ["dynastore[extension_maps]"]
stac = ["dynastore[extension_stac]"]
stats = ["dynastore[module_stats]", "dynastore[extension_stats]"]
web = ["dynastore[extension_web]"]
geoid = ["dynastore[web_core]", "dynastore[extension_geoid]"]
processes = ["dynastore[extension_processes]"]
features = ["dynastore[extension_features]"]
styles = ["dynastore[module_styles]", "dynastore[extension_styles]"]
tiles = ["dynastore[module_tiles]", "dynastore[extension_tiles]"]
tasks = ["dynastore[module_tasks]", "dynastore[extension_tasks]"]
proxy = ["dynastore[module_proxy]", "dynastore[extension_proxy]"]
logs = ["dynastore[extension_logs]"]
assets = ["dynastore[extension_assets]"]
configs = ["dynastore[extension_configs]"]
search = ["dynastore[extension_search]"]
auth = ["dynastore[extension_auth]"]
template = ["dynastore[extension_template]"]

# --- Logical Groupings (Primitives) ---
geospatial_core = [
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
]
geospatial_io = [
    "dynastore[geospatial_core]",
    "lxml==6.0.2",
    "pyarrow<19,>=16",
    "numpy==1.26.4",
    "geopandas>=0.14.0",
    "fiona>=1.9.4",
]
geospatial = ["dynastore[geospatial_io]"]
geometries = ["dynastore[geospatial_core]", "dynastore[extension_wfs]", "dynastore[features]", "dynastore[tiles]"]
maps_group = ["dynastore[styles]", "dynastore[maps]"]
google = ["dynastore[module_gcp]", "dynastore[dwh]"]
db_async = ["dynastore[db_config]", "dynastore[db]"]
db_sync = ["dynastore[db_config]", "dynastore[datastore]"]

# --- Catalog Groupings ---
catalog_group = ["dynastore[geospatial_core]", "dynastore[db_async]", "dynastore[catalog]", "dynastore[events]", "dynastore[stats]", "dynastore[extension_search]", "dynastore[assets]", "dynastore[configs]"]
g_catalog = ["dynastore[catalog_group]", "dynastore[gdal]", "dynastore[google]"]

# --- Task Groupings (sync-db) ---
task_base = ["dynastore[db_sync]", "dynastore[module_tasks]", "dynastore[extension_processes]"]
ingestion = ["dynastore[task_base]", "dynastore[module_gcp]", "dynastore[task_ingestion]"]

# Per Cloud Run Job extras (all use db-sync via task-base)
task_dwh_join_job = ["dynastore[task_base]", "dynastore[dwh]"]
task_ingestion_job = ["dynastore[ingestion]", "dynastore[g_catalog]"]
task_export_features_job = ["dynastore[task_base]", "dynastore[stac]", "dynastore[geospatial_core]"]
task_tiles_preseed_job = ["dynastore[task_base]", "dynastore[tiles]", "dynastore[crs]"]
task_gdal_job = ["dynastore[task_base]", "dynastore[gdal]"]

# --- Service Compositions (async-db) ---
# api_core: minimal HTTP service with auth, logging, async DB
api_core = ["dynastore[db_async]", "dynastore[web]", "dynastore[extension_httpx]", "dynastore[logs]", "dynastore[apikey]", "dynastore[stats]"]
# api_auth: core + authentication layer
api_auth = ["dynastore[api_core]", "dynastore[auth]", "dynastore[template]"]
# api_catalog: full catalog service (most common deployment)
api_catalog = ["dynastore[api_core]", "dynastore[catalog_group]", "dynastore[gdal]", "dynastore[google]", "dynastore[processes]", "dynastore[proxy]", "dynastore[elasticsearch]", "dynastore[features]", "dynastore[auth]", "dynastore[template]", "dynastore[extension_admin]"]
# api_maps: maps/tiles/styles service
api_maps = ["dynastore[api_core]", "dynastore[db_async]", "dynastore[g_catalog]", "dynastore[geometries]", "dynastore[maps_group]", "dynastore[dwh]"]
# api_full: all features (for local dev or monolithic deployments)
api_full = ["dynastore[api_catalog]", "dynastore[api_maps]", "dynastore[stac]", "dynastore[crs]", "dynastore[geospatial_io]"]
# geoid_service: api_catalog + geoid extension (geoid IS api + geoid module)
geoid_service = ["dynastore[api_catalog]", "dynastore[extension_geoid]"]
# worker_service: background task processor (long-running, async-db + task modules)
worker_service = ["dynastore[g_catalog]", "dynastore[tasks]", "dynastore[processes]", "dynastore[events]", "dynastore[elasticsearch]", "dynastore[tiles]", "dynastore[ingestion]", "dynastore[task_export_features_job]", "dynastore[task_dwh_join_job]", "dynastore[task_tiles_preseed]", "dynastore[task_tiles_preseed_job]", "dynastore[task_gdal_job]", "dynastore[apikey]"]
# worker_local: dev-only — worker_service + FastAPI to simulate Cloud Run Jobs via BackgroundTasks
worker_local = ["dynastore[worker_service]"]

# --- Development & Legacy ---
all = ["dynastore[api_full]", "dynastore[geoid_service]", "dynastore[worker_service]"]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.5", "pytest-cov>=4.1.0", "pytest-xdist>=3.5.0", "requests>=2.31.0", "orjson>=3.9.15"]
dev = ["ruff", "black", "mypy", "debugpy", "dynastore[test]"]

# Internals/Aliases
mvt = []
dwh = ["google-cloud-bigquery", "db-dtypes", "pandas"]
psycopg_pool = ["psycopg[binary,pool]"]

[project.entry-points."dynastore.modules"]
tasks = "dynastore.modules.tasks.tasks_module:TasksModule"
proxy = "dynastore.modules.proxy.proxy_module:ProxyModule"
gdal = "dynastore.modules.gdal.gdal_module:GdalModule"
catalog = "dynastore.modules.catalog.catalog_module:CatalogModule"
gcp = "dynastore.modules.gcp.gcp_module:GCPModule"
tiles = "dynastore.modules.tiles.tiles_module:TilesModule"
datastore = "dynastore.modules.datastore.datastore_service:DatastoreModule"
styles = "dynastore.modules.styles.styles_module:StylesModule"
db_config = "dynastore.modules.db_config.db_config_service:DBConfigModule"
apikey = "dynastore.modules.apikey.module:ApiKeyModule"
db = "dynastore.modules.db.db_service:DBService"
crs = "dynastore.modules.crs.crs_module:CRSModule"
events = "dynastore.modules.events.events_module:EventsModule"
notebooks = "dynastore.modules.notebooks.notebooks_module:NotebooksModule"
elasticsearch = "dynastore.modules.elasticsearch.module:ElasticsearchModule"
stats = "dynastore.modules.stats.stats_module:STATS"
web = "dynastore.modules.web.web_module:WebModule"

[project.entry-points."dynastore.extensions"]
maps = "dynastore.extensions.maps.maps_service:MapsService"
stac = "dynastore.extensions.stac.stac_service:STACService"
dwh = "dynastore.extensions.dwh.dwh:DwhService"
tasks = "dynastore.extensions.tasks.tasks_service:TasksService"
proxy = "dynastore.extensions.proxy.proxy_service:ProxyService"
gdal = "dynastore.extensions.gdal.gdal_service:GdalService"
auth = "dynastore.extensions.auth.authentication:Authentication"
web = "dynastore.extensions.web.web:Web"
processes = "dynastore.extensions.processes.processes_service:ProcessesService"
features = "dynastore.extensions.features.features_service:OGCFeaturesService"
template = "dynastore.extensions.template.templating:TemplatingExtension"
admin = "dynastore.extensions.admin.admin_service:AdminService"
geoid = "dynastore.extensions.geoid.geoid:Geoid"
gcp_bucket = "dynastore.extensions.gcp.bucket_service:BucketService"
search = "dynastore.extensions.search.search_service:SearchService"
styles = "dynastore.extensions.styles.styles_service:StylesService"
httpx = "dynastore.extensions.httpx.httpx_service:HttpxExtension"
apikey = "dynastore.extensions.apikey.service:ApiKeyExtension"
logs = "dynastore.extensions.logs.log_extension:LogExtension"
configs = "dynastore.extensions.configs.service:ConfigsService"
crs = "dynastore.extensions.crs.crs_extension:CRSExtension"
events = "dynastore.extensions.events.extension:EventsExtension"
wfs = "dynastore.extensions.wfs.wfs_service:WFSService"
assets = "dynastore.extensions.assets.assets_service:AssetService"
notebooks = "dynastore.extensions.notebooks.notebooks_extension:NotebooksExtension"
stats = "dynastore.extensions.stats.extension:StatsExtension"
tiles = "dynastore.extensions.tiles.tiles_service:TilesService"

[project.entry-points."dynastore.tasks"]
gdal = "dynastore.tasks.gdal.gdalinfo_task:GdalInfoTask"
gcp_provision = "dynastore.tasks.gcp_provision.task:ProvisioningTask"
elasticsearch = "dynastore.tasks.elasticsearch.tasks:ElasticsearchIndexTask"
ingestion = "dynastore.tasks.ingestion.ingestion_task:IngestionTask"
dwh_join = "dynastore.tasks.dwh_join.dwh_join_export_task:DwhJoinExportTask"
export_features = "dynastore.tasks.export_features.export_features_task:ExportFeaturesTask"
tiles_preseed = "dynastore.tasks.tiles_preseed.task:TilePreseedTask"
event_dispatch = "dynastore.tasks.events.event_dispatch_task:EventDispatchTask"
webhook_delivery = "dynastore.tasks.events.webhook_delivery_task:WebhookDeliveryTask"
gcs_storage_event = "dynastore.tasks.gcp.gcs_storage_event_task:GcsStorageEventTask"
gcp_catalog_cleanup = "dynastore.tasks.gcp.gcp_catalog_cleanup_task:GcpCatalogCleanupTask"
structural_migration = "dynastore.tasks.structural_migration:StructuralMigrationTask"
schema_migration = "dynastore.tasks.schema_migration:SchemaMigrationTask"

[tool.setuptools]
# Include files specified in MANIFEST.in
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
# Include all .html and .sql files found within any package
"*" = ["*.html", "*.sql", "*.md", "*.css", "*.js", "*.txt", "*.png", "*.jpg", "*.jpeg", "*.gif", "static/**"]

[project.urls]
Homepage = "https://github.com/un-fao/dynastore/"
Documentation = "https://github.com/un-fao/dynastore/#readme"
Issues = "https://github.com/un-fao/dynastore/issues"
Changelog = "https://github.com/un-fao/dynastore/blob/main/CHANGES.md"

# Machine compositions have been moved to docker/.env (Docker) and
# .github/config/apps.base.yml (cloud). Use the extras groups above as building blocks.
