# ==========================================================================
# PRIMITIVES
# ==========================================================================
geospatial_core = [
    "shapely>=2.1.1",
    "geojson-pydantic>=1.0.0",
]
geospatial_io = [
    "dynastore[geospatial_core]",
    "lxml>=6.1.0,<7",
    "pyarrow<19,>=16",
    "numpy==1.26.4",
    "geopandas>=0.14.0",
    "fiona>=1.9.4",
]
geospatial = ["dynastore[geospatial_io]"]
db_async = ["dynastore[db_config,db]"]
db_sync = ["dynastore[db_config,datastore]"]

# ==========================================================================
# DOMAIN GROUPS — major functional areas, composable independently
#
#   0. core         — async DB, web framework, system config & events
#   1. catalog_grp  — data catalog, features, STAC, assets, search, records
#   2. maps_grp     — rendering: WFS, tiles, CRS, styles, maps
#   3. google_grp   — GCP storage, BigQuery DWH
#   4. auth_grp     — iam + auth + admin  (always the LAST wrapper)
#   5. tools_grp    — HTTP client, templating (proxy is opt-in for catalog/maps)
#   6. monitor_grp  — stats, logs
#   7. index_grp    — Elasticsearch full-text search
#   *  processes    — standalone; on catalog (cloud) or worker (on-prem)
#
# ==========================================================================
core = ["dynastore[db_async,web,configs,events,storage,cache]"]
# catalog_grp split: data layer (needed by maps for collection reads + /features)
# vs public catalog routers (stac/assets/search/records — not on maps).
catalog_data_grp = ["dynastore[geospatial_core,catalog,features]"]
catalog_routes_grp = ["dynastore[stac,assets,search,extension_records]"]
catalog_grp = ["dynastore[catalog_data_grp,catalog_routes_grp,module_local]"]
maps_grp = ["dynastore[styles,maps,extension_wfs,tiles,crs,gdal,extension_coverages]"]
# google_grp split: dwh is rendering input (BQ joins also live here),
# gcp is the bucket-admin router (not on maps).
dwh_grp = ["dynastore[extension_dwh,module_gcp]"]
gcp_routes_grp = ["dynastore[gcp]"]
google_grp = ["dynastore[gcp_routes_grp,dwh_grp]"]
auth_grp = ["dynastore[iam,auth,extension_admin]"]
# tools_grp split: core proxy/template vs route-heavy dimensions/notebooks.
tools_core_grp = ["dynastore[extension_httpx,template]"]
tools_grp = ["dynastore[tools_core_grp,dimensions,notebooks]"]
monitor_grp = ["dynastore[stats,logs]"]
index_grp = ["dynastore[elasticsearch,task_elasticsearch_indexer_deps]"]
# drivers_grp — all storage/asset/metadata drivers (both collection and asset domains)
drivers_grp = ["dynastore[module_storage_postgresql,module_storage_duckdb,module_storage_iceberg,module_storage_elasticsearch,module_storage_elasticsearch_private,module_storage_elasticsearch_assets,module_collection_elasticsearch,module_catalog_elasticsearch]"]

# ==========================================================================
# TASK GROUPINGS (sync-db)
# ==========================================================================
task_base = ["dynastore[db_sync,module_tasks,module_events,extension_processes]"]
ingestion = ["dynastore[task_base,module_gcp,task_ingestion_deps]"]
# outbox_drain — generic per-driver outbox consumer used by indexer worker
# Cloud Run Jobs. Only depends on task_base; the concrete BulkIndexer
# adapter is supplied by the worker's own driver extras (e.g. the ES
# worker also pulls in module_elasticsearch).
outbox_drain = ["dynastore[task_base]"]

# ---- Worker / Cloud Run Job task extras (heavy; sync-db via task_base).
# One extras per task. Each Cloud Run Job is deployed with
# SCOPE=worker_task_<name> — a single unambiguous identifier the catalog's
# gcp_cloud_runner uses to map discovered jobs back to task entry-points.
#
# `module_catalog` audit (2026-04-29, B6 + Phase H follow-ups):
#   - dwh_join: original audit assumed raw SQL only, but Phase H container
#     log surfaced `Skipping plugin 'dwh_join': No module named 'shapely'` —
#     the entry-point load transitively pulls shapely via
#     `extensions/dwh/models.py → tools/geospatial`. Need module_catalog
#     (which provides geospatial_core → shapely). PR #140.
#   - export_features: already has geospatial_core directly.
#   - tiles_preseed: tasks/tiles_preseed/task.py:65 calls
#     `get_protocol(CatalogsProtocol)`. Needs module_catalog.
#   - gdal: tasks/gdal/asset_process.py:25 + gdalinfo_task.py:32,40 import
#     `from dynastore.modules.catalog.asset_service`. Needs module_catalog.
#   - dimensions_materialize: tasks/dimensions_materialize/task.py:67 calls
#     `get_protocol(CatalogsProtocol)`. Needs module_catalog.
#   - elasticsearch_indexer: BulkCatalog/CollectionReindexTask via
#     CatalogsProtocol. Confirmed by `dynastore-elasticsearch-indexer-cq7k9`
#     exec on 2026-04-29 (B6, PR #131).
# dwh_join: extensions/dwh/dwh.py imports modules/tiles/tms_definitions
# which has `from pyproj import CRS` at module level. module_crs provides
# pyproj. Without it the entry-point load fails with `Skipping plugin
# 'dwh_join': No module named 'pyproj'` and the dispatcher registers a
# DefinitionOnlyTask placeholder — main_task.py then raises a misleading
# "run method without payload annotation" error. Confirmed by
# dynastore-dwh-join-export-job-snq2n container log on 2026-04-29.
# `module_storage_postgresql` (empty marker) is added on every worker_task_*
# SCOPE so the SCOPE × routing invariant test passes: items routing keeps
# `items_postgresql_driver` at FATAL for WRITE (it is the source of truth);
# every worker scope must therefore declare it can host the PG items driver
# class even when the task itself does not exercise items WRITE — module
# imports still resolve through ItemsRoutingConfig instantiation.
worker_task_dwh_join = ["dynastore[task_base,module_catalog,module_crs,dwh,module_storage_postgresql]"]
worker_task_ingestion = ["dynastore[ingestion,catalog_grp,google_grp,gdal,drivers_grp]"]
# export_features: writes feature output to GCS (`gs://...` destination_uri)
# via dynastore.modules.gcp clients. Without module_gcp the worker raises
# at task run time: "GCPModule has not been initialized or failed to
# create a storage client." Confirmed by 019dda8e-a239-7bd8-...
# OGC poll on 2026-04-29.
worker_task_export_features = ["dynastore[task_base,module_gcp,stac,geospatial_core,module_storage_postgresql]"]
worker_task_tiles_preseed = ["dynastore[task_base,module_catalog,tiles,crs,module_storage_postgresql]", "morecantile>=7.0.3,<8"]
worker_task_gdal = ["dynastore[task_base,module_catalog,gdal,module_storage_postgresql]"]
worker_task_dimensions_materialize = ["dynastore[task_base,module_catalog,extension_dimensions,module_storage_postgresql]"]
worker_task_elasticsearch_indexer = ["dynastore[task_base,module_catalog,elasticsearch,task_elasticsearch_indexer_deps,outbox_drain,module_storage_postgresql]"]

# ==========================================================================
# SERVICE COMPOSITIONS (async-db)
#
#   ┌──────────────────────────────────────────────────────────┐
#   │  Domain groups (all WITHOUT auth)                        │
#   ├──────────────────────────────────────────────────────────┤
#   │  core        = db_async + web + configs + events         │
#   │  catalog_grp = geospatial + catalog + features + stac    │
#   │               + assets + search + records                │
#   │  maps_grp    = styles + maps + wfs + tiles + crs + gdal  │
#   │  google_grp  = gcp + dwh                                 │
#   │  tools_grp   = httpx + template                          │
#   │  monitor_grp = stats + logs                              │
#   │  index_grp   = elasticsearch                             │
#   ├──────────────────────────────────────────────────────────┤
#   │  Standalone (deployment-dependent)                       │
#   ├──────────────────────────────────────────────────────────┤
#   │  processes   = task orchestration API                     │
#   │               cloud  → on catalog (tasks on Cloud Run)   │
#   │               on-prem → on worker  (tasks run locally)   │
#   ├──────────────────────────────────────────────────────────┤
#   │  Auth wrapper (added LAST)                               │
#   ├──────────────────────────────────────────────────────────┤
#   │  auth_grp    = iam + auth + admin                        │
#   ├──────────────────────────────────────────────────────────┤
#   │  Deployable services                                     │
#   ├──────────────────────────────────────────────────────────┤
#   │  api_open       = core + catalog + google                │
#   │                   + monitor + index                      │
#   │                   + processes               ... NO auth  │
#   │                   (tools_grp on dedicated tools service) │
#   │  api_catalog    = api_open + auth_grp      ... WITH auth │
#   │  api_maps_open  = core + catalog_data + maps + dwh       │
#   │                   + tools_core + es-cat    ... NO auth   │
#   │                   (vector producer + raster renderer;    │
#   │                    no stac/assets/search/records/stats/  │
#   │                    logs/gcp/dimensions/notebooks)        │
#   │  api_maps       = api_maps_open + auth_grp ... WITH auth │
#   │  api_features   = core + catalog_grp        ... NO auth  │
#   │  api_full       = api_catalog + maps_grp                 │
#   │                   + geospatial_io          ... WITH auth │
#   │  geoid_service  = api_catalog + geoid ← ONLY auth svc   │
#   │  worker_service = core + catalog + google + index        │
#   │                   + tasks + processes                     │
#   │                   + ingestion + jobs        ... NO auth  │
#   ├──────────────────────────────────────────────────────────┤
#   │  Local-only scopes                                       │
#   ├──────────────────────────────────────────────────────────┤
#   │  catalog_local  = api_open w/o google_grp     ... NO gcp │
#   │  worker_local   = worker_service + monitor    ... NO auth│
#   └──────────────────────────────────────────────────────────┘
#
# Docker scopes (scope_* extras):
#   catalog service -> CATALOG_SCOPE=scope_catalog (no auth)
#   geoid   service -> GEOID_SCOPE=scope_geoid     (catalog + auth + geoid UI)
#   worker  service -> WORKER_SCOPE=scope_worker   (tasks + processes/stats UI)
#   tools   service -> TOOLS_SCOPE=scope_tools     (proxy + template)
#   maps    service -> MAPS_SCOPE=scope_maps       (tiles/styles, no auth)
#
# ==========================================================================
# api_open: full catalog WITHOUT auth — open for testing (no tools_grp: proxy/template served by the dedicated tools service)
api_open = ["dynastore[core,catalog_grp,google_grp,monitor_grp,index_grp,processes,tasks,catalog_task_gcp_provision,catalog_task_gcp_catalog_cleanup]"]
# api_catalog: api_open + auth (most common production deployment)
api_catalog = ["dynastore[api_open,auth_grp]"]
# api_maps_open: vector producer + raster renderer, no auth.
# Surface limited to: /maps /tiles /styles /wfs /features /coverages /crs /gdal /dwh /joins
# (plus ALWAYS_ON: /configs /web /events /admin /iam /auth /tools /template /httpx).
# Excluded vs. legacy: catalog_routes_grp (stac/assets/search/records),
# gcp_routes_grp, monitor_grp (stats/logs), dimensions, notebooks.
api_maps_open = ["dynastore[core,catalog_data_grp,maps_grp,dwh_grp,tools_core_grp,module_catalog_elasticsearch]"]
# api_maps: same surface WITH auth (kept for reference / future use)
api_maps = ["dynastore[api_maps_open,auth_grp]"]
# api_features: lightweight local-dev service — OGC Features + STAC, no GCP/tools/index
api_features = ["dynastore[core,catalog_grp]"]
# api_full: all features (local dev or monolithic deployments)
api_full = ["dynastore[api_catalog,maps_grp,geospatial_io]"]
# geoid_service: api_catalog + geoid extension — the ONLY service with auth
geoid_service = ["dynastore[api_catalog,extension_geoid]"]
# worker_service: background task processor (sync-db tasks + async-db catalog reads), no auth
worker_service = ["dynastore[core,catalog_grp,google_grp,index_grp,tasks,processes,ingestion,worker_task_export_features,worker_task_dwh_join,worker_task_tiles_preseed,worker_task_gdal,worker_task_dimensions_materialize,catalog_task_gcp_provision,catalog_task_gcp_catalog_cleanup]"]
# catalog_local: local dev catalog — api_open without google_grp/gcp_cloud_runner (no tools_grp: use the dedicated tools service)
catalog_local = ["dynastore[core,catalog_grp,monitor_grp,index_grp,processes]"]
# worker_local: local HTTP simulation of Cloud Run Jobs — all tasks + processes/stats UI
worker_local = ["dynastore[worker_service,monitor_grp]"]

# ==========================================================================
# DOCKER SERVICE SCOPES (used by docker-compose SCOPE build arg)
# Prefixed with scope_ to avoid collision with module-level extras above.
# ==========================================================================
# scope_catalog: catalog API without auth — open for local testing
scope_catalog = ["dynastore[core,catalog_grp,google_grp,monitor_grp,index_grp,processes,tasks,catalog_task_gcp_provision,catalog_task_gcp_catalog_cleanup,module_cache,notebooks,dimensions,drivers_grp]"]
# scope_geoid: catalog + geoid UI + auth/iam — maps to geospatial-auth in cloud
scope_geoid = ["dynastore[scope_catalog,extension_geoid,auth_grp]"]
# scope_worker: background task processor — headless Cloud Run job runner
scope_worker = ["dynastore[core,module_catalog,gcp,extension_dwh,index_grp,tasks,ingestion,worker_task_export_features,worker_task_dwh_join,worker_task_tiles_preseed,worker_task_gdal,worker_task_dimensions_materialize,catalog_task_gcp_provision,catalog_task_gcp_catalog_cleanup]"]
# scope_tools: proxy + template tools service — no auth
scope_tools = ["dynastore[core,template,notebooks,cache,dimensions,proxy]"]
# scope_maps: vector producer + raster renderer (local docker), no auth.
# Mirrors api_maps_open + module_cache + drivers_grp so local data reads work.
scope_maps = ["dynastore[core,catalog_data_grp,maps_grp,dwh_grp,tools_core_grp,module_cache,module_catalog_elasticsearch,drivers_grp]"]

# ==========================================================================
# DEVELOPMENT & TESTING
# ==========================================================================
all = ["dynastore[api_full,geoid_service,worker_service]"]
# Superset of `all` that pulls in every optional driver / task-only dependency
# referenced anywhere in src/. Pyright/mypy need these resolvable to clear
# `reportMissingImports` on optional code paths (duckdb, pyiceberg, morecantile,
# …). Not for runtime: keep service images on `all` to stay slim.
typecheck = ["dynastore[all,drivers_grp,task_tiles_preseed_deps,extension_template]"]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.5", "pytest-cov>=4.1.0", "pytest-xdist>=3.5.0", "pytest-timeout>=2.3.0", "requests>=2.31.0", "orjson>=3.9.15"]
notebooks_test = ["dynastore[test]", "nbval>=0.11", "ipykernel>=6.29", "jupyter-client>=8.6", "httpx>=0.27", "python-dotenv>=1.0"]
lite_build = ["jupyterlite-core>=0.4", "jupyterlite-pyodide-kernel>=0.4"]
dev = ["ruff", "black", "mypy", "pyright>=1.1.390", "debugpy", "dynastore[test]"]

# Internals/Aliases
mvt = []
# /join/* OGC API - Joins extension. Ships alongside dwh (same BQ deps;
# joins extension is OGC-conformant, dwh keeps the legacy tile-join surface).
joins = ["google-cloud-bigquery", "db-dtypes", "pandas", "dynastore-ext-joins"]
# Installing dwh pulls in joins so deployments that ship the legacy
# tile-join surface also expose the new OGC /join/* endpoints.
dwh = ["dynastore[joins]"]
psycopg_pool = ["psycopg[binary,pool]"]


