dynastore-ext-notebooks = { workspace = true }
dynastore-ext-proxy = { workspace = true }
dynastore-ext-processes = { workspace = true }
dynastore-ext-search = { workspace = true }
dynastore-ext-crs = { workspace = true }
dynastore-ext-dggs = { workspace = true }
dynastore-ext-features = { workspace = true }
dynastore-ext-records = { workspace = true }
dynastore-ext-coverages = { workspace = true }
dynastore-ext-wfs = { workspace = true }
dynastore-ext-dwh = { workspace = true }
dynastore-ext-joins = { workspace = true }
dynastore-ext-styles = { workspace = true }
dynastore-ext-gcp-bucket = { workspace = true }
dynastore-ext-geoid = { workspace = true }
dynastore-ext-events = { workspace = true }
dynastore-ext-httpx = { workspace = true }
dynastore-ext-gdal = { workspace = true }
dynastore-ext-maps = { workspace = true }
dynastore-ext-tiles = { workspace = true }
dynastore-ext-stac = { workspace = true }
dynastore-ext-template = { workspace = true }
dynastore-ext-web = { workspace = true }
dynastore-ext-auth = { workspace = true }
dynastore-ext-iam = { workspace = true }
dynastore-ext-admin = { workspace = true }
