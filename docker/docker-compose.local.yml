# -----------------------------------------------------------------------------
#  LOCAL / ON-PREMISE OVERRIDE
#  Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
#  Overrides:
#    - Exposes DB port for local dev tools
#    - Adds healthchecks for dependency ordering
#    - Sets NAME for migration runner fast-path by app_key
#    - Sets DEFAULT_MAX_RETRIES for the task dispatcher
#
#  Module/extension selection is handled entirely by the SCOPE variable
#  (configured in .env via WORKER_SCOPE, API_SCOPE). The legacy
#  DYNASTORE_MODULES / DYNASTORE_EXTENSION_MODULES / DYNASTORE_TASK_MODULES
#  env vars are no longer read — do not reintroduce them.
# -----------------------------------------------------------------------------

services:
  db:
    ports:
      - "54320:5432" # Expose DB locally for dev tools
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-gis_dev}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog:
    depends_on:
      db:
        condition: service_healthy
    environment:
      NAME: "dynastore-catalog-local"
      DEFAULT_MAX_RETRIES: "3"

  worker:
    environment:
      NAME: "dynastore-worker-local"
      RUNNER_ID: "local-worker"
      DEFAULT_MAX_RETRIES: "3"
    depends_on:
      db:
        condition: service_healthy
