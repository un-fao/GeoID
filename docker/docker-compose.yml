services:
  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile.db
    container_name: geoid_db
    restart: always
    # CHANGED: Now looks for .env in the same folder (docker/)
    env_file: .env
    command: postgres -c max_locks_per_transaction=256 -c shared_preload_libraries='pg_cron' -c cron.database_name='${POSTGRES_DB:-gis_dev}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dynastore_net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${API_SCOPE:-all}
    container_name: geoid_api
    restart: always
    env_file: .env
    environment:
      SCOPE: ${API_SCOPE:-all}
      TCP_PORT: 80
      UVICORN_WORKERS: 4
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_API:-80}:80"
    volumes:
      - ../logs/api:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  geoid:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${GEOID_SCOPE:-all}
    container_name: geoid_web
    restart: always
    env_file: .env
    environment:
      SCOPE: ${GEOID_SCOPE:-all}
      TCP_PORT: 80
      UVICORN_WORKERS: 1
    ports:
      - "8080:80"
    volumes:
      - ../logs/geoid:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${WORKER_SCOPE:-all}
    container_name: geoid_worker
    restart: always
    env_file: .env
    # Run in worker mode (same image as API, different modules + CMD)
    command: ["worker"]
    environment:
      SCOPE: ${WORKER_SCOPE:-all}
      TCP_PORT: 81
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      ACCESS_LOG: /dynastore/logs/access.log
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_WORKER:-81}:81"
    volumes:
      - ../logs/worker:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  elasticsearch:
    # OpenSearch 2.x (Apache 2.0) — drop-in replacement for Elasticsearch REST API.
    # Elasticsearch ≥7.11 uses SSPL/ELv2, incompatible with this project's Apache 2.0 license.
    image: opensearchproject/opensearch:2.17.0
    container_name: geoid_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/opensearch/data
    networks:
      - dynastore_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kibana:
    # OpenSearch Dashboards (Apache 2.0) — replaces Kibana (SSPL/ELv2).
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: geoid_kibana
    restart: always
    environment:
      - OPENSEARCH_HOSTS=http://elasticsearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dynastore_net
volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
