services:
  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile.db
    container_name: geoid_db
    restart: always
    env_file: .env
    command: postgres -c max_connections=200 -c max_locks_per_transaction=256 -c shared_preload_libraries='pg_cron' -c cron.database_name='${POSTGRES_DB:-gis_dev}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dynastore_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gis_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  catalog:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${CATALOG_SCOPE:-scope_catalog}
    container_name: geoid_catalog
    restart: always
    env_file: .env
    environment:
      SCOPE: ${CATALOG_SCOPE:-scope_catalog}
      TCP_PORT: 80
      UVICORN_WORKERS: 4
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_CATALOG:-80}:80"
    volumes:
      - ../logs/catalog:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  geoid:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${GEOID_SCOPE:-scope_geoid}
    container_name: geoid_web
    restart: always
    env_file: .env
    environment:
      SCOPE: ${GEOID_SCOPE:-scope_geoid}
      TCP_PORT: 80
      UVICORN_WORKERS: 1
    ports:
      - "8080:80"
    volumes:
      - ../logs/geoid:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${WORKER_SCOPE:-scope_worker}
    container_name: geoid_worker
    restart: always
    env_file: .env
    # Run in worker mode (same image as catalog, different modules + CMD)
    command: ["worker"]
    environment:
      SCOPE: ${WORKER_SCOPE:-scope_worker}
      TCP_PORT: 81
      UVICORN_WORKERS: 2
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_WORKER:-81}:81"
    volumes:
      - ../logs/worker:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${TOOLS_SCOPE:-scope_tools}
    container_name: geoid_tools
    restart: always
    env_file: .env
    environment:
      SCOPE: ${TOOLS_SCOPE:-scope_tools}
      TCP_PORT: 8082
      UVICORN_WORKERS: 2
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_TOOLS:-8082}:8082"
    volumes:
      - ../logs/tools:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  maps:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${MAPS_SCOPE:-scope_maps}
    container_name: geoid_maps
    restart: always
    env_file: .env
    environment:
      SCOPE: ${MAPS_SCOPE:-scope_maps}
      TCP_PORT: 8083
      UVICORN_WORKERS: 2
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_MAPS:-8083}:8083"
    volumes:
      - ../logs/maps:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  elasticsearch:
    # OpenSearch 2.x (Apache 2.0) — drop-in replacement for Elasticsearch REST API.
    # Elasticsearch >=7.11 uses SSPL/ELv2, incompatible with this project's Apache 2.0 license.
    image: opensearchproject/opensearch:2.17.0
    container_name: geoid_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dynastore_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kibana:
    # OpenSearch Dashboards (Apache 2.0) — replaces Kibana (SSPL/ELv2).
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: geoid_kibana
    restart: always
    environment:
      - OPENSEARCH_HOSTS=http://elasticsearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dynastore_net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.6
    container_name: geoid_keycloak
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-gis_dev}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_DB_SCHEMA: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm --health-enabled=true
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "${HOST_PORT_KEYCLOAK:-8181}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
