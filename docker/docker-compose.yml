services:
  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile.db
    container_name: geoid_db
    restart: always
    # CHANGED: Now looks for .env in the same folder (docker/)
    env_file: .env
    command: postgres -c max_locks_per_transaction=256 -c shared_preload_libraries='pg_cron' -c cron.database_name='${POSTGRES_DB:-gis_dev}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dynastore_net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${API_SCOPE:-all}
    container_name: geoid_api
    restart: always
    env_file: .env
    environment:
      TCP_PORT: 80
      UVICORN_WORKERS: 4
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_API:-80}:80"
    volumes:
      - ../logs/api:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  geoid:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${GEOID_SCOPE:-all}
    container_name: geoid_web
    restart: always
    env_file: .env
    environment:
      TCP_PORT: 80
      UVICORN_WORKERS: 1
    ports:
      - "8080:80"
    volumes:
      - ../logs/geoid:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SCOPE: ${WORKER_SCOPE:-all}
    container_name: geoid_worker
    restart: always
    env_file: .env
    # Run in worker mode (same image as API, different modules + CMD)
    command: ["worker"]
    environment:
      TCP_PORT: 81
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      ACCESS_LOG: /dynastore/logs/access.log
      ERROR_LOG: /dynastore/logs/error.log
    ports:
      - "${HOST_PORT_WORKER:-81}:81"
    volumes:
      - ../logs/worker:/dynastore/logs
    depends_on:
      - db
    networks:
      - dynastore_net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: geoid_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dynastore_net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: geoid_kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dynastore_net
volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
