services:
  db:
    extends:
      file: docker-compose.yml
      service: db
    ports:
      - "54320:5432"
    healthcheck:
      test: [ "CMD-SHELL", "psql -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-gis_dev} -c 'SELECT 1' -q --no-align --tuples-only" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # One-shot: wipes every non-system schema before dynastore services start.
  # TEST ONLY — mirrors the db_init in docker-compose.dev.yml.
  # Logic lives in scripts/db_reset.sh — edit there to customize the wipe.
  db_init:
    image: postgres:17
    container_name: geoid_db_init_test
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testpassword}@db:5432/${POSTGRES_DB:-gis_dev}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dynastore_net
    volumes:
      - ../scripts:/scripts:ro
    entrypoint: ["bash", "/scripts/db_reset.sh", "reset", "--yes"]

  keycloak:
    extends:
      file: docker-compose.yml
      service: keycloak

  catalog:
    extends:
      file: docker-compose.yml
      service: catalog
    restart: "no"
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
      args:
        SCOPE: ${CATALOG_SCOPE:-all}
    container_name: geoid_catalog_test
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    environment:
      - LOG_LEVEL=DEBUG
      - GUNICORN_WORKERS=1
      - IGNORE_BAKED_ENV=true
      - TCP_PORT=80
      - API_ROOT_PATH=/
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gis_dev}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    command: python -m uvicorn dynastore.main:app --host 0.0.0.0 --port 80 --workers 1

  worker:
    extends:
      file: docker-compose.yml
      service: worker
    restart: "no"
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
      args:
        SCOPE: ${WORKER_SCOPE:-all}
    container_name: geoid_worker_test
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
    environment:
      - LOG_LEVEL=DEBUG
      - GUNICORN_WORKERS=1
      - IGNORE_BAKED_ENV=true
      - TCP_PORT=81
      - API_ROOT_PATH=/
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gis_dev}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:81/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    command: python -m uvicorn dynastore.main:app --host 0.0.0.0 --port 81 --workers 1

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: tester
      args:
        SCOPE: ${TEST_SCOPE:-all}
    container_name: geoid_test_runner
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
      - PYTEST_CURRENT_TEST=true
      - REMOTE_TEST_EXECUTION=true
      - DYNASTORE_API_URL=http://catalog:80
      - DYNASTORE_WORKER_URL=http://worker:81
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-gis_dev}
    volumes:
      - ../tests:/dynastore/tests
      - ../src:/dynastore/src
      - ..:/dynastore/workspace
      - ../pytest.ini:/dynastore/pytest.ini
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      catalog:
        condition: service_healthy
      worker:
        condition: service_healthy
    networks:
      - dynastore_net
    command: [ "/opt/venv/bin/pytest", "tests", "--junitxml=/dynastore/workspace/test-results.xml" ]

volumes:
  postgres_data:


networks:
  dynastore_net:
    driver: bridge
