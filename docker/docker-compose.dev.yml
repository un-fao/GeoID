services:
  db:
    extends:
      file: docker-compose.yml
      service: db
    ports:
      - "54320:5432" # Expose DB locally for dev tools
    healthcheck:
      test: [ "CMD-SHELL", "psql -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-gis_dev} -c 'SELECT 1' -q --no-align --tuples-only" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  keycloak:
    extends:
      file: docker-compose.yml
      service: keycloak
    environment:
      KC_PROXY_HEADERS: xforwarded

  catalog:
    extends:
      file: docker-compose.yml
      service: catalog
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
      args:
        SCOPE: ${CATALOG_SCOPE:-scope_catalog}
    volumes:
      - ../src:/dynastore/src # Hot reload mount
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "5678:5678" # Debug port
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 80 --reload --reload-dir src

  geoid:
    extends:
      file: docker-compose.yml
      service: geoid
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    volumes:
      - ../src:/dynastore/src
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      ES_HOST: elasticsearch
      ES_PORT: "9200"

  worker:
    extends:
      file: docker-compose.yml
      service: worker
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
      args:
        SCOPE: ${WORKER_SCOPE:-scope_worker}
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../src:/dynastore/src
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "5679:5679" # Debug port for worker
    command: python -m debugpy --listen 0.0.0.0:5679 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 81 --reload --reload-dir src

  tools:
    extends:
      file: docker-compose.yml
      service: tools
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
      args:
        SCOPE: ${TOOLS_SCOPE:-scope_tools}
    volumes:
      - ../src:/dynastore/src
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
    ports:
      - "5680:5680" # Debug port for tools
    command: python -m debugpy --listen 0.0.0.0:5680 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 8082 --reload --reload-dir src

  maps:
    extends:
      file: docker-compose.yml
      service: maps
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
      args:
        SCOPE: ${MAPS_SCOPE:-scope_maps}
    volumes:
      - ../src:/dynastore/src
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      UVICORN_WORKERS: 1
      LOG_LEVEL: DEBUG
      ACCESS_LOG: "-"
      ERROR_LOG: "-"
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "5681:5681" # Debug port for maps
    command: python -m debugpy --listen 0.0.0.0:5681 -m uvicorn dynastore.main:app --host 0.0.0.0 --port 8083 --reload --reload-dir src

  elasticsearch:
    extends:
      file: docker-compose.yml
      service: elasticsearch
    ports:
      - "9200:9200"

  kibana:
    extends:
      file: docker-compose.yml
      service: kibana
    ports:
      - "5601:5601"

volumes:
  postgres_data:
  elasticsearch_data:


networks:
  dynastore_net:
    driver: bridge
